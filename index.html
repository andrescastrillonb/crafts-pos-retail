<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crafts POS | Enterprise Management</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1041/1041916.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .animate-in { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .bg-petrol { background-color: #0f1d24; }
        .text-pavo-real { color: #004B8D; }
        .bg-pavo-real { background-color: #004B8D; }
        .modal-overlay { background: rgba(15, 29, 36, 0.98); backdrop-filter: blur(15px); }
        .stat-row, .action-module { transition: all 0.3s ease; border: 1px solid #f1f5f9; }
        .stat-row:hover, .action-module:hover { transform: scale(1.005); background-color: #ffffff; box-shadow: 0 15px 45px -15px rgba(0,75,141,0.12); }
        .nav-active { background-color: rgba(255, 255, 255, 0.1) !important; color: white !important; }
        .sidebar-scroll { max-height: calc(100vh - 450px); overflow-y: auto; }
    </style>
</head>
<body class="text-slate-700">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6 bg-petrol">
        <div class="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-md animate-in border border-white/10">
            <h1 class="text-3xl font-black text-center text-slate-500 mb-8 uppercase tracking-tighter">CRAFTS POS</h1>
            <div class="space-y-4 text-left">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Sede / Usuario</label>
                <input id="login-email" type="email" placeholder="ejemplo@sede.com" class="w-full p-4 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-slate-400 font-medium">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Contraseña</label>
                <input id="login-pass" type="password" placeholder="••••••••" class="w-full p-4 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-slate-400 font-medium">
                <label class="text-[10px] font-black text-orange-500 uppercase tracking-widest ml-2 italic">Nombre del Vendedor</label>
                <input id="login-vendedor" type="text" placeholder="Tu nombre..." class="w-full p-4 bg-orange-50 rounded-2xl border-0 ring-1 ring-orange-200 outline-none focus:ring-2 focus:ring-orange-400 font-bold uppercase text-pavo-real">
                <button onclick="iniciarSesion()" class="w-full bg-slate-700 text-white p-5 rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-lg uppercase tracking-widest text-xs mt-4">Entrar</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden flex min-h-screen">
        <aside class="w-20 md:w-56 bg-petrol text-white flex flex-col z-20 shadow-2xl transition-all">
            <div class="p-6 flex items-center gap-3 border-b border-white/5">
                <div class="w-8 h-8 bg-orange-500 rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-gem text-white text-xs"></i></div>
                <div class="hidden md:block leading-tight text-left">
                    <p class="font-black text-[9px] tracking-widest text-slate-500 uppercase leading-none mb-1">Central Hub</p>
                    <p id="sidebar-sede-name" class="font-bold text-white text-[10px] uppercase italic">Cargando...</p>
                </div>
            </div>
            
            <nav id="nav-menu" class="p-4 mt-10 space-y-2 flex-1 hide-scroll"></nav>

            <div id="sidebar-cesta" class="hidden p-4 border-t border-white/5 animate-in">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-4 italic">Cesta Actual</p>
                <div id="cesta-items" class="sidebar-scroll space-y-3 hide-scroll"></div>
                <div class="mt-6 pt-4 border-t border-white/10 text-right">
                    <span id="cesta-total" class="block font-black text-xl text-orange-500 tabular-nums mb-4">$0</span>
                    <button onclick="finalizarVenta()" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-orange-600 transition-all">Cobrar</button>
                </div>
            </div>

            <div class="p-4 border-t border-white/5 text-center">
                <button onclick="cerrarSesion()" class="w-full flex items-center justify-center gap-3 p-3 rounded-xl hover:bg-white/5 text-slate-500 border-0 bg-transparent cursor-pointer font-bold transition-all text-[10px] uppercase">
                    <i class="fas fa-power-off"></i><span class="hidden md:block">Salir</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-28 bg-slate-900 px-10 flex items-center justify-between z-10 border-b border-white/5">
                <div class="flex items-center gap-6 text-white text-left">
                    <div class="flex flex-col">
                        <span id="label-sede-top" class="text-[9px] bg-orange-500 text-white px-2 py-0.5 rounded font-black uppercase tracking-tighter w-fit mb-1">...</span>
                        <span id="current-vendedor-display" class="font-bold text-xs text-slate-400 uppercase tracking-widest italic tracking-tighter">Vendedor</span>
                    </div>
                </div>
                <div class="flex flex-col items-center">
                    <span id="header-date" class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 italic">...</span>
                    <span id="header-time" class="text-3xl font-black text-white tabular-nums tracking-widest uppercase leading-none">00:00:00</span>
                </div>
                <div class="flex items-center gap-3 bg-white/5 px-6 py-3 rounded-2xl border border-white/5">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-lg shadow-green-500/20"></div>
                    <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest">ONLINE</span>
                </div>
            </header>
            
            <section id="view-container" class="flex-1 overflow-y-auto p-12 relative bg-slate-50"></section>
        </main>
    </div>

    <div id="main-modal" class="hidden fixed inset-0 z-[110] modal-overlay flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-4xl rounded-[3.5rem] shadow-2xl overflow-hidden animate-in">
            <div class="bg-slate-900 p-8 text-white flex justify-between items-center border-b border-white/10">
                <h2 id="modal-title" class="font-black text-2xl italic tracking-tighter uppercase leading-none">Gestión de Producto</h2>
                <button onclick="cerrarModal()" class="text-slate-400 hover:text-white text-3xl bg-transparent border-0 cursor-pointer transition-all"><i class="fas fa-times-circle"></i></button>
            </div>
            <div id="modal-content" class="p-10 max-h-[80vh] overflow-y-auto hide-scroll bg-slate-50/30"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAEzn4UvflaiWEaXCLkPxYKDcK5HCtaYZk", authDomain: "crafts-colombia-pos.firebaseapp.com", projectId: "crafts-colombia-pos", storageBucket: "crafts-colombia-pos.firebasestorage.app", messagingSenderId: "924957968575", appId: "1:924957968575:web:12be975b2346dcdf585e0a" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth(); const db = firebase.firestore();
        
        let currentUserData = null, productosData = [], listaCategorias = [], carrito = [];
        let vendedorActivo = localStorage.getItem('vendedor_nombre') || "";

        function updateClock() { const now = new Date(); if(document.getElementById('header-date')) { document.getElementById('header-date').innerText = now.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'short' }); document.getElementById('header-time').innerText = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' }); } }
        setInterval(updateClock, 1000);

        async function iniciarSesion() { 
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            const vend = document.getElementById('login-vendedor').value.trim();
            if(!vend) return alert("Ingresa tu nombre para iniciar turno.");
            auth.signInWithEmailAndPassword(email, pass).then(() => {
                localStorage.setItem('vendedor_nombre', vend.toUpperCase());
                vendedorActivo = vend.toUpperCase();
            }).catch(() => alert("Error de credenciales.")); 
        }

        function cerrarSesion() { localStorage.removeItem('vendedor_nombre'); auth.signOut(); location.reload(); }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const doc = await db.collection('usuarios').doc(user.email).get();
                currentUserData = doc.data() || { rol: 'vendedor', sede: 'Sin Sede' };
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('sidebar-sede-name').innerText = currentUserData.sede;
                document.getElementById('label-sede-top').innerText = "SEDE " + currentUserData.sede;
                document.getElementById('current-vendedor-display').innerText = vendedorActivo || "OPERARIO";
                
                escucharCategorias(); 
                renderSidebar(currentUserData.rol); 
                navegar('inicio');
                
                // ESCUCHA DE INVENTARIO
                db.collection("productos").onSnapshot(snap => { 
                    productosData = []; 
                    snap.forEach(d => productosData.push({id: d.id, ...d.data()})); 
                });
            } else { document.getElementById('login-screen').classList.remove('hidden'); document.getElementById('main-app').classList.add('hidden'); }
        });

        function escucharCategorias() { db.collection("configuracion").doc("categorias").onSnapshot(doc => { if(doc.exists) listaCategorias = doc.data().lista || []; }); }

        function renderSidebar(rol) {
            const nav = document.getElementById('nav-menu');
            let menu = `<button onclick="navegar('inicio')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all"><i class="fas fa-th-large"></i><span class="hidden md:block">Dashboard</span></button>`;
            if (rol === 'admin' || rol === 'control') {
                menu += `<button onclick="navegar('productos')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all"><i class="fas fa-boxes"></i><span class="hidden md:block">Logística</span></button>`;
            }
            nav.innerHTML = menu;
        }

        function navegar(vista) {
            const container = document.getElementById('view-container');
            if (vista === 'inicio') {
                container.innerHTML = `
                    <div class="animate-in max-w-7xl mx-auto pt-4 text-center">
                        <h1 class="text-7xl font-black tracking-tighter text-slate-500 mb-2 italic leading-none uppercase">Crafts Colombia</h1>
                        <p class="text-orange-500 font-bold uppercase tracking-[0.5em] text-xs mb-16 italic">Consola de Operaciones</p>
                        <div class="max-w-2xl mx-auto relative mb-20">
                            <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-200 text-xl"></i>
                            <input id="global-search" onkeyup="filtrarVenta(this.value)" type="text" placeholder="Buscar por nombre o categoría..." class="w-full pl-16 pr-6 py-6 bg-white rounded-full border border-slate-100 shadow-2xl outline-none text-lg font-medium focus:ring-4 focus:ring-slate-100 transition-all">
                        </div>
                        <div id="search-results-list" class="space-y-4 text-left"></div>
                    </div>`;
            } else if (vista === 'productos') {
                container.innerHTML = `
                    <div class="animate-in max-w-7xl mx-auto pt-4 text-center">
                        <h1 class="text-5xl font-black tracking-tighter text-slate-500 mb-2 italic uppercase">Logística Central</h1>
                        <p class="text-orange-500 font-bold uppercase text-xs mb-20">Administración de Stock Maestro</p>
                        <div class="max-w-2xl mx-auto relative mb-16">
                            <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-200 text-xl"></i>
                            <input id="inv-search" onkeyup="filtrarVenta(this.value)" type="text" placeholder="Buscar producto en cualquier sede..." class="w-full pl-16 pr-6 py-6 bg-white rounded-full border border-slate-100 shadow-2xl outline-none text-lg font-medium focus:ring-4 focus:ring-slate-100 transition-all">
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16 text-left">
                            <button onclick="verFicha(null)" class="bg-orange-500 p-8 rounded-[2.5rem] action-module flex items-center gap-6 text-white group shadow-xl border-0 cursor-pointer">
                                <div class="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center text-2xl"><i class="fas fa-plus"></i></div>
                                <div><h3 class="font-black text-xl uppercase tracking-tighter leading-none italic">Nuevo Item</h3><p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Ingresar Stock</p></div>
                            </button>
                        </div>
                        <div id="inventory-list" class="space-y-3"></div>
                    </div>`;
            }
        }

        // --- LÓGICA QUIRÚRGICA DE BÚSQUEDA Y FICHA ---
        function filtrarVenta(q) {
            const query = q.toLowerCase().trim();
            const list = document.getElementById('search-results-list') || document.getElementById('inventory-list');
            if(!list) return;
            if(!query) { list.innerHTML = ''; return; }

            const filtered = productosData.filter(p => {
                const searchMatch = p.nombre.toLowerCase().includes(query) || (p.categoria && p.categoria.toLowerCase().includes(query));
                // Si es vendedor, solo ve su sede. Si es admin, ve TODO.
                if(currentUserData.rol === 'admin') return searchMatch;
                return searchMatch && p.sede_ubicacion === currentUserData.sede;
            });

            let html = "";
            filtered.forEach(p => {
                const stockOk = p.stock > 0;
                const isAdmin = currentUserData.rol === 'admin';
                html += `
                    <div class="bg-white p-6 rounded-[2.5rem] stat-row flex items-center gap-10 animate-in">
                        <div class="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-300 text-xl"><i class="fas fa-gem"></i></div>
                        <div class="flex-1">
                            <p class="text-[8px] font-black text-orange-500 uppercase tracking-widest mb-1 italic leading-none">${p.categoria}</p>
                            <h3 class="font-black text-slate-600 text-lg uppercase truncate leading-tight">${p.nombre}</h3>
                        </div>
                        <div class="text-center min-w-[120px] border-l border-slate-50 pl-4">
                            <span class="bg-pavo-real text-white text-[9px] px-3 py-1 rounded-full font-black uppercase italic">${p.sede_ubicacion || 'Sin Sede'}</span>
                            <p class="font-black text-base mt-1 ${stockOk ? 'text-slate-800' : 'text-red-500'} tabular-nums">${p.stock} Unid.</p>
                        </div>
                        <div class="text-right min-w-[120px] border-l border-slate-50 pl-4">
                            <p class="font-black text-pavo-real text-xl tabular-nums leading-none">$${p.precio.toLocaleString()}</p>
                        </div>
                        <div class="flex gap-2 border-l border-slate-50 pl-4">
                            ${isAdmin ? `<button onclick="verFicha('${p.id}')" class="text-slate-300 hover:text-pavo-real transition-all text-xl bg-transparent border-0 cursor-pointer"><i class="fas fa-edit"></i></button>` : 
                            `<button onclick="agregarCarrito('${p.id}')" ${stockOk ? '' : 'disabled'} class="bg-orange-500 text-white px-6 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest active:scale-95 disabled:opacity-30 border-0 cursor-pointer">Agregar</button>`}
                        </div>
                    </div>`;
            });
            list.innerHTML = html || '<div class="text-center p-10 text-slate-300 italic uppercase">Sin resultados para esta sede</div>';
        }

        // --- FICHA TÉCNICA (MODAL DE EDICIÓN Y CREACIÓN) ---
        function verFicha(id) {
            const modal = document.getElementById('main-modal'), content = document.getElementById('modal-content');
            document.getElementById('modal-title').innerText = id ? "Ficha Técnica de Producto" : "Nuevo Registro de Stock";
            
            const p = id ? productosData.find(item => item.id === id) : { nombre: '', precio: 0, stock: 0, categoria: 'Mochilas', precio_compra: 0, stock_ideal: 0, sede_ubicacion: 'Bodega' };
            
            content.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    <div class="space-y-6">
                        <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block ml-2">Nombre Comercial</label><input id="edit-nombre" type="text" value="${p.nombre}" class="w-full p-5 bg-white rounded-3xl border-0 ring-1 ring-slate-100 font-bold outline-none text-pavo-real uppercase text-lg shadow-sm"></div>
                        <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block ml-2">Categoría Principal</label><select id="edit-categoria" class="w-full p-5 bg-white rounded-3xl border-0 ring-1 ring-slate-100 font-bold text-pavo-real uppercase shadow-sm">${listaCategorias.map(c => `<option value="${c}" ${p.categoria === c ? 'selected' : ''}>${c}</option>`).join('')}</select></div>
                        <div><label class="text-[10px] font-black text-orange-500 uppercase tracking-widest mb-2 block ml-2 italic">Asignar a Sede</label>
                            <select id="edit-sede" class="w-full p-5 bg-white rounded-3xl border-0 ring-1 ring-orange-100 font-black text-orange-600 uppercase shadow-sm">
                                ${["Bodega", "Filandia 1", "Filandia 2", "Cable Plaza", "Fundadores", "Jardín", "Online"].map(s => `<option value="${s}" ${p.sede_ubicacion === s ? 'selected' : ''}>${s}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                    <div class="bg-white p-8 rounded-[3.5rem] border border-slate-100 shadow-xl space-y-6">
                        <div class="grid grid-cols-2 gap-6">
                            <div><label class="text-[9px] font-black text-slate-400 uppercase mb-2 block text-center">Venta Publico</label><input id="edit-precio" type="number" value="${p.precio}" class="w-full p-5 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-100 font-black text-pavo-real text-center text-xl"></div>
                            <div><label class="text-[9px] font-black text-slate-400 uppercase mb-2 block text-center">Costo Compra</label><input id="edit-compra" type="number" value="${p.precio_compra}" class="w-full p-5 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-100 font-black text-slate-400 text-center text-xl"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-6">
                            <div><label class="text-[9px] font-black text-slate-400 uppercase mb-2 block text-center">Stock Actual</label><input id="edit-stock" type="number" value="${p.stock}" class="w-full p-5 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-100 font-black text-pavo-real text-center text-xl"></div>
                            <div><label class="text-[9px] font-black text-slate-400 uppercase mb-2 block text-center">Stock Ideal</label><input id="edit-ideal" type="number" value="${p.stock_ideal}" class="w-full p-5 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-100 font-black text-slate-400 text-center text-xl"></div>
                        </div>
                        <button onclick="guardarCambios('${id}')" class="w-full bg-slate-900 text-white py-6 rounded-3xl font-black uppercase text-xs tracking-widest hover:bg-green-600 transition-all shadow-xl shadow-slate-900/20 mt-4 border-0 cursor-pointer">Guardar Cambios</button>
                    </div>
                </div>`;
            modal.classList.remove('hidden');
        }

        async function guardarCambios(id) {
            const data = {
                nombre: document.getElementById('edit-nombre').value.toUpperCase(),
                categoria: document.getElementById('edit-categoria').value,
                sede_ubicacion: document.getElementById('edit-sede').value,
                precio: parseInt(document.getElementById('edit-precio').value) || 0,
                precio_compra: parseInt(document.getElementById('edit-compra').value) || 0,
                stock: parseInt(document.getElementById('edit-stock').value) || 0,
                stock_ideal: parseInt(document.getElementById('edit-ideal').value) || 0
            };
            try {
                if(!id || id === "null") await db.collection("productos").add(data);
                else await db.collection("productos").doc(id).update(data);
                cerrarModal(); alert("✅ Producto Actualizado");
            } catch (e) { alert("❌ Error al guardar"); }
        }

        function agregarCarrito(id) {
            const p = productosData.find(item => item.id === id);
            const existe = carrito.find(item => item.id === id);
            if(existe) { if(existe.cant < p.stock) existe.cant++; }
            else carrito.push({ ...p, cant: 1 });
            renderCarrito();
        }

        function renderCarrito() {
            const box = document.getElementById('sidebar-cesta'), list = document.getElementById('cesta-items');
            if(carrito.length === 0) { box.classList.add('hidden'); return; }
            box.classList.remove('hidden');
            let html = "", total = 0;
            carrito.forEach((item, i) => {
                total += item.precio * item.cant;
                html += `<div class="bg-white/5 p-3 rounded-2xl flex items-center justify-between border border-white/5 animate-in"><div class="min-w-0 flex-1"><p class="text-[9px] font-black text-white truncate uppercase leading-none mb-1">${item.nombre}</p><p class="text-[10px] text-orange-400 font-bold">$${(item.precio * item.cant).toLocaleString()}</p></div><div class="flex items-center gap-2 bg-slate-900 p-1 rounded-xl"><button onclick="cambiarCant(${i},-1)" class="text-white font-bold w-5 border-0 bg-transparent">-</button><span class="text-[10px] text-white font-bold">${item.cant}</span><button onclick="cambiarCant(${i},1)" class="text-white font-bold w-5 border-0 bg-transparent">+</button></div></div>`;
            });
            list.innerHTML = html;
            document.getElementById('cesta-total').innerText = `$${total.toLocaleString()}`;
        }

        function cambiarCant(i, d) {
            const item = carrito[i];
            item.cant += d;
            if(item.cant <= 0) carrito.splice(i, 1);
            else {
                const prod = productosData.find(p => p.id === item.id);
                if(item.cant > prod.stock) item.cant = prod.stock;
            }
            renderCarrito();
        }

        function cerrarModal() { document.getElementById('main-modal').classList.add('hidden'); }
    </script>
</body>
</html>
