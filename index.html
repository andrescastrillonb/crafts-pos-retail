<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crafts POS | Enterprise Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .animate-in { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .bg-petrol { background-color: #0f1d24; }
        .text-pavo-real { color: #004B8D; }
        .bg-pavo-real { background-color: #004B8D; }
        .modal-overlay { background: rgba(15, 29, 36, 0.95); backdrop-filter: blur(10px); }
        .stat-row { transition: all 0.3s ease; border: 1px solid #f1f5f9; }
        .stat-row:hover { transform: scale(1.005); background-color: #ffffff; box-shadow: 0 10px 40px -15px rgba(0,75,141,0.1); }
    </style>
</head>
<body class="text-slate-700">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6 bg-petrol">
        <div class="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-md animate-in">
            <h1 class="text-3xl font-black text-center text-slate-500 mb-8 tracking-tighter uppercase">CRAFTS POS</h1>
            <div class="space-y-4">
                <input id="login-email" type="email" placeholder="Usuario" class="w-full p-5 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-slate-400">
                <input id="login-pass" type="password" placeholder="Contraseña" class="w-full p-5 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-slate-400">
                <button onclick="iniciarSesion()" class="w-full bg-slate-700 text-white p-5 rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-lg uppercase tracking-widest text-xs">Acceder al Sistema</button>
            </div>
            <p id="login-error" class="text-red-500 text-xs mt-6 hidden font-bold text-center"></p>
        </div>
    </div>

    <div id="main-app" class="hidden flex min-h-screen">
        <aside class="w-20 md:w-56 bg-petrol text-white flex flex-col z-20 shadow-2xl transition-all">
            <div class="p-6 flex items-center gap-3 border-b border-white/5">
                <div class="w-8 h-8 bg-orange-500 rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-gem text-white text-xs"></i></div>
                <div class="hidden md:block leading-tight">
                    <p class="font-black text-[9px] tracking-widest text-slate-500 uppercase leading-none mb-1">Central Hub</p>
                    <p id="sidebar-sede" class="font-bold text-white text-[10px] uppercase italic tracking-tighter">Administrador</p>
                </div>
            </div>

            <nav id="nav-menu" class="p-4 space-y-1 flex-1 hide-scroll"></nav>

            <div class="p-4 border-t border-white/5">
                <button onclick="cerrarSesion()" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 text-slate-500 border-0 bg-transparent cursor-pointer font-bold transition-all text-[10px] uppercase tracking-widest">
                    <i class="fas fa-power-off"></i><span class="hidden md:block">Salir</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-28 bg-slate-900 px-10 flex items-center justify-between z-10 border-b border-white/5 shadow-md">
                <div class="flex items-center gap-6 text-white">
                    <div class="flex flex-col">
                        <span id="user-role-badge" class="text-[8px] bg-orange-500 text-white px-2 py-0.5 rounded font-black uppercase tracking-tighter w-fit mb-1">MANDO CENTRAL</span>
                        <span id="user-display" class="font-bold text-xs text-slate-400 uppercase tracking-widest">Usuario</span>
                    </div>
                </div>
                <div class="flex flex-col items-center">
                    <span id="header-date" class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 italic">Sábado, 21 Feb</span>
                    <span id="header-time" class="text-2xl font-black text-white tabular-nums tracking-widest uppercase leading-none">00:00:00</span>
                </div>
                <div class="flex items-center gap-3 bg-white/5 px-6 py-3 rounded-2xl border border-white/5">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-lg shadow-green-500/20"></div>
                    <span class="text-[10px] font-black text-slate-300 uppercase tracking-widest">SISTEMA ACTIVO</span>
                </div>
            </header>
            
            <section id="view-container" class="flex-1 overflow-y-auto p-12 relative bg-slate-50"></section>
        </main>
    </div>

    <div id="main-modal" class="hidden fixed inset-0 z-50 modal-overlay flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-4xl rounded-[3.5rem] shadow-2xl overflow-hidden animate-in">
            <div class="bg-slate-900 p-8 text-white flex justify-between items-center">
                <h2 id="modal-title" class="font-bold text-2xl italic tracking-tighter">Acción Administrativa</h2>
                <button onclick="cerrarModal()" class="text-slate-400 hover:text-white text-3xl bg-transparent border-0 cursor-pointer"><i class="fas fa-times-circle"></i></button>
            </div>
            <div id="modal-content" class="p-10 max-h-[75vh] overflow-y-auto hide-scroll"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAEzn4UvflaiWEaXCLkPxYKDcK5HCtaYZk",
            authDomain: "crafts-colombia-pos.firebaseapp.com",
            projectId: "crafts-colombia-pos",
            storageBucket: "crafts-colombia-pos.firebasestorage.app",
            messagingSenderId: "924957968575",
            appId: "1:924957968575:web:12be975b2346dcdf585e0a"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUserData = null, productosData = [], listaCategorias = [];

        function updateClock() {
            const now = new Date();
            const options = { weekday: 'long', day: 'numeric', month: 'short' };
            if(document.getElementById('header-date')) {
                document.getElementById('header-date').innerText = now.toLocaleDateString('es-ES', options);
                document.getElementById('header-time').innerText = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            }
        }
        setInterval(updateClock, 1000);

        function iniciarSesion() {
            const email = document.getElementById('login-email').value, pass = document.getElementById('login-pass').value;
            auth.signInWithEmailAndPassword(email, pass).catch(() => alert("Credenciales incorrectas"));
        }

        function cerrarSesion() { auth.signOut(); location.reload(); }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const doc = await db.collection('usuarios').doc(user.email).get();
                currentUserData = doc.data() || { rol: 'vendedor', sede: '...' };
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email;
                escucharCategorias(); renderSidebar(currentUserData.rol); navegar('inicio');
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        function escucharCategorias() {
            db.collection("configuracion").doc("categorias").onSnapshot(doc => {
                if(doc.exists) listaCategorias = doc.data().lista || [];
            });
        }

        function renderSidebar(rol) {
            const nav = document.getElementById('nav-menu');
            let menu = `<button onclick="navegar('inicio')" class="w-full flex items-center gap-4 p-4 rounded-xl bg-white/5 text-white border-0 text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest"><i class="fas fa-th-large"></i><span class="hidden md:block">Dashboard</span></button>`;
            if (rol === 'admin' || rol === 'control') {
                menu += `
                <button onclick="navegar('productos')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 hover:text-white border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all"><i class="fas fa-boxes"></i><span class="hidden md:block">Inventario</span></button>
                <button onclick="navegar('traslados')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 hover:text-white border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all"><i class="fas fa-exchange-alt"></i><span class="hidden md:block">Traslados</span></button>
                <button onclick="navegar('reportes')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 hover:text-white border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all"><i class="fas fa-chart-pie"></i><span class="hidden md:block">Historial</span></button>`;
            }
            nav.innerHTML = menu;
        }

        function navegar(vista) {
            const container = document.getElementById('view-container');
            if (vista === 'inicio') {
                container.innerHTML = `
                    <div class="animate-in max-w-7xl mx-auto pt-4">
                        <div class="text-center mb-16">
                            <h1 class="text-7xl font-black tracking-tighter text-slate-500 mb-2 italic leading-none">Crafts Colombia</h1>
                            <p class="text-orange-500 font-bold uppercase tracking-[0.5em] text-xs italic">Centro de Inteligencia Administrativa</p>
                        </div>

                        <div class="max-w-2xl mx-auto relative mb-16">
                            <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-200 text-xl"></i>
                            <input type="text" placeholder="Buscador global..." class="w-full pl-16 pr-6 py-6 bg-white rounded-full border border-slate-100 shadow-2xl outline-none text-lg font-medium focus:ring-4 focus:ring-slate-100 transition-all">
                        </div>

                        <div class="space-y-8">
                            <div class="bg-white p-10 rounded-[3rem] stat-row flex items-center gap-10">
                                <div class="min-w-[180px] border-r border-slate-100 pr-10">
                                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 italic">Ventas Ayer</p>
                                    <h3 class="text-4xl font-black text-pavo-real tabular-nums">$0</h3>
                                </div>
                                <div class="flex-1 grid grid-cols-3 md:grid-cols-6 gap-8">
                                    <div class="flex flex-col"><span class="text-[10px] font-black text-pavo-real uppercase mb-1">Filandia 1</span><span class="font-black text-sm text-orange-500">$0</span></div>
                                    <div class="flex flex-col"><span class="text-[10px] font-black text-pavo-real uppercase mb-1">Filandia 2</span><span class="font-black text-sm text-orange-500">$0</span></div>
                                    <div class="flex flex-col"><span class="text-[10px] font-black text-pavo-real uppercase mb-1">Cable Plaza</span><span class="font-black text-sm text-orange-500">$0</span></div>
                                    <div class="flex flex-col"><span class="text-[10px] font-black text-pavo-real uppercase mb-1">Fundadores</span><span class="font-black text-sm text-orange-500">$0</span></div>
                                    <div class="flex flex-col"><span class="text-[10px] font-black text-pavo-real uppercase mb-1">Jardín</span><span class="font-black text-sm text-orange-500">$0</span></div>
                                    <div class="flex flex-col"><span class="text-[10px] font-black text-pavo-real uppercase mb-1">Online</span><span class="font-black text-sm text-orange-500">$0</span></div>
                                </div>
                            </div>

                            <div class="bg-white p-10 rounded-[3rem] stat-row flex items-center gap-10">
                                <div class="min-w-[180px] border-r border-slate-100 pr-10">
                                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 italic">Top Productos</p>
                                    <h3 class="text-2xl font-black text-pavo-real uppercase italic">Best Sellers</h3>
                                </div>
                                <div class="flex-1 grid grid-cols-2 md:grid-cols-4 gap-8">
                                    <div class="flex gap-4 items-center">
                                        <div class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-orange-500 font-black text-sm shadow-inner">1</div>
                                        <div class="flex flex-col"><span class="text-[9px] font-black text-pavo-real uppercase">Mochila Wayuu</span><span class="text-[11px] font-bold text-slate-400">42 unidades</span></div>
                                    </div>
                                    <div class="flex gap-4 items-center opacity-40">
                                        <div class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-300 font-black text-sm shadow-inner">2</div>
                                        <div class="flex flex-col"><span class="text-[9px] font-black text-pavo-real uppercase">Sin Datos</span><span class="text-[11px] font-bold text-slate-300">0 unidades</span></div>
                                    </div>
                                </div>
                            </div>

                            <div class="bg-white p-10 rounded-[3rem] stat-row flex items-center gap-10">
                                <div class="min-w-[180px] border-r border-slate-100 pr-10">
                                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 italic">Acumulado Mes</p>
                                    <h3 class="text-4xl font-black text-pavo-real tabular-nums">$0</h3>
                                </div>
                                <div class="flex-1 flex items-center justify-between px-4">
                                    <div class="flex flex-col"><span class="text-xs font-black text-pavo-real uppercase tracking-widest">Rendimiento Operativo</span><p class="text-xs font-medium text-slate-400 italic">Consolidando métricas de sedes activas...</p></div>
                                    <div class="bg-green-50 text-green-600 px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest">+12% vs Enero</div>
                                </div>
                            </div>

                            <div class="bg-blue-50 p-10 rounded-[3rem] stat-row flex items-center gap-10 border-blue-100 shadow-lg shadow-blue-900/5">
                                <div class="min-w-[180px] border-r border-blue-200 pr-10">
                                    <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-1 italic">Proyección Año</p>
                                    <h3 class="text-4xl font-black text-pavo-real tabular-nums">$0</h3>
                                </div>
                                <div class="flex-1 grid grid-cols-2 md:grid-cols-4 gap-8">
                                    <div class="flex flex-col"><span class="text-[10px] font-black text-pavo-real uppercase mb-1 tracking-widest">Crecimiento Anual</span><span class="font-black text-lg text-green-500">+0.0%</span></div>
                                    <div class="flex flex-col"><span class="text-[10px] font-black text-pavo-real uppercase mb-1 tracking-widest">Meta Global</span><span class="font-black text-lg text-slate-400">$0</span></div>
                                </div>
                            </div>
                        </div>
                    </div>`;
            } else if (vista === 'productos') {
                container.innerHTML = `
                    <div class="animate-in max-w-7xl mx-auto pt-4">
                        <div class="flex justify-between items-center mb-10">
                            <div><h1 class="text-4xl font-black tracking-tighter italic text-slate-500 uppercase leading-none">Logística Central</h1><p class="text-slate-400 font-bold uppercase tracking-widest text-[10px] mt-2">Administración de existencias y costos</p></div>
                            <div class="flex gap-2">
                                <button onclick="modalCargaMasiva()" class="bg-blue-600 text-white px-7 py-3 rounded-xl font-black text-[10px] uppercase hover:bg-blue-700 transition-all shadow-lg"><i class="fas fa-file-excel mr-2"></i> Carga Masiva</button>
                                <button onclick="nuevaFicha()" class="bg-slate-900 text-white px-7 py-3 rounded-xl font-black text-[10px] uppercase hover:bg-orange-600 transition-all shadow-xl">Nuevo Artículo</button>
                            </div>
                        </div>
                        <div id="inventory-list" class="space-y-3"></div>
                    </div>`;
                escucharInventario();
            }
        }

        // Se mantienen las funciones de Firebase (Inventario, Categorías, Excel, etc.) del código base
        function escucharInventario() {
            db.collection("productos").onSnapshot(snap => {
                productosData = [];
                snap.forEach(doc => productosData.push({ id: doc.id, ...doc.data() }));
                const list = document.getElementById('inventory-list');
                if(!list) return;
                let html = "";
                productosData.forEach(p => {
                    const alerta = p.stock <= (p.stock_ideal || 0);
                    html += `
                        <div class="bg-white p-6 rounded-[2.5rem] stat-row flex items-center gap-10">
                            <div class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-200 text-sm"><i class="fas fa-image"></i></div>
                            <div class="flex-1">
                                <p class="text-[8px] font-black text-orange-500 uppercase tracking-widest">${p.categoria}</p>
                                <h3 class="font-black text-slate-700 text-sm uppercase tracking-tighter truncate leading-tight">${p.nombre}</h3>
                            </div>
                            <div class="text-center min-w-[100px] border-l border-slate-50 pl-4"><p class="text-[8px] font-black text-pavo-real uppercase mb-1 italic">Sede</p><span class="bg-slate-900 text-white text-[9px] px-2 py-1 rounded font-black uppercase italic">${p.sede_ubicacion}</span></div>
                            <div class="text-center min-w-[100px] border-l border-slate-50 pl-4"><p class="text-[8px] font-black text-pavo-real uppercase mb-1 italic">Stock</p><p class="font-black text-sm ${alerta ? 'text-red-500' : 'text-slate-700'} tabular-nums">${p.stock} / ${p.stock_ideal}</p></div>
                            <div class="text-right min-w-[120px] border-l border-slate-50 pl-4"><p class="text-[8px] font-black text-pavo-real uppercase mb-1 italic">Venta</p><p class="font-black text-slate-700 text-sm tabular-nums">$${p.precio.toLocaleString()}</p></div>
                            <div class="flex gap-2 border-l border-slate-50 pl-4"><button onclick="verFicha('${p.id}')" class="text-slate-300 hover:text-slate-600 transition-all"><i class="fas fa-edit"></i></button></div>
                        </div>`;
                });
                list.innerHTML = html;
            });
        }
        
        function cerrarModal() { document.getElementById('main-modal').classList.add('hidden'); }
    </script>
</body>
</html>
