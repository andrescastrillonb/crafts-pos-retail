<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crafts POS | Enterprise Management</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1041/1041916.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .animate-in { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .bg-petrol { background-color: #0f1d24; }
        .text-pavo-real { color: #004B8D; }
        .bg-pavo-real { background-color: #004B8D; }
        .modal-overlay { background: rgba(15, 29, 36, 0.98); backdrop-filter: blur(15px); }
        .stat-row, .action-module { transition: all 0.3s ease; border: 1px solid #f1f5f9; }
        .stat-row:hover, .action-module:hover { transform: scale(1.005); background-color: #ffffff; box-shadow: 0 15px 45px -15px rgba(0,75,141,0.12); }
        .nav-active { background-color: rgba(255, 255, 255, 0.1) !important; color: white !important; }
        .sidebar-scroll { max-height: calc(100vh - 550px); overflow-y: auto; }
        input, select { transition: all 0.2s ease; outline: none; }
    </style>
</head>
<body class="text-slate-700">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6 bg-petrol">
        <div class="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-md animate-in border border-white/10 text-center">
            <h1 class="text-3xl font-black text-slate-500 mb-8 uppercase tracking-tighter italic">CRAFTS POS</h1>
            <div class="space-y-4 text-left">
                <input id="login-email" type="email" placeholder="Usuario / Sede" class="w-full p-4 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-slate-400 font-medium">
                <input id="login-pass" type="password" placeholder="Contraseña" class="w-full p-4 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-slate-400 font-medium">
                <input id="login-vendedor" type="text" placeholder="Operario de Turno" class="w-full p-4 bg-orange-50 rounded-2xl border-0 ring-1 ring-orange-200 focus:ring-2 focus:ring-orange-400 font-bold uppercase text-pavo-real">
                <button onclick="iniciarSesion()" class="w-full bg-slate-700 text-white p-5 rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-lg uppercase tracking-widest text-xs mt-4">Entrar</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden flex min-h-screen">
        <aside class="w-20 md:w-56 bg-petrol text-white flex flex-col z-20 shadow-2xl transition-all">
            <div class="p-6 flex items-center gap-3 border-b border-white/5">
                <div class="w-8 h-8 bg-orange-500 rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-gem text-white text-xs"></i></div>
                <div class="hidden md:block leading-tight text-left italic">
                    <p class="font-black text-[9px] tracking-widest text-slate-500 uppercase leading-none mb-1">Central Console</p>
                    <p id="sidebar-sede-name" class="font-bold text-white text-[10px] uppercase">Sede...</p>
                </div>
            </div>
            
            <nav id="nav-menu" class="p-4 mt-10 space-y-2 flex-1 hide-scroll"></nav>

            <div id="sidebar-cesta" class="hidden p-4 border-t border-white/5 animate-in">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-4 italic">Cesta</p>
                <div id="cesta-items" class="sidebar-scroll space-y-3 hide-scroll"></div>
                <div class="mt-6 pt-4 border-t border-white/10 text-right">
                    <span id="cesta-total" class="block font-black text-xl text-orange-500 tabular-nums mb-4">$0</span>
                    <button onclick="finalizarVenta()" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-orange-600 transition-all">Cobrar</button>
                </div>
            </div>

            <div class="p-4 border-t border-white/5 text-center">
                <button onclick="cerrarSesion()" class="w-full flex items-center justify-center gap-3 p-3 rounded-xl hover:bg-white/5 text-slate-500 border-0 bg-transparent cursor-pointer font-bold transition-all text-[10px] uppercase tracking-widest">
                    <i class="fas fa-power-off"></i><span class="hidden md:block ml-2">Salir</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-28 bg-slate-900 px-10 flex items-center justify-between z-10 border-b border-white/5">
                <div class="flex items-center gap-6 text-white text-left italic">
                    <div class="flex flex-col">
                        <span id="label-sede-top" class="text-[9px] bg-orange-500 text-white px-2 py-0.5 rounded font-black uppercase tracking-tighter w-fit mb-1">...</span>
                        <span id="current-vendedor-display" class="font-bold text-xs text-slate-400 uppercase tracking-widest">Vendedor</span>
                    </div>
                </div>
                <div class="flex flex-col items-center">
                    <span id="header-date" class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 italic">...</span>
                    <span id="header-time" class="text-3xl font-black text-white tabular-nums tracking-widest uppercase leading-none">00:00:00</span>
                </div>
                <div class="flex items-center gap-3 bg-white/5 px-6 py-3 rounded-2xl border border-white/5">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-lg shadow-green-500/20"></div>
                    <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest">EN LÍNEA</span>
                </div>
            </header>
            <section id="view-container" class="flex-1 overflow-y-auto p-12 relative bg-slate-50"></section>
        </main>
    </div>

    <div id="main-modal" class="hidden fixed inset-0 z-[110] modal-overlay flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-4xl rounded-[3.5rem] shadow-2xl overflow-hidden animate-in">
            <div class="bg-slate-900 p-8 text-white flex justify-between items-center border-b border-white/10 italic">
                <h2 id="modal-title" class="font-black text-2xl italic tracking-tighter uppercase leading-none">Gestión</h2>
                <button onclick="cerrarModal()" class="text-slate-400 hover:text-white text-3xl bg-transparent border-0 cursor-pointer transition-all"><i class="fas fa-times-circle"></i></button>
            </div>
            <div id="modal-content" class="p-10 max-h-[80vh] overflow-y-auto hide-scroll bg-slate-50/30"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAEzn4UvflaiWEaXCLkPxYKDcK5HCtaYZk", authDomain: "crafts-colombia-pos.firebaseapp.com", projectId: "crafts-colombia-pos", storageBucket: "crafts-colombia-pos.firebasestorage.app", messagingSenderId: "924957968575", appId: "1:924957968575:web:12be975b2346dcdf585e0a" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth(); const db = firebase.firestore();
        
        let currentUserData = null, productosData = [], listaCategorias = [], carrito = [];
        let vendedorActivo = localStorage.getItem('vendedor_nombre') || "";

        function updateClock() { const now = new Date(); if(document.getElementById('header-date')) { document.getElementById('header-date').innerText = now.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'short' }); document.getElementById('header-time').innerText = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' }); } }
        setInterval(updateClock, 1000);

        async function iniciarSesion() { 
            const email = document.getElementById('login-email').value, pass = document.getElementById('login-pass').value, vend = document.getElementById('login-vendedor').value.trim();
            if(!vend) return alert("Indica el nombre del vendedor.");
            auth.signInWithEmailAndPassword(email, pass).then(() => {
                localStorage.setItem('vendedor_nombre', vend.toUpperCase());
                vendedorActivo = vend.toUpperCase();
            }).catch(() => alert("Error de acceso.")); 
        }

        function cerrarSesion() { localStorage.removeItem('vendedor_nombre'); auth.signOut(); location.reload(); }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const doc = await db.collection('usuarios').doc(user.email).get();
                currentUserData = doc.data() || { rol: 'vendedor', sede: 'Sede' };
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('sidebar-sede-name').innerText = currentUserData.sede;
                document.getElementById('label-sede-top').innerText = "SEDE " + currentUserData.sede;
                document.getElementById('current-vendedor-display').innerText = vendedorActivo || "OPERARIO";
                escucharCategorias(); renderSidebar(currentUserData.rol); navegar('inicio');
                db.collection("productos").onSnapshot(snap => { productosData = []; snap.forEach(d => productosData.push({id: d.id, ...d.data()})); });
            } else { document.getElementById('login-screen').classList.remove('hidden'); document.getElementById('main-app').classList.add('hidden'); }
        });

        function escucharCategorias() { db.collection("configuracion").doc("categorias").onSnapshot(doc => { if(doc.exists) listaCategorias = doc.data().lista || []; }); }

        function renderSidebar(rol) {
            const nav = document.getElementById('nav-menu');
            let menu = `<button onclick="navegar('inicio')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all"><i class="fas fa-th-large"></i><span class="hidden md:block">Inicio</span></button>`;
            menu += `<button onclick="navegar('estadisticas')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all"><i class="fas fa-chart-line"></i><span class="hidden md:block">Estadísticas</span></button>`;
            if (rol === 'admin' || rol === 'control') {
                menu += `<button onclick="navegar('productos')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all"><i class="fas fa-boxes"></i><span class="hidden md:block">Logística</span></button>`;
                menu += `<button onclick="navegar('historial')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all"><i class="fas fa-history"></i><span class="hidden md:block">Historial</span></button>`;
            }
            nav.innerHTML = menu;
        }

        function createDashboardRow(title, label, idPrefix, isAccent = false) {
            const rowClass = isAccent ? "bg-blue-50 border-blue-100" : "bg-white border-slate-100";
            const totalClass = isAccent ? "text-pavo-real" : (idPrefix === 'hoy' ? "text-orange-500" : "text-pavo-real");
            return `<div class="${rowClass} p-8 rounded-[3rem] stat-row flex items-center gap-8 mb-8 animate-in"><div class="min-w-[220px] border-r border-slate-100 pr-8 text-left"><p class="text-xs font-black uppercase tracking-widest mb-2 italic opacity-40">${label}</p><h3 class="text-sm font-black text-pavo-real uppercase tracking-widest mb-3">${title}</h3><h3 id="dash-total-${idPrefix}" class="text-5xl font-black ${totalClass} tabular-nums leading-none tracking-tighter">$0</h3></div><div class="flex-1 grid grid-cols-6 gap-2 text-center">${[1, 2, 3, 4, 5, 6].map(i => `<div class="flex flex-col items-center justify-center"><p class="text-4xl font-black ${isAccent ? 'text-blue-200' : 'text-pavo-real'} mb-1 opacity-80 leading-none">${i}</p><span id="val-${idPrefix}-${i}" class="font-black text-lg text-slate-800 tabular-nums tracking-tighter leading-none">$0</span></div>`).join('')}</div></div>`;
        }

        function navegar(vista) {
            const container = document.getElementById('view-container');
            const navButtons = document.querySelectorAll('#nav-menu button');
            navButtons.forEach(btn => btn.getAttribute('onclick').includes(`'${vista}'`) ? btn.classList.add('nav-active') : btn.classList.remove('nav-active'));

            if (vista === 'inicio') {
                container.innerHTML = `
                    <div class="animate-in max-w-7xl mx-auto pt-4 text-center">
                        <h1 class="text-7xl font-black tracking-tighter text-slate-500 mb-2 italic leading-none uppercase italic">Crafts Colombia</h1>
                        <p class="text-orange-500 font-bold uppercase tracking-[0.5em] text-xs italic mb-16">SEDE ${currentUserData.sede}</p>
                        <div class="max-w-2xl mx-auto relative mb-20"><i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-200 text-xl"></i><input id="global-search" onkeyup="filtrarVenta(this.value)" type="text" placeholder="Buscador global..." class="w-full pl-16 pr-6 py-6 bg-white rounded-full border border-slate-100 shadow-2xl outline-none text-lg font-medium focus:ring-4 focus:ring-slate-100 transition-all"></div>
                        <div class="bg-white p-12 rounded-[4rem] stat-row flex items-center gap-12 border-orange-200 border-2 mb-12 animate-in text-left">
                            <div class="min-w-[300px] border-r border-slate-100 pr-12">
                                <p class="text-xs font-black text-orange-500 uppercase tracking-widest mb-2 italic">Monitor Hoy</p>
                                <h3 class="text-xl font-black text-pavo-real uppercase tracking-tighter mb-2 italic">Ventas del Día</h3>
                                <h3 id="dash-total-hoy" class="text-6xl font-black text-orange-500 tabular-nums leading-none tracking-tighter">$0</h3>
                            </div>
                            <div class="flex-1 text-right font-bold text-slate-300 uppercase tracking-widest text-xs italic italic">Consolidado en tiempo real</div>
                        </div>
                        <div id="stats-container" class="space-y-4"></div>
                        <div id="search-results-list" class="space-y-4 mt-10 text-left"></div>
                    </div>`;
                if(currentUserData.rol === 'admin' || currentUserData.rol === 'control') {
                    document.getElementById('stats-container').innerHTML = `${createDashboardRow("Cierre Anterior", "Corte", "ayer")}${createDashboardRow("Global Mes", "Acumulado", "mes")}${createDashboardRow("Histórico Año", "Proyección 2026", "año", true)}`;
                }
                cargarEstadisticasDashboard();
            } else if (vista === 'productos') {
                container.innerHTML = `
                    <div class="animate-in max-w-7xl mx-auto pt-4 text-center">
                        <h1 class="text-5xl font-black tracking-tighter text-slate-500 mb-2 italic uppercase italic leading-none">Logística Central</h1>
                        <p class="text-orange-500 font-bold uppercase text-xs mb-12 tracking-widest italic">Sede: ${currentUserData.sede}</p>
                        
                        <div class="bg-white p-10 rounded-[3.5rem] shadow-2xl border border-slate-100 mb-16 text-left animate-in">
                            <div class="grid grid-cols-1 md:grid-cols-5 gap-6">
                                <div class="md:col-span-2">
                                    <label class="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest mb-2 block italic">Nombre o Referencia</label>
                                    <div class="relative"><i class="fas fa-tag absolute left-5 top-1/2 -translate-y-1/2 text-slate-300"></i><input id="adv-name" onkeyup="ejecutarBusquedaAvanzada()" type="text" placeholder="Ej: Mochila..." class="w-full pl-12 pr-5 py-4 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-100 font-bold text-pavo-real"></div>
                                </div>
                                <div>
                                    <label class="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest mb-2 block italic">Sede Destino</label>
                                    <select id="adv-sede" onchange="ejecutarBusquedaAvanzada()" class="w-full p-4 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-100 font-bold text-pavo-real appearance-none">
                                        <option value="TODAS">TODAS LAS SEDES</option>
                                        <option value="Bodega">BODEGA</option>
                                        <option value="Filandia 1">FILANDIA 1</option>
                                        <option value="Filandia 2">FILANDIA 2</option>
                                        <option value="Cable Plaza">CABLE PLAZA</option>
                                        <option value="Fundadores">FUNDADORES</option>
                                        <option value="Jardín">JARDÍN</option>
                                        <option value="Online">ONLINE</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest mb-2 block italic">Desde (Fecha)</label>
                                    <input id="adv-date-start" onchange="ejecutarBusquedaAvanzada()" type="date" class="w-full p-4 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-100 font-bold text-slate-500">
                                </div>
                                <div>
                                    <label class="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest mb-2 block italic">Hasta (Fecha)</label>
                                    <input id="adv-date-end" onchange="ejecutarBusquedaAvanzada()" type="date" class="w-full p-4 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-100 font-bold text-slate-500">
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16 text-left">
                            <button onclick="verFicha(null)" class="bg-orange-500 p-8 rounded-[2.5rem] action-module flex items-center gap-6 text-white group shadow-xl border-0 cursor-pointer"><div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center text-3xl"><i class="fas fa-plus"></i></div><div><h3 class="font-black text-xl uppercase tracking-tighter italic leading-none">Nuevo Item</h3><p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Crear Stock</p></div></button>
                            <button onclick="gestionCategorias()" class="bg-pavo-real p-8 rounded-[2.5rem] action-module flex items-center gap-6 text-white group shadow-xl border-0 cursor-pointer"><div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center text-3xl"><i class="fas fa-tags"></i></div><div><h3 class="font-black text-xl uppercase tracking-tighter italic leading-none">Categorías</h3><p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Etiquetas</p></div></button>
                            <button onclick="modalCargaMasiva()" class="bg-slate-600 p-8 rounded-[2.5rem] action-module flex items-center gap-6 text-white group shadow-xl border-0 cursor-pointer"><div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center text-3xl"><i class="fas fa-file-excel"></i></div><div><h3 class="font-black text-xl uppercase tracking-tighter italic leading-none">Carga Masiva</h3><p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Excel</p></div></button>
                        </div>
                        <div id="inventory-list" class="space-y-3 text-left"></div>
                    </div>`;
            } else if (vista === 'historial') {
                container.innerHTML = `<div class="animate-in max-w-7xl mx-auto pt-4 text-center"><h1 class="text-5xl font-black tracking-tighter text-slate-500 mb-2 italic uppercase italic leading-none">Historial Maestro</h1><div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16 text-left mt-20"><button onclick="verHistorialTraslados()" class="bg-pavo-real p-8 rounded-[2.5rem] action-module flex items-center gap-6 text-white group shadow-xl border-0 cursor-pointer"><div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center text-3xl"><i class="fas fa-exchange-alt"></i></div><div><h3 class="font-black text-xl uppercase tracking-tighter italic leading-none">Traslados</h3><p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Entre Sedes</p></div></button><button onclick="verHistorialIngresos()" class="bg-orange-500 p-8 rounded-[2.5rem] action-module flex items-center gap-6 text-white group shadow-xl border-0 cursor-pointer"><div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center text-3xl"><i class="fas fa-plus-circle"></i></div><div><h3 class="font-black text-xl uppercase tracking-tighter italic leading-none">Ingresos</h3><p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">A Bodega</p></div></button><button onclick="verHistorialVentas()" class="bg-slate-600 p-8 rounded-[2.5rem] action-module flex items-center gap-6 text-white group shadow-xl border-0 cursor-pointer"><div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center text-3xl"><i class="fas fa-shopping-cart"></i></div><div><h3 class="font-black text-xl uppercase tracking-tighter italic leading-none">Ventas</h3><p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Histórico</p></div></button></div><div id="historial-data-container" class="bg-white rounded-[3rem] overflow-hidden shadow-2xl border border-slate-100"><div class="p-20 text-center italic text-slate-300">Selecciona una categoría para auditar.</div></div></div>`;
            }
        }

        // --- MOTOR DE BÚSQUEDA AVANZADA (QUIRÚRGICO) ---
        function ejecutarBusquedaAvanzada() {
            const name = document.getElementById('adv-name').value.toLowerCase().trim();
            const sede = document.getElementById('adv-sede').value;
            const dStart = document.getElementById('adv-date-start').value;
            const dEnd = document.getElementById('adv-date-end').value;
            const list = document.getElementById('inventory-list');
            
            if(!name && sede === "TODAS" && !dStart && !dEnd) { list.innerHTML = ''; return; }

            const filtered = productosData.filter(p => {
                const matchName = !name || p.nombre.toLowerCase().includes(name);
                const matchSede = sede === "TODAS" || p.sede_ubicacion === sede;
                
                // Lógica de fechas
                let matchDate = true;
                if(p.fecha_ingreso && (dStart || dEnd)) {
                    const pDate = p.fecha_ingreso.toDate().toISOString().split('T')[0];
                    if(dStart && pDate < dStart) matchDate = false;
                    if(dEnd && pDate > dEnd) matchDate = false;
                } else if (!p.fecha_ingreso && (dStart || dEnd)) {
                    matchDate = false;
                }
                
                return matchName && matchSede && matchDate;
            });
            renderResultados(filtered, list);
        }

        async function guardarCambios(id) {
            const newSede = document.getElementById('edit-sede').value, newNombre = document.getElementById('edit-nombre').value.toUpperCase();
            const data = {
                nombre: newNombre, categoria: document.getElementById('edit-categoria').value,
                sede_ubicacion: newSede, precio: parseInt(document.getElementById('edit-precio').value) || 0,
                precio_compra: parseInt(document.getElementById('edit-compra').value) || 0,
                stock: parseInt(document.getElementById('edit-stock').value) || 0,
                stock_ideal: parseInt(document.getElementById('edit-ideal').value) || 0,
                fecha_ingreso: firebase.firestore.FieldValue.serverTimestamp() // SELLO CRONOLÓGICO
            };
            try {
                if(!id || id === "null") {
                    await db.collection("productos").add(data);
                    await db.collection("traslados").add({ producto: newNombre, fecha: firebase.firestore.FieldValue.serverTimestamp(), origen: "INGRESO INICIAL", destino: newSede, usuario: vendedorActivo });
                } else {
                    const oldProd = productosData.find(p => p.id === id);
                    if(oldProd.sede_ubicacion !== newSede) { await db.collection("traslados").add({ producto: newNombre, fecha: firebase.firestore.FieldValue.serverTimestamp(), origen: oldProd.sede_ubicacion || "BODEGA", destino: newSede, usuario: vendedorActivo }); }
                    await db.collection("productos").doc(id).update(data);
                }
                cerrarModal(); alert("✅ Operación guardada con registro temporal.");
            } catch (e) { alert("Error"); }
        }

        function verHistorialTraslados() { renderTablaHistorial("traslados", false); }
        function verHistorialIngresos() { renderTablaHistorial("traslados", true); }
        function verHistorialVentas() { document.getElementById('historial-data-container').innerHTML = `<div class="p-20 text-center text-slate-300 italic">Módulo de ventas en sincronización...</div>`; }

        async function renderTablaHistorial(coleccion, esIngreso) {
            const container = document.getElementById('historial-data-container');
            container.innerHTML = `<div class="p-10 text-center"><i class="fas fa-circle-notch animate-spin text-pavo-real text-3xl"></i></div>`;
            db.collection(coleccion).orderBy("fecha", "desc").onSnapshot(snap => {
                let html = `<table class="w-full text-left"><thead class="bg-slate-50 border-b border-slate-100"><tr><th class="p-6 text-[10px] font-black text-slate-400 uppercase">Producto</th><th class="p-6 text-[10px] font-black text-slate-400 uppercase">Fecha</th><th class="p-6 text-[10px] font-black text-slate-400 uppercase text-center">Origen</th><th class="p-6 text-[10px] font-black text-slate-400 uppercase text-center">Destino</th><th class="p-6 text-[10px] font-black text-slate-400 uppercase text-right">Usuario</th></tr></thead><tbody class="divide-y divide-slate-50">`;
                let count = 0;
                snap.forEach(doc => { const t = doc.data(); const isIng = t.origen === "INGRESO INICIAL"; if(esIngreso === isIng) { count++; const fecha = t.fecha ? t.fecha.toDate().toLocaleString('es-ES') : 'Reciente'; html += `<tr class="hover:bg-slate-50"><td class="p-6 font-bold text-slate-600 text-xs">${t.producto}</td><td class="p-6 text-[11px] font-medium text-slate-400 tabular-nums">${fecha}</td><td class="p-6 text-center"><span class="bg-slate-100 text-slate-400 px-3 py-1 rounded-full font-black text-[9px] uppercase italic">${t.origen}</span></td><td class="p-6 text-center"><span class="${esIngreso ? 'bg-green-100 text-green-600' : 'bg-orange-100 text-orange-600'} px-3 py-1 rounded-full font-black text-[9px] uppercase italic">${t.destino}</span></td><td class="p-6 text-right font-black text-pavo-real text-[10px] uppercase">${t.usuario}</td></tr>`; } });
                if(count === 0) html += `<tr><td colspan="5" class="p-20 text-center italic text-slate-300">No hay registros</td></tr>`;
                html += `</tbody></table>`; container.innerHTML = html;
            });
        }

        async function cargarEstadisticasDashboard() {
            const h = new Date(); h.setHours(0,0,0,0); const aI = new Date(h); aI.setDate(h.getDate()-1); const aF = new Date(h); aF.setMilliseconds(-1); const mI = new Date(h.getFullYear(), h.getMonth(), 1); const yI = new Date(h.getFullYear(), 0, 1);
            db.collection("ventas").onSnapshot(snap => {
                let totals = { hoy: 0, ayer: 0, mes: 0, año: 0 }; let mapSedes = { "Filandia 1": "1", "Filandia 2": "2", "Cable Plaza": "3", "Fundadores": "4", "Jardín": "5", "Online": "6" }; let bVals = { hoy: {}, ayer: {}, mes: {}, año: {} }; [1,2,3,4,5,6].forEach(i => { bVals.hoy[i]=0; bVals.ayer[i]=0; bVals.mes[i]=0; bVals.año[i]=0; });
                snap.forEach(doc => { const v = doc.data(), f = v.fecha ? v.fecha.toDate() : new Date(), t = v.total || 0, n = mapSedes[v.sede] || null, isOwn = v.sede === currentUserData.sede; if(f >= h) { if(currentUserData.rol === 'admin' || isOwn) totals.hoy += t; if(n) bVals.hoy[n] += t; } if(f >= aI && f <= aF) { if(currentUserData.rol === 'admin' || isOwn) totals.ayer += t; if(n) bVals.ayer[n] += t; } if(f >= mI) { if(currentUserData.rol === 'admin' || isOwn) totals.mes += t; if(n) bVals.mes[n] += t; } if(f >= yI) { if(currentUserData.rol === 'admin' || isOwn) totals.año += t; if(n) bVals.año[n] += t; } });
                ['dash-total-hoy','dash-total-ayer','dash-total-mes','dash-total-año'].forEach(id => { const el = document.getElementById(id); if(el) { const k = id.replace('dash-total-',''); el.innerText = `$${(totals[k] || 0).toLocaleString()}`; } });
                if(currentUserData.rol === 'admin') { [1,2,3,4,5,6].forEach(i => { ['hoy','ayer','mes','año'].forEach(p => { const bEl = document.getElementById(`val-${p}-${i}`); if(bEl) bEl.innerText = `$${bVals[p][i].toLocaleString()}`; }); }); }
            });
        }

        function filtrarVenta(q) {
            const query = q.toLowerCase().trim(); const list = document.getElementById('search-results-list') || document.getElementById('inventory-list'); if(!list) return; 
            const stats = document.getElementById('stats-container');
            if(!query) { list.innerHTML = ''; if(stats) stats.classList.remove('hidden'); return; }
            if(stats) stats.classList.add('hidden');
            const filtered = productosData.filter(p => { const sM = p.nombre.toLowerCase().includes(query) || (p.categoria && p.categoria.toLowerCase().includes(query)); if(currentUserData.rol === 'admin') return sM; return sM && p.sede_ubicacion === currentUserData.sede; });
            renderResultados(filtered, list);
        }

        function renderResultados(data, container) {
            let html = "";
            data.forEach(p => {
                const isAdmin = currentUserData.rol === 'admin';
                html += `<div class="bg-white p-6 rounded-[2.5rem] stat-row flex items-center gap-10 animate-in"><div class="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-300 text-xl"><i class="fas fa-gem"></i></div><div class="flex-1"><p class="text-[8px] font-black text-orange-500 uppercase tracking-widest mb-1 italic leading-none">${p.categoria}</p><h3 class="font-black text-slate-600 text-lg uppercase truncate leading-tight">${p.nombre}</h3></div><div class="text-center min-w-[120px] border-l border-slate-50 pl-4"><span class="bg-pavo-real text-white text-[9px] px-3 py-1 rounded-full font-black uppercase italic">${p.sede_ubicacion}</span><p class="font-black text-base mt-1 text-slate-800 tabular-nums">${p.stock} Unid.</p></div><div class="text-right min-w-[120px] border-l border-slate-50 pl-4"><p class="font-black text-pavo-real text-xl tabular-nums">$${p.precio.toLocaleString()}</p></div><div class="flex gap-2 border-l border-slate-50 pl-4">${isAdmin ? `<button onclick="verFicha('${p.id}')" class="text-slate-300 hover:text-pavo-real transition-all text-xl bg-transparent border-0 cursor-pointer shadow-sm"><i class="fas fa-edit"></i></button>` : `<button onclick="agregarCarrito('${p.id}')" class="bg-orange-500 text-white px-6 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest active:scale-95 border-0 cursor-pointer">Agregar</button>`}</div></div>`;
            });
            container.innerHTML = html || '<div class="text-center p-10 text-slate-300 italic uppercase">Sin resultados</div>';
        }

        function verFicha(id) {
            const m = document.getElementById('main-modal'), c = document.getElementById('modal-content'); document.getElementById('modal-title').innerText = id ? "Ficha de Producto" : "Nuevo Ingreso";
            const p = id ? productosData.find(item => item.id === id) : { nombre: '', precio: 0, stock: 0, categoria: 'Mochilas', precio_compra: 0, stock_ideal: 0, sede_ubicacion: 'Bodega' };
            c.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-10 text-left animate-in"><div class="space-y-6"><div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block ml-2">Nombre Comercial</label><input id="edit-nombre" type="text" value="${p.nombre}" class="w-full p-5 bg-white rounded-3xl border-0 ring-1 ring-slate-100 font-bold outline-none text-pavo-real uppercase text-lg shadow-sm"></div><div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block ml-2">Categoría</label><select id="edit-categoria" class="w-full p-5 bg-white rounded-3xl border-0 ring-1 ring-slate-100 font-bold text-pavo-real uppercase shadow-sm">${listaCategorias.map(cat => `<option value="${cat}" ${p.categoria === cat ? 'selected' : ''}>${cat}</option>`).join('')}</select></div><div><label class="text-[10px] font-black text-orange-500 uppercase tracking-widest mb-2 block ml-2 italic">Ubicación Actual</label><select id="edit-sede" class="w-full p-5 bg-white rounded-3xl border-0 ring-1 ring-orange-100 font-black text-orange-600 uppercase shadow-sm">${["Bodega", "Filandia 1", "Filandia 2", "Cable Plaza", "Fundadores", "Jardín", "Online"].map(s => `<option value="${s}" ${p.sede_ubicacion === s ? 'selected' : ''}>${s}</option>`).join('')}</select></div></div><div class="bg-white p-8 rounded-[3.5rem] border border-slate-100 shadow-xl space-y-6"><div class="grid grid-cols-2 gap-6"><div><label class="text-[9px] font-black text-slate-400 mb-2 block text-center uppercase font-black">Venta</label><input id="edit-precio" type="number" value="${p.precio}" class="w-full p-5 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-100 font-black text-pavo-real text-center text-xl"></div><div><label class="text-[9px] font-black text-slate-400 mb-2 block text-center uppercase font-black">Costo</label><input id="edit-compra" type="number" value="${p.precio_compra}" class="w-full p-5 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-100 font-black text-slate-400 text-center text-xl"></div></div><div class="grid grid-cols-2 gap-6"><div><label class="text-[9px] font-black text-slate-400 mb-2 block text-center uppercase font-black">Stock</label><input id="edit-stock" type="number" value="${p.stock}" class="w-full p-5 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-100 font-black text-pavo-real text-center text-xl"></div><div><label class="text-[9px] font-black text-slate-400 mb-2 block text-center uppercase font-black">Ideal</label><input id="edit-ideal" type="number" value="${p.stock_ideal}" class="w-full p-5 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-100 font-black text-slate-400 text-center text-xl"></div></div><button onclick="guardarCambios('${id}')" class="w-full bg-slate-900 text-white py-6 rounded-3xl font-black uppercase text-xs tracking-widest hover:bg-green-600 transition-all mt-4 border-0 cursor-pointer shadow-lg">Guardar Registro</button></div></div>`;
            m.classList.remove('hidden');
        }

        function agregarCarrito(id) { const p = productosData.find(item => item.id === id); const ex = carrito.find(item => item.id === id); if(ex) { if(ex.cant < p.stock) ex.cant++; } else carrito.push({ ...p, cant: 1 }); renderCarrito(); }
        function renderCarrito() { const b = document.getElementById('sidebar-cesta'), l = document.getElementById('cesta-items'); if(carrito.length === 0) { b.classList.add('hidden'); return; } b.classList.remove('hidden'); let html = ""; let total = 0; carrito.forEach((item, i) => { total += item.precio * item.cant; html += `<div class="bg-white/5 p-3 rounded-2xl flex items-center justify-between border border-white/5 animate-in mb-2"><div class="min-w-0 flex-1 text-left"><p class="text-[9px] font-black text-white truncate uppercase mb-1">${item.nombre}</p><p class="text-[10px] text-orange-400 font-bold">$${(item.precio * item.cant).toLocaleString()}</p></div><div class="flex items-center gap-2 bg-slate-900 p-1 rounded-xl"><button onclick="cambiarCant(${i},-1)" class="text-white font-bold w-5 border-0 bg-transparent">-</button><span class="text-[10px] font-bold text-white">${item.cant}</span><button onclick="cambiarCant(${i},1)" class="text-white font-bold w-5 border-0 bg-transparent">+</button></div></div>`; }); l.innerHTML = html; document.getElementById('cesta-total').innerText = `$${total.toLocaleString()}`; }
        function cambiarCant(i, d) { const item = carrito[i]; item.cant += d; if(item.cant <= 0) carrito.splice(i, 1); else { const prod = productosData.find(p => p.id === item.id); if(item.cant > prod.stock) item.cant = prod.stock; } renderCarrito(); }
        async function finalizarVenta() { if(carrito.length === 0) return; try { const total = carrito.reduce((s, i) => s + (i.precio * i.cant), 0); await db.collection("ventas").add({ fecha: firebase.firestore.FieldValue.serverTimestamp(), vendedor: vendedorActivo, sede: currentUserData.sede, total: total, items: carrito.map(i => ({nombre: i.nombre, cant: i.cant, sub: i.precio * i.cant})) }); const batch = db.batch(); carrito.forEach(item => { const ref = db.collection("productos").doc(item.id); batch.update(ref, { stock: firebase.firestore.FieldValue.increment(-item.cant) }); }); await batch.commit(); alert("✅ Completada"); carrito = []; renderCarrito(); navegar('inicio'); } catch (e) { alert("Error"); } }
        function cerrarModal() { document.getElementById('main-modal').classList.add('hidden'); }
        function gestionCategorias() { const modal = document.getElementById('main-modal'), content = document.getElementById('modal-content'); document.getElementById('modal-title').innerText = "Categorías"; content.innerHTML = `<div class="space-y-6"><div class="flex gap-4"><input id="nueva-cat" type="text" class="flex-1 p-5 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-100 font-bold outline-none text-pavo-real uppercase" placeholder="Nombre..."><button onclick="addCategoria()" class="bg-slate-900 text-white px-8 rounded-2xl font-black border-0 cursor-pointer shadow-md">Añadir</button></div><div class="pt-6 border-t border-slate-100 flex flex-wrap gap-2">${listaCategorias.map(c => `<span class="bg-white px-4 py-2 rounded-xl text-[10px] font-bold border border-slate-100 text-pavo-real uppercase shadow-sm">${c}</span>`).join('')}</div></div>`; modal.classList.remove('hidden'); }
        async function addCategoria() { const val = document.getElementById('nueva-cat').value; if(!val) return; listaCategorias.push(val); await db.collection("configuracion").doc("categorias").set({ lista: listaCategorias }); alert("Añadida"); gestionCategorias(); }
        function modalCargaMasiva() { const modal = document.getElementById('main-modal'), content = document.getElementById('modal-content'); document.getElementById('modal-title').innerText = "Carga Masiva Excel"; content.innerHTML = `<div class="space-y-8"><div class="bg-blue-50 p-6 rounded-[2rem] text-[10px] border border-blue-100 uppercase font-bold italic text-blue-800">nombre, categoria, precio, costo, stock, ideal, sede</div><div class="border-4 border-dashed border-slate-100 p-16 rounded-[3rem] text-center"><i class="fas fa-cloud-upload-alt text-5xl text-slate-200 mb-6"></i><br><input type="file" id="excel-input" accept=".xlsx" class="hidden" onchange="procesarExcel(event)"><button onclick="document.getElementById('excel-input').click()" class="bg-slate-900 text-white px-10 py-5 rounded-2xl font-black uppercase text-[10px] cursor-pointer shadow-lg">Cargar</button></div><div id="excel-preview" class="hidden"><button onclick="confirmarSubida()" class="w-full bg-blue-600 text-white py-6 rounded-3xl font-black uppercase text-xs border-0 cursor-pointer shadow-xl">Confirmar</button></div></div>`; modal.classList.remove('hidden'); }
        let datosExcel = []; function procesarExcel(e) { const file = e.target.files[0], reader = new FileReader(); reader.onload = (evt) => { const bstr = evt.target.result, wb = XLSX.read(bstr, { type: 'binary' }), ws = wb.Sheets[wb.SheetNames[0]], data = XLSX.utils.sheet_to_json(ws); datosExcel = data.map(item => ({ nombre: item.nombre || "Sin Nombre", categoria: item.categoria || "Mochilas", precio: parseInt(item.precio) || 0, precio_compra: parseInt(item.costo) || 0, stock: parseInt(item.stock) || 0, stock_ideal: parseInt(item.ideal) || 0, sede_ubicacion: item.sede || "Bodega", fecha_ingreso: firebase.firestore.Timestamp.now() })); document.getElementById('excel-preview').classList.remove('hidden'); }; reader.readAsBinaryString(file); }
        async function confirmarSubida() { if(datosExcel.length === 0) return; try { const batch = db.batch(); datosExcel.forEach(p => { const ref = db.collection("productos").doc(); batch.set(ref, p); }); await batch.commit(); alert("✅ Éxito"); cerrarModal(); } catch (err) { alert("Error"); } }
    </script>
</body>
