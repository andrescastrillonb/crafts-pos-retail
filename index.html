<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crafts POS | Enterprise Management</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1041/1041916.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .animate-in { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .bg-petrol { background-color: #0f1d24; }
        .text-pavo-real { color: #004B8D; }
        .bg-pavo-real { background-color: #004B8D; }
        .modal-overlay { background: rgba(15, 29, 36, 0.98); backdrop-filter: blur(15px); }
        .stat-row, .action-module { transition: all 0.3s ease; border: 1px solid #f1f5f9; }
        .stat-row:hover, .action-module:hover { transform: scale(1.005); background-color: #ffffff; box-shadow: 0 15px 45px -15px rgba(0,75,141,0.12); }
        .nav-active { background-color: rgba(255, 255, 255, 0.1) !important; color: white !important; }
        .sidebar-scroll { max-height: calc(100vh - 550px); overflow-y: auto; }
        input, select { transition: all 0.2s ease; outline: none; }
    </style>
</head>
<body class="text-slate-700">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6 bg-petrol">
        <div class="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-md animate-in border border-white/10 text-center">
            <h1 class="text-3xl font-black text-slate-500 mb-8 uppercase tracking-tighter italic">CRAFTS POS</h1>
            <div class="space-y-4 text-left">
                <input id="login-email" type="email" placeholder="Usuario / Sede" class="w-full p-4 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-slate-400 font-medium uppercase">
                <input id="login-pass" type="password" placeholder="Contraseña" class="w-full p-4 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-slate-400 font-medium">
                <input id="login-vendedor" type="text" placeholder="Nombre del Vendedor" class="w-full p-4 bg-orange-50 rounded-2xl border-0 ring-1 ring-orange-200 focus:ring-2 focus:ring-orange-400 font-bold uppercase text-pavo-real">
                <button onclick="iniciarSesion()" class="w-full bg-slate-700 text-white p-5 rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-lg uppercase tracking-widest text-xs mt-4">Entrar al Sistema</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden flex min-h-screen">
        <aside class="w-20 md:w-56 bg-petrol text-white flex flex-col z-20 shadow-2xl transition-all">
            <div class="p-6 flex items-center gap-3 border-b border-white/5">
                <div class="w-8 h-8 bg-orange-500 rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-gem text-white text-xs"></i></div>
                <div class="hidden md:block leading-tight text-left italic">
                    <p class="font-black text-[9px] tracking-widest text-slate-500 uppercase leading-none mb-1">Central Hub</p>
                    <p id="sidebar-sede-name" class="font-bold text-white text-[10px] uppercase">Sede...</p>
                </div>
            </div>
            
            <nav id="nav-menu" class="p-4 mt-10 space-y-2 flex-1 hide-scroll"></nav>

            <div id="sidebar-cesta" class="hidden p-4 border-t border-white/5 animate-in">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-4 italic">Cesta de Venta</p>
                <div id="cesta-items" class="sidebar-scroll space-y-3 hide-scroll"></div>
                <div class="mt-6 pt-4 border-t border-white/10 text-right">
                    <span id="cesta-total" class="block font-black text-xl text-orange-500 tabular-nums mb-4">$0</span>
                    <button onclick="finalizarVenta()" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-orange-600 transition-all shadow-lg">Finalizar</button>
                </div>
            </div>

            <div class="p-4 border-t border-white/5 text-center">
                <button onclick="cerrarSesion()" class="w-full flex items-center justify-center gap-3 p-3 rounded-xl hover:bg-white/5 text-slate-500 border-0 bg-transparent cursor-pointer font-bold transition-all text-[10px] uppercase tracking-widest">
                    <i class="fas fa-power-off"></i><span class="hidden md:block ml-2">Salir</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-28 bg-slate-900 px-10 flex items-center justify-between z-10 border-b border-white/5">
                <div class="flex items-center gap-6 text-white text-left italic">
                    <div class="flex flex-col">
                        <span id="label-sede-top" class="text-[9px] bg-orange-500 text-white px-2 py-0.5 rounded font-black uppercase tracking-tighter w-fit mb-1">...</span>
                        <span id="current-vendedor-display" class="font-bold text-xs text-slate-400 uppercase tracking-widest">Vendedor</span>
                    </div>
                </div>
                <div class="flex flex-col items-center">
                    <span id="header-date" class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 italic">...</span>
                    <span id="header-time" class="text-3xl font-black text-white tabular-nums tracking-widest uppercase leading-none">00:00:00</span>
                </div>
                <div class="flex items-center gap-3 bg-white/5 px-6 py-3 rounded-2xl border border-white/5">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-lg shadow-green-500/20"></div>
                    <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest italic">SISTEMA ACTIVO</span>
                </div>
            </header>
            <section id="view-container" class="flex-1 overflow-y-auto p-12 relative bg-slate-50"></section>
        </main>
    </div>

    <div id="main-modal" class="hidden fixed inset-0 z-[110] modal-overlay flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-4xl rounded-[3.5rem] shadow-2xl overflow-hidden animate-in">
            <div class="bg-slate-900 p-8 text-white flex justify-between items-center border-b border-white/10 italic">
                <h2 id="modal-title" class="font-black text-2xl italic tracking-tighter uppercase leading-none">Consulta</h2>
                <button onclick="cerrarModal()" class="text-slate-400 hover:text-white text-3xl bg-transparent border-0 cursor-pointer transition-all"><i class="fas fa-times-circle"></i></button>
            </div>
            <div id="modal-content" class="p-10 max-h-[80vh] overflow-y-auto hide-scroll bg-slate-50/30 relative"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAEzn4UvflaiWEaXCLkPxYKDcK5HCtaYZk", authDomain: "crafts-colombia-pos.firebaseapp.com", projectId: "crafts-colombia-pos", storageBucket: "crafts-colombia-pos.firebasestorage.app", messagingSenderId: "924957968575", appId: "1:924957968575:web:12be975b2346dcdf585e0a" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth(); const db = firebase.firestore();
        
        let currentUserData = null, productosData = [], listaCategorias = [], listaProveedores = [], carrito = [];
        let vendedorActivo = localStorage.getItem('vendedor_nombre') || "";

        function updateClock() { const now = new Date(); document.getElementById('header-time').innerText = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' }); if(document.getElementById('header-date')) document.getElementById('header-date').innerText = now.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'short' }); }
        setInterval(updateClock, 1000);

        async function iniciarSesion() { 
            const email = document.getElementById('login-email').value, pass = document.getElementById('login-pass').value, vend = document.getElementById('login-vendedor').value.trim();
            if(!vend) return alert("Indica el nombre del vendedor.");
            auth.signInWithEmailAndPassword(email, pass).then(() => { localStorage.setItem('vendedor_nombre', vend.toUpperCase()); vendedorActivo = vend.toUpperCase(); }).catch(() => alert("Credenciales incorrectas.")); 
        }

        function cerrarSesion() { localStorage.removeItem('vendedor_nombre'); auth.signOut(); location.reload(); }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const doc = await db.collection('usuarios').doc(user.email).get();
                currentUserData = doc.data() || { rol: 'vendedor', sede: 'Sin Sede' };
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('sidebar-sede-name').innerText = currentUserData.sede;
                document.getElementById('label-sede-top').innerText = "SEDE " + currentUserData.sede;
                document.getElementById('current-vendedor-display').innerText = vendedorActivo || "SOPORTE";
                escucharCategorias(); renderSidebar(currentUserData.rol); navegar('inicio');
                db.collection("productos").onSnapshot(snap => { productosData = []; snap.forEach(d => productosData.push({id: d.id, ...d.data()})); });
            } else { document.getElementById('login-screen').classList.remove('hidden'); document.getElementById('main-app').classList.add('hidden'); }
        });

        function escucharCategorias() { db.collection("configuracion").doc("categorias").onSnapshot(doc => { if(doc.exists) listaCategorias = doc.data().lista || []; }); }

        function renderSidebar(rol) {
            const nav = document.getElementById('nav-menu');
            let menu = `<button onclick="navegar('inicio')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all"><i class="fas fa-th-large"></i><span class="hidden md:block">Inicio</span></button>`;
            if (rol === 'admin' || rol === 'control') {
                menu += `<button onclick="navegar('productos')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all"><i class="fas fa-boxes"></i><span class="hidden md:block">Logística</span></button>`;
                menu += `<button onclick="navegar('historial')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all"><i class="fas fa-history"></i><span class="hidden md:block">Historial</span></button>`;
            }
            nav.innerHTML = menu;
        }

        function navegar(vista) {
            const container = document.getElementById('view-container');
            if (vista === 'inicio') {
                container.innerHTML = `
                    <div class="animate-in max-w-7xl mx-auto pt-4 text-center">
                        <h1 class="text-7xl font-black tracking-tighter text-slate-500 mb-2 italic leading-none uppercase">Crafts Colombia</h1>
                        <p class="text-orange-500 font-bold uppercase tracking-[0.5em] text-xs italic mb-12">SEDE ${currentUserData.sede}</p>
                        
                        <div class="max-w-2xl mx-auto relative mb-12">
                            <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-200 text-xl"></i>
                            <input id="global-search" onkeyup="filtrarVenta(this.value)" type="text" placeholder="Buscar por nombre o categoría..." class="w-full pl-16 pr-6 py-6 bg-white rounded-full border border-slate-100 shadow-2xl outline-none text-lg font-medium focus:ring-4 focus:ring-slate-100 transition-all">
                        </div>

                        <div class="mb-12">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 italic text-left ml-4">Favoritos / Más Vendidos en Sede</p>
                            <div id="top-products-grid" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
                        </div>

                        <div id="search-results-list" class="space-y-4 mb-12 text-left"></div>

                        <div class="bg-white p-8 md:p-12 rounded-[4rem] stat-row flex flex-col md:flex-row gap-12 border-orange-200 border-2 animate-in text-left">
                            <div class="min-w-[280px] border-b md:border-b-0 md:border-r border-slate-100 pb-8 md:pb-0 md:pr-12">
                                <p class="text-xs font-black text-orange-500 uppercase tracking-widest mb-2 italic">Turno de ${vendedorActivo}</p>
                                <h3 class="text-xl font-black text-pavo-real uppercase tracking-tighter mb-2 italic">Total Ventas Hoy</h3>
                                <h3 id="dash-total-hoy" class="text-6xl font-black text-orange-500 tabular-nums leading-none tracking-tighter">$0</h3>
                            </div>
                            <div class="flex-1">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 italic leading-none">Relación de Artículos Vendidos en el Turno</p>
                                <div id="shift-sales-list" class="max-h-[200px] overflow-y-auto space-y-3 hide-scroll pr-2">
                                    <p class="text-slate-300 italic text-sm">No hay ventas registradas aún...</p>
                                </div>
                            </div>
                        </div>
                    </div>`;
                cargarEstadisticasDashboard();
            }
            // Mantenemos las otras vistas sin cambios para asegurar integridad...
            else if (vista === 'productos') { /* ... (Lógica de logística existente) ... */ }
        }

        // --- MOTOR DE BÚSQUEDA Y RANKING (PRECISIÓN QUIRÚRGICA) ---
        function filtrarVenta(q) {
            const query = q.toLowerCase().trim();
            const list = document.getElementById('search-results-list');
            if(!list) return;
            if(!query) { list.innerHTML = ''; return; }

            const filtered = productosData.filter(p => {
                const matchSearch = p.nombre.toLowerCase().includes(query) || (p.categoria && p.categoria.toLowerCase().includes(query));
                // Regla Vendedor: Solo ve su sede
                if(currentUserData.rol !== 'admin') {
                    return matchSearch && p.sede_ubicacion === currentUserData.sede;
                }
                return matchSearch;
            });
            renderResultados(filtered, list);
        }

        function renderResultados(data, container) {
            let html = "";
            data.forEach(p => {
                html += `
                    <div class="bg-white p-6 rounded-[2.5rem] stat-row flex items-center gap-10 animate-in">
                        <div class="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-300 text-xl"><i class="fas fa-gem"></i></div>
                        <div class="flex-1">
                            <p class="text-[8px] font-black text-orange-500 uppercase tracking-widest mb-1 italic leading-none">${p.categoria}</p>
                            <h3 class="font-black text-slate-600 text-lg uppercase truncate leading-tight">${p.nombre}</h3>
                        </div>
                        <div class="text-center min-w-[140px] border-l border-slate-50 pl-4">
                            <span class="bg-orange-500 text-white text-[11px] px-4 py-2 rounded-full font-black uppercase italic shadow-lg">${p.sede_ubicacion}</span>
                            <p class="font-black text-base mt-2 text-slate-800 tabular-nums">${p.stock} Unid.</p>
                        </div>
                        <div class="text-right min-w-[120px] border-l border-slate-50 pl-4">
                            <p class="font-black text-pavo-real text-xl tabular-nums">$${p.precio.toLocaleString()}</p>
                        </div>
                        <div class="flex gap-2 border-l border-slate-50 pl-4">
                            <button onclick="agregarCarrito('${p.id}')" class="bg-orange-500 text-white px-6 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest active:scale-95 border-0 cursor-pointer shadow-lg shadow-orange-900/10">Agregar</button>
                        </div>
                    </div>`;
            });
            container.innerHTML = html || '<div class="text-center p-10 text-slate-300 italic uppercase font-black text-[10px]">Sin existencias en esta sede.</div>';
        }

        async function cargarEstadisticasDashboard() {
            const hoyStart = new Date(); hoyStart.setHours(0,0,0,0);
            
            db.collection("ventas").where("sede", "==", currentUserData.sede)
              .onSnapshot(snap => {
                let totalHoy = 0;
                let itemsTurno = [];
                let rankingCount = {};

                snap.forEach(doc => {
                    const v = doc.data();
                    const fecha = v.fecha ? v.fecha.toDate() : new Date();
                    
                    // Solo ventas de hoy
                    if(fecha >= hoyStart) {
                        totalHoy += v.total || 0;
                        v.items.forEach(item => {
                            itemsTurno.push({ ...item, hora: fecha.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'}) });
                            rankingCount[item.nombre] = (rankingCount[item.nombre] || 0) + item.cant;
                        });
                    }
                });

                // Actualizar valor total
                const totalEl = document.getElementById('dash-total-hoy');
                if(totalEl) totalEl.innerText = `$${totalHoy.toLocaleString()}`;

                // Actualizar relación de artículos vendidos hoy
                const shiftList = document.getElementById('shift-sales-list');
                if(shiftList) {
                    if(itemsTurno.length > 0) {
                        shiftList.innerHTML = itemsTurno.reverse().map(item => `
                            <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                <div class="flex items-center gap-3">
                                    <span class="bg-pavo-real text-white text-[9px] px-2 py-1 rounded font-black">${item.cant}</span>
                                    <p class="font-bold text-xs text-slate-600 uppercase truncate max-w-[150px]">${item.nombre}</p>
                                </div>
                                <p class="text-[10px] font-black text-orange-500 tabular-nums">$${item.sub.toLocaleString()}</p>
                            </div>
                        `).join('');
                    } else {
                        shiftList.innerHTML = '<p class="text-slate-300 italic text-sm">Sin ventas registradas en el turno...</p>';
                    }
                }

                // Generar Ranking "Top 10" para acceso directo
                const topGrid = document.getElementById('top-products-grid');
                if(topGrid) {
                    const sortedRanking = Object.entries(rankingCount)
                        .sort(([,a],[,b]) => b - a)
                        .slice(0, 10);

                    topGrid.innerHTML = sortedRanking.map(([name]) => {
                        const prod = productosData.find(p => p.nombre === name);
                        if(!prod) return '';
                        return `
                            <button onclick="agregarCarrito('${prod.id}')" class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm hover:shadow-lg transition-all text-left group">
                                <div class="w-8 h-8 bg-slate-50 rounded-xl mb-2 flex items-center justify-center text-slate-400 group-hover:bg-orange-500 group-hover:text-white transition-colors">
                                    <i class="fas fa-bolt text-xs"></i>
                                </div>
                                <p class="text-[9px] font-black text-slate-400 uppercase leading-none mb-1">Populares</p>
                                <p class="font-bold text-[11px] text-pavo-real uppercase truncate">${name}</p>
                            </button>
                        `;
                    }).join('') || '<p class="text-slate-200 italic text-xs col-span-full">El ranking aparecerá con las primeras ventas del día.</p>';
                }
            });
        }

        // --- FUNCIONES DE SOPORTE MANTENIDAS ---
        function agregarCarrito(id) {
            const p = productosData.find(item => item.id === id);
            const ex = carrito.find(item => item.id === id);
            if(ex) { if(ex.cant < p.stock) ex.cant++; } else carrito.push({ ...p, cant: 1 });
            renderCarrito();
        }

        function renderCarrito() {
            const b = document.getElementById('sidebar-cesta'), l = document.getElementById('cesta-items');
            if(carrito.length === 0) { b.classList.add('hidden'); return; }
            b.classList.remove('hidden');
            let html = "", total = 0;
            carrito.forEach((item, i) => {
                total += item.precio * item.cant;
                html += `<div class="bg-white/5 p-3 rounded-2xl flex items-center justify-between border border-white/5 animate-in mb-2"><div class="min-w-0 flex-1 text-left"><p class="text-[9px] font-black text-white truncate uppercase mb-1 leading-none italic">${item.nombre}</p><p class="text-[10px] text-orange-400 font-bold">$${(item.precio * item.cant).toLocaleString()}</p></div><div class="flex items-center gap-2 bg-slate-900 p-1 rounded-xl"><button onclick="cambiarCant(${i},-1)" class="text-white font-bold w-5 border-0 bg-transparent cursor-pointer">-</button><span class="text-[10px] font-bold text-white">${item.cant}</span><button onclick="cambiarCant(${i},1)" class="text-white font-bold w-5 border-0 bg-transparent cursor-pointer">+</button></div></div>`;
            });
            l.innerHTML = html;
            document.getElementById('cesta-total').innerText = `$${total.toLocaleString()}`;
        }

        function cambiarCant(i, d) {
            const item = carrito[i]; item.cant += d;
            if(item.cant <= 0) carrito.splice(i, 1);
            else { const prod = productosData.find(p => p.id === item.id); if(item.cant > prod.stock) item.cant = prod.stock; }
            renderCarrito();
        }

        async function finalizarVenta() {
            if(carrito.length === 0) return;
            try {
                const total = carrito.reduce((s, i) => s + (i.precio * i.cant), 0);
                const batch = db.batch();
                const ventaRef = db.collection("ventas").doc();
                batch.set(ventaRef, {
                    fecha: firebase.firestore.FieldValue.serverTimestamp(),
                    vendedor: vendedorActivo,
                    sede: currentUserData.sede,
                    total: total,
                    items: carrito.map(i => ({nombre: i.nombre, cant: i.cant, sub: i.precio * i.cant}))
                });
                carrito.forEach(item => {
                    const pRef = db.collection("productos").doc(item.id);
                    batch.update(pRef, { stock: firebase.firestore.FieldValue.increment(-item.cant) });
                    const tRef = db.collection("traslados").doc();
                    batch.set(tRef, { producto: item.nombre, fecha: firebase.firestore.FieldValue.serverTimestamp(), origen: currentUserData.sede, destino: "CLIENTE (VENTA)", usuario: vendedorActivo });
                });
                await batch.commit();
                alert("✅ Venta registrada en el turno.");
                carrito = []; renderCarrito(); navegar('inicio');
            } catch (e) { alert("Error al cobrar."); }
        }

        function cerrarModal() { document.getElementById('main-modal').classList.add('hidden'); }
    </script>
</body>
</html>
