<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crafts POS | Enterprise Management</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1041/1041916.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .animate-in { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .bg-petrol { background-color: #0f1d24; }
        .bg-pavo-real { background-color: #004B8D; }
        .modal-overlay { background: rgba(15, 29, 36, 0.98); backdrop-filter: blur(15px); }
        .stat-row, .action-module { transition: all 0.3s ease; border: 1px solid #f1f5f9; }
        .stat-row:hover, .action-module:hover { transform: scale(1.005); background-color: #ffffff; box-shadow: 0 15px 45px -15px rgba(0,75,141,0.12); }
        .nav-active { background-color: rgba(255, 255, 255, 0.1) !important; color: white !important; }
        .sidebar-scroll { max-height: calc(100vh - 550px); overflow-y: auto; }
        input, select { transition: all 0.2s ease; outline: none; }
    </style>
</head>
<body class="text-slate-700">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6 bg-petrol">
        <div class="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-md animate-in border border-white/10 text-center">
            <h1 class="text-3xl font-black text-slate-500 mb-8 uppercase tracking-tighter italic">CRAFTS POS</h1>
            <div class="space-y-4 text-left">
                <input id="login-email" type="email" placeholder="Usuario / Sede" class="w-full p-4 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-slate-400 font-medium uppercase">
                <input id="login-pass" type="password" placeholder="Contraseña" class="w-full p-4 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-slate-400 font-medium">
                <input id="login-vendedor" type="text" placeholder="¿Quién opera el turno?" class="w-full p-4 bg-orange-50 rounded-2xl border-0 ring-1 ring-orange-200 focus:ring-2 focus:ring-orange-400 font-bold uppercase text-pavo-real">
                <button onclick="iniciarSesion()" class="w-full bg-slate-700 text-white p-5 rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-lg uppercase tracking-widest text-xs mt-4">Entrar al Sistema</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden flex min-h-screen">
        <aside class="w-20 md:w-56 bg-petrol text-white flex flex-col z-20 shadow-2xl transition-all">
            <div class="p-6 flex items-center gap-3 border-b border-white/5">
                <div class="w-8 h-8 bg-orange-500 rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-gem text-white text-xs"></i></div>
                <div class="hidden md:block leading-tight text-left italic">
                    <p class="font-black text-[9px] tracking-widest text-slate-500 uppercase leading-none mb-1">Central Console</p>
                    <p id="sidebar-sede-name" class="font-bold text-white text-[10px] uppercase italic">Seleccionando...</p>
                </div>
            </div>
            
            <nav id="nav-menu" class="p-4 mt-10 space-y-2 flex-1 hide-scroll"></nav>

            <div id="sidebar-cesta" class="hidden p-4 border-t border-white/5 animate-in">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-4 italic">Cesta de Venta</p>
                <div id="cesta-items" class="sidebar-scroll space-y-3 hide-scroll"></div>
                <div class="mt-6 pt-4 border-t border-white/10 text-right">
                    <span id="cesta-total" class="block font-black text-xl text-orange-500 tabular-nums mb-4">$0</span>
                    <button onclick="finalizarVenta()" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-orange-600 transition-all">Finalizar</button>
                </div>
            </div>

            <div class="p-4 border-t border-white/5 text-center">
                <button onclick="cerrarSesion()" class="w-full flex items-center justify-center gap-3 p-3 rounded-xl hover:bg-white/5 text-slate-500 border-0 bg-transparent cursor-pointer font-bold transition-all text-[10px] uppercase tracking-widest"><i class="fas fa-power-off"></i><span class="hidden md:block ml-2">Salir</span></button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-28 bg-slate-900 px-10 flex items-center justify-between z-10 border-b border-white/5">
                <div class="flex items-center gap-6 text-white text-left italic">
                    <div class="flex flex-col">
                        <span id="label-sede-top" class="text-[9px] bg-orange-500 text-white px-2 py-0.5 rounded font-black uppercase tracking-tighter w-fit mb-1">...</span>
                        <span id="current-vendedor-display" class="font-bold text-xs text-slate-400 uppercase tracking-widest italic">Vendedor</span>
                    </div>
                </div>
                <div class="flex flex-col items-center">
                    <span id="header-date" class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 italic">...</span>
                    <span id="header-time" class="text-3xl font-black text-white tabular-nums tracking-widest uppercase leading-none">00:00:00</span>
                </div>
                <div class="flex items-center gap-3 bg-white/5 px-6 py-3 rounded-2xl border border-white/5">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-lg shadow-green-500/20"></div>
                    <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest italic">Activo</span>
                </div>
            </header>
            <section id="view-container" class="flex-1 overflow-y-auto p-12 relative bg-slate-50"></section>
        </main>
    </div>

    <div id="main-modal" class="hidden fixed inset-0 z-[110] modal-overlay flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-4xl rounded-[3.5rem] shadow-2xl overflow-hidden animate-in">
            <div class="bg-slate-900 p-8 text-white flex justify-between items-center border-b border-white/10 italic text-left">
                <h2 id="modal-title" class="font-black text-2xl italic tracking-tighter uppercase leading-none italic">Operación</h2>
                <button onclick="cerrarModal()" id="btn-close-modal" class="text-slate-400 hover:text-white text-3xl bg-transparent border-0 cursor-pointer transition-all"><i class="fas fa-times-circle"></i></button>
            </div>
            <div id="modal-content" class="p-10 max-h-[85vh] overflow-y-auto hide-scroll bg-slate-50/30 relative"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAEzn4UvflaiWEaXCLkPxYKDcK5HCtaYZk", authDomain: "crafts-colombia-pos.firebaseapp.com", projectId: "crafts-colombia-pos", storageBucket: "crafts-colombia-pos.firebasestorage.app", messagingSenderId: "924957968575", appId: "1:924957968575:web:12be975b2346dcdf585e0a" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth(); const db = firebase.firestore();
        
        let currentUserData = null, sedeActiva = null, productosData = [], listaCategorias = [], listaProveedores = [], carrito = [];
        let vendedorActivo = localStorage.getItem('vendedor_nombre') || "";

        function updateClock() { const now = new Date(); document.getElementById('header-time').innerText = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' }); if(document.getElementById('header-date')) document.getElementById('header-date').innerText = now.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'short' }); }
        setInterval(updateClock, 1000);

        async function iniciarSesion() { 
            const email = document.getElementById('login-email').value, pass = document.getElementById('login-pass').value, vend = document.getElementById('login-vendedor').value.trim();
            if(!vend) return alert("Indica el nombre del vendedor.");
            auth.signInWithEmailAndPassword(email, pass).then(() => { localStorage.setItem('vendedor_nombre', vend.toUpperCase()); vendedorActivo = vend.toUpperCase(); }).catch(() => alert("Credenciales incorrectas.")); 
        }

        function cerrarSesion() { localStorage.removeItem('vendedor_nombre'); auth.signOut(); location.reload(); }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const doc = await db.collection('usuarios').doc(user.email).get();
                currentUserData = doc.data() || { rol: 'vendedor', sede: 'sin_sede' };
                
                // Lógica Quirúrgica: Selector de Sede si tiene múltiples
                if (Array.isArray(currentUserData.sede)) {
                    lanzarSelectorSede(currentUserData.sede);
                } else {
                    fijarSedeOperativa(currentUserData.sede);
                }
                
                escucharCategorias(); escucharProveedores(); renderSidebar(currentUserData.rol);
                db.collection("productos").onSnapshot(snap => { productosData = []; snap.forEach(d => productosData.push({id: d.id, ...d.data()})); });
            } else { document.getElementById('login-screen').classList.remove('hidden'); document.getElementById('main-app').classList.add('hidden'); }
        });

        function lanzarSelectorSede(sedes) {
            const m = document.getElementById('main-modal'), c = document.getElementById('modal-content');
            document.getElementById('modal-title').innerText = "¿En qué punto de venta operarás hoy?";
            document.getElementById('btn-close-modal').style.display = "none"; // Obligatorio elegir
            c.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10 p-4 animate-in">
                    ${sedes.map(s => `
                        <button onclick="fijarSedeOperativa('${s}')" class="bg-white p-12 rounded-[4rem] border-4 border-slate-50 hover:border-orange-500 hover:shadow-2xl transition-all group border-0 cursor-pointer shadow-lg">
                            <i class="fas fa-store text-5xl text-slate-100 group-hover:text-orange-500 mb-6 block"></i>
                            <span class="font-black text-2xl text-pavo-real uppercase italic tracking-tighter">${s}</span>
                        </button>
                    `).join('')}
                </div>`;
            m.classList.remove('hidden');
        }

        function fijarSedeOperativa(sede) {
            sedeActiva = sede;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('sidebar-sede-name').innerText = sedeActiva.toUpperCase();
            document.getElementById('label-sede-top').innerText = "SEDE " + sedeActiva.toUpperCase();
            document.getElementById('current-vendedor-display').innerText = vendedorActivo || "SOPORTE";
            document.getElementById('btn-close-modal').style.display = "block";
            cerrarModal();
            navegar('inicio');
        }

        function escucharCategorias() { db.collection("configuracion").doc("categorias").onSnapshot(doc => { if(doc.exists) listaCategorias = doc.data().lista || []; }); }
        function escucharProveedores() { db.collection("proveedores").onSnapshot(snap => { listaProveedores = []; snap.forEach(d => listaProveedores.push({id: d.id, ...d.data()})); }); }

        function renderSidebar(rol) {
            const nav = document.getElementById('nav-menu');
            let menu = `<button onclick="navegar('inicio')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all"><i class="fas fa-th-large"></i><span class="hidden md:block">Inicio</span></button>`;
            if (rol === 'admin' || rol === 'control') {
                menu += `<button onclick="navegar('productos')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all"><i class="fas fa-boxes"></i><span class="hidden md:block">Logística</span></button>`;
                menu += `<button onclick="navegar('historial')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all"><i class="fas fa-history"></i><span class="hidden md:block">Historial</span></button>`;
            }
            nav.innerHTML = menu;
        }

        function navegar(vista) {
            const container = document.getElementById('view-container');
            if (vista === 'inicio') {
                container.innerHTML = `
                    <div class="animate-in max-w-7xl mx-auto pt-4 text-center">
                        <h1 class="text-7xl font-black tracking-tighter text-slate-500 mb-2 italic leading-none uppercase">Crafts Colombia</h1>
                        <p class="text-orange-500 font-bold uppercase tracking-[0.5em] text-xs italic mb-16">PUNTO DE VENTA: ${sedeActiva.toUpperCase()}</p>
                        <div class="max-w-2xl mx-auto relative mb-20 flex items-center">
                            <button onclick="ejecutarBusquedaLupa()" class="absolute left-6 z-10 bg-transparent border-0 cursor-pointer text-slate-200 text-xl hover:text-orange-500 transition-colors"><i class="fas fa-search"></i></button>
                            <input id="global-search" onkeyup="filtrarVenta(this.value)" type="text" placeholder="Consultar stock en esta sede..." class="w-full pl-16 pr-6 py-6 bg-white rounded-full border border-slate-100 shadow-2xl outline-none text-lg font-medium focus:ring-4 focus:ring-slate-100 transition-all">
                        </div>
                        <div id="search-results-list" class="space-y-4 mb-12 text-left min-h-[100px]"></div>
                        <div id="stats-container" class="space-y-4"></div>
                    </div>`;
                if(currentUserData.rol === 'admin' || currentUserData.rol === 'control') {
                    const rowGen = (t,l,id,acc=false) => `<div class="${acc?'bg-blue-50':'bg-white'} p-8 rounded-[3rem] stat-row flex items-center gap-8 mb-8 animate-in"><div class="min-w-[220px] border-r border-slate-100 pr-8 text-left"><p class="text-xs font-black uppercase tracking-widest mb-2 italic opacity-40">${l}</p><h3 class="text-sm font-black text-pavo-real uppercase tracking-widest mb-3">${t}</h3><h3 id="dash-total-${id}" class="text-5xl font-black ${id==='hoy'?'text-orange-500':'text-pavo-real'} tabular-nums leading-none tracking-tighter">$0</h3></div><div class="flex-1 grid grid-cols-6 gap-2 text-center">${[1,2,3,4,5,6].map(i=>`<div class="flex flex-col items-center justify-center"><p class="text-4xl font-black ${acc?'text-blue-200':'text-pavo-real'} mb-1 opacity-80 leading-none">${i}</p><span id="val-${id}-${i}" class="font-black text-lg text-slate-800 tabular-nums tracking-tighter leading-none">$0</span></div>`).join('')}</div></div>`;
                    document.getElementById('stats-container').innerHTML = `<div class="bg-white p-12 rounded-[4rem] stat-row flex items-center gap-12 border-orange-200 border-2 mb-12 animate-in text-left"><div class="min-w-[300px] border-r border-slate-100 pr-12"><p class="text-xs font-black text-orange-500 uppercase tracking-widest mb-2 italic leading-none">Turno</p><h3 class="text-xl font-black text-pavo-real uppercase tracking-tighter mb-2 italic">Ventas de Hoy</h3><h3 id="dash-total-hoy" class="text-6xl font-black text-orange-500 tabular-nums leading-none tracking-tighter">$0</h3></div><div class="flex-1 text-right font-bold text-slate-300 uppercase tracking-widest text-xs italic">Cifras en tiempo real</div></div>${rowGen("Cierre Ayer","Corte","ayer")}${rowGen("Global Mes","Acumulado","mes")}${rowGen("Histórico Año","Fiscal 2026","año",true)}`;
                }
                cargarEstadisticasDashboard();
            } else if (vista === 'productos') {
                container.innerHTML = `<div class="animate-in max-w-7xl mx-auto pt-4 text-center"><h1 class="text-5xl font-black tracking-tighter text-slate-500 mb-2 italic uppercase leading-none">Logística Central</h1><div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-16 text-left mt-20"><button onclick="verFicha(null)" class="bg-orange-500 p-8 rounded-[2.5rem] action-module flex items-center gap-6 text-white group border-0 cursor-pointer shadow-xl"><i class="fas fa-plus text-3xl"></i><div><h3 class="font-black text-lg uppercase leading-none">Nuevo Item</h3></div></button><button onclick="gestionCategorias()" class="bg-pavo-real p-8 rounded-[2.5rem] action-module flex items-center gap-6 text-white group border-0 cursor-pointer shadow-xl"><i class="fas fa-tags text-3xl"></i><div><h3 class="font-black text-lg uppercase leading-none">Categorías</h3></div></button><button onclick="modalCargaMasiva()" class="bg-slate-600 p-8 rounded-[2.5rem] action-module flex items-center gap-6 text-white group border-0 cursor-pointer shadow-xl"><i class="fas fa-file-excel text-3xl"></i><div><h3 class="font-black text-lg uppercase leading-none">Excel</h3></div></button><button onclick="gestionProveedores()" class="bg-slate-800 p-8 rounded-[2.5rem] action-module flex items-center gap-6 text-white group border-0 cursor-pointer shadow-xl"><i class="fas fa-truck-loading text-3xl"></i><div><h3 class="font-black text-lg uppercase leading-none">Proveedores</h3></div></button></div><div id="inventory-list" class="space-y-3 text-left"></div></div>`;
            }
        }

        function filtrarVenta(q) {
            const query = q.toLowerCase().trim();
            const list = document.getElementById('search-results-list');
            if(!list) return;
            const filtered = productosData.filter(p => {
                const matchSearch = !query || p.nombre.toLowerCase().includes(query) || (p.categoria && p.categoria.toLowerCase().includes(query));
                // REGLA DE ORO: Filtrado estricto por la sede elegida en el login
                if(currentUserData.rol !== 'admin') {
                    return matchSearch && p.sede_ubicacion === sedeActiva;
                }
                return matchSearch;
            });
            renderResultados(filtered, list);
        }

        function renderResultados(data, container) {
            container.innerHTML = data.map(p => `
                <div class="bg-white p-6 rounded-[2.5rem] stat-row flex items-center gap-10 animate-in">
                    <div class="flex-1">
                        <p class="text-[8px] font-black text-orange-500 uppercase italic leading-none">${p.categoria}</p>
                        <h3 onclick="verDetalleFicha('${p.id}')" class="font-black text-slate-600 text-lg uppercase truncate leading-tight cursor-pointer hover:text-pavo-real transition-all">${p.nombre}</h3>
                    </div>
                    <div class="text-center min-w-[140px] border-l border-slate-50 pl-4">
                        <span class="bg-orange-500 text-white text-[11px] px-4 py-2 rounded-full font-black uppercase shadow-lg">${p.sede_ubicacion}</span>
                        <p class="font-black text-base mt-2 text-slate-800 tabular-nums">${p.stock} Unid.</p>
                    </div>
                    <div class="text-right min-w-[120px] border-l border-slate-50 pl-4">
                        <p class="font-black text-pavo-real text-xl tabular-nums">$${p.precio.toLocaleString()}</p>
                    </div>
                    <div class="flex gap-2 border-l border-slate-50 pl-4">
                        <button onclick="agregarCarrito('${p.id}')" class="bg-orange-500 text-white px-6 py-4 rounded-2xl font-black text-[10px] uppercase border-0 cursor-pointer shadow-lg">Agregar</button>
                    </div>
                </div>`).join('') || '<div class="text-center p-10 text-slate-300 italic uppercase font-black text-[10px]">Sin inventario en esta sede.</div>';
        }

        // --- FUNCIONES SOPORTE ---
        function ejecutarBusquedaLupa() { document.getElementById('global-search').value = ""; filtrarVenta(""); }
        function cerrarModal() { document.getElementById('main-modal').classList.add('hidden'); }
        async function cargarEstadisticasDashboard() { /* Mantenida para admin */ }
        function agregarCarrito(id) { const p = productosData.find(i => i.id === id); const ex = carrito.find(i => i.id === id); if(ex) { if(ex.cant < p.stock) ex.cant++; } else carrito.push({...p, cant: 1}); renderCarrito(); }
        function renderCarrito() { const b = document.getElementById('sidebar-cesta'), l = document.getElementById('cesta-items'); if(carrito.length === 0) { b.classList.add('hidden'); return; } b.classList.remove('hidden'); let total = 0; l.innerHTML = carrito.map((item, i) => { total += item.precio * item.cant; return `<div class="bg-white/5 p-3 rounded-2xl flex items-center justify-between animate-in mb-2"><div class="min-w-0 flex-1 text-left"><p class="text-[9px] font-black text-white truncate uppercase mb-1 leading-none italic">${item.nombre}</p><p class="text-[10px] text-orange-400 font-bold">$${(item.precio * item.cant).toLocaleString()}</p></div><div class="flex items-center gap-2 bg-slate-900 p-1 rounded-xl"><button onclick="cambiarCant(${i},-1)" class="text-white font-bold w-5 border-0 bg-transparent cursor-pointer">-</button><span class="text-[10px] font-bold text-white">${item.cant}</span><button onclick="cambiarCant(${i},1)" class="text-white font-bold w-5 border-0 bg-transparent cursor-pointer">+</button></div></div>`; }).join(''); document.getElementById('cesta-total').innerText = `$${total.toLocaleString()}`; }
        function cambiarCant(i, d) { const item = carrito[i]; item.cant += d; if(item.cant <= 0) carrito.splice(i, 1); else { const prod = productosData.find(x => x.id === item.id); if(item.cant > prod.stock) item.cant = prod.stock; } renderCarrito(); }
        async function finalizarVenta() { if(carrito.length === 0) return; try { const total = carrito.reduce((s, i) => s + (i.precio * i.cant), 0); const batch = db.batch(); const ventaRef = db.collection("ventas").doc(); batch.set(ventaRef, { fecha: firebase.firestore.FieldValue.serverTimestamp(), vendedor: vendedorActivo, sede: sedeActiva, total: total, items: carrito.map(i => ({nombre: i.nombre, cant: i.cant, sub: i.precio * i.cant})) }); carrito.forEach(item => { batch.update(db.collection("productos").doc(item.id), { stock: firebase.firestore.FieldValue.increment(-item.cant) }); }); await batch.commit(); alert("✅ Venta Completada"); carrito = []; renderCarrito(); navegar('inicio'); } catch (e) { alert("Error"); } }
    </script>
</body>
</html>
