<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crafts POS | Sistema Central</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Estilos para impresión de ticket */
        @media print {
            body * { visibility: hidden; }
            #ticket-print, #ticket-print * { visibility: visible; }
            #ticket-print { position: absolute; left: 0; top: 0; width: 80mm; }
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-900">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-white animate-in">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                    <i class="fas fa-gem text-white text-2xl"></i>
                </div>
                <h1 class="text-3xl font-black tracking-tight">Crafts POS</h1>
                <p class="text-slate-400 mt-2 font-medium">Acceso Autorizado</p>
            </div>
            <div class="space-y-4">
                <input id="login-email" type="email" placeholder="Usuario / Correo" class="w-full p-4 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-600 outline-none">
                <input id="login-pass" type="password" placeholder="Contraseña" class="w-full p-4 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-600 outline-none">
                <button onclick="iniciarSesion()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-bold hover:bg-blue-600 transition-all">Entrar al Sistema</button>
            </div>
            <p id="login-error" class="text-red-500 text-sm mt-4 text-center hidden font-bold"></p>
        </div>
    </div>

    <div id="main-app" class="hidden flex min-h-screen">
        <aside class="w-20 md:w-64 bg-slate-900 text-white transition-all">
            <div class="p-6 flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center"><i class="fas fa-gem text-white text-sm"></i></div>
                <span class="font-bold text-lg hidden md:block tracking-tight uppercase">Crafts Colombia</span>
            </div>
            <nav id="nav-menu" class="mt-6 px-4 space-y-2"></nav>
            <div class="absolute bottom-8 px-4 w-full md:w-64">
                <button onclick="cerrarSesion()" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-red-500/10 text-red-400 border-0 bg-transparent cursor-pointer font-bold">
                    <i class="fas fa-power-off"></i><span class="hidden md:block">Cerrar Sesión</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col">
            <header class="h-16 bg-white border-b border-gray-200 px-8 flex items-center justify-between">
                <div>
                    <span id="user-role-badge" class="text-[10px] bg-blue-100 text-blue-600 px-2 py-1 rounded-md font-black mr-2 uppercase">ROL</span>
                    <span id="user-display" class="font-bold text-slate-800 text-sm">Cargando...</span>
                </div>
                <div class="text-[10px] bg-green-100 px-3 py-1 rounded-full font-bold text-green-600 tracking-widest uppercase">Sistema Activo</div>
            </header>
            
            <section id="view-container" class="p-8"></section>
        </main>
    </div>

    <div id="ticket-print" class="hidden p-4 text-sm font-mono leading-tight"></div>

    <script>
        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAEzn4UvflaiWEaXCLkPxYKDcK5HCtaYZk",
            authDomain: "crafts-colombia-pos.firebaseapp.com",
            projectId: "crafts-colombia-pos",
            storageBucket: "crafts-colombia-pos.firebasestorage.app",
            messagingSenderId: "924957968575",
            appId: "1:924957968575:web:12be975b2346dcdf585e0a"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUserData = null;
        let carrito = [];
        let productosData = [];

        // 1. AUTENTICACIÓN
        function iniciarSesion() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            auth.signInWithEmailAndPassword(email, pass).catch(e => {
                document.getElementById('login-error').innerText = "Credenciales Inválidas";
                document.getElementById('login-error').classList.remove('hidden');
            });
        }

        function cerrarSesion() { auth.signOut(); location.reload(); }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const doc = await db.collection('usuarios').doc(user.email).get();
                currentUserData = doc.data() || { rol: 'vendedor', sede: 'desconocida' };
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email;
                document.getElementById('user-role-badge').innerText = currentUserData.rol;
                
                renderSidebar(currentUserData.rol);
                navegar('ventas'); 
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        // 2. NAVEGACIÓN Y SIDEBAR
        function renderSidebar(rol) {
            const nav = document.getElementById('nav-menu');
            let menu = `
                <button onclick="navegar('ventas')" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-slate-800 text-slate-400 hover:text-white border-0 bg-transparent text-left cursor-pointer transition-all">
                    <i class="fas fa-cash-register w-5 text-center"></i><span class="hidden md:block font-bold">Ventas</span>
                </button>`;
            
            if (rol === 'admin' || rol === 'control') {
                menu += `
                <button onclick="navegar('productos')" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-slate-800 text-slate-400 hover:text-white border-0 bg-transparent text-left cursor-pointer transition-all">
                    <i class="fas fa-boxes w-5 text-center"></i><span class="hidden md:block font-bold">Inventario</span>
                </button>
                <button onclick="navegar('reportes')" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-slate-800 text-slate-400 hover:text-white border-0 bg-transparent text-left cursor-pointer transition-all">
                    <i class="fas fa-chart-pie w-5 text-center"></i><span class="hidden md:block font-bold">Reportes</span>
                </button>`;
            }
            nav.innerHTML = menu;
        }

        function navegar(vista) {
            const container = document.getElementById('view-container');
            if (vista === 'ventas') {
                container.innerHTML = `
                    <div class="animate-in grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div class="lg:col-span-2 space-y-6">
                            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 flex items-center gap-4">
                                <i class="fas fa-search text-slate-400 ml-2"></i>
                                <input id="pos-search" onkeyup="filtrarPos(this.value)" type="text" placeholder="Buscar artesanía..." class="w-full bg-transparent p-2 outline-none text-lg font-medium">
                            </div>
                            <div id="pos-grid" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
                        </div>
                        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-blue-50 flex flex-col h-[75vh] sticky top-8">
                            <h2 class="text-xl font-black mb-6 flex items-center gap-2"><i class="fas fa-shopping-basket text-blue-600"></i> Cesta Actual</h2>
                            <div id="cesta-items" class="flex-1 overflow-y-auto space-y-4 pr-2"></div>
                            <div class="border-t mt-6 pt-6 space-y-4">
                                <select id="metodo-pago" class="w-full p-4 bg-slate-50 rounded-2xl border-0 font-bold text-slate-600 outline-none ring-1 ring-slate-100 focus:ring-2 focus:ring-blue-600">
                                    <option value="Efectivo">💵 Pago en Efectivo</option>
                                    <option value="Nequi">📱 Nequi / Transf.</option>
                                    <option value="Tarjeta">💳 Tarjeta Débito/Crédito</option>
                                </select>
                                <div class="flex justify-between items-center text-2xl font-black px-2"><span>Total</span><span id="pos-total" class="text-blue-600">$0</span></div>
                                <button onclick="finalizarVenta()" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-bold hover:bg-green-600 shadow-lg shadow-blue-100 flex items-center justify-center gap-3 transition-all">
                                    <i class="fas fa-check-circle"></i> Procesar Venta
                                </button>
                            </div>
                        </div>
                    </div>`;
                escucharProductos();
            } else if (vista === 'productos') {
                container.innerHTML = `<div class="p-20 text-center"><i class="fas fa-tools text-4xl text-slate-200 mb-4"></i><h2 class="text-xl font-bold">Gestión de Inventario</h2><p class="text-slate-400 italic">Módulo bajo mantenimiento para esta versión quirúrgica.</p></div>`;
            } else {
                container.innerHTML = `<div class="p-20 text-center text-slate-400 font-bold">Módulo Próximamente...</div>`;
            }
        }

        // 3. LÓGICA DE VENTAS (POS)
        function escucharProductos() {
            db.collection("productos").onSnapshot(snap => {
                productosData = [];
                snap.forEach(doc => productosData.push({ id: doc.id, ...doc.data() }));
                filtrarPos(""); // Render inicial
            });
        }

        function filtrarPos(query) {
            const grid = document.getElementById('pos-grid');
            const q = query.toLowerCase();
            let html = "";
            productosData.filter(p => p.nombre.toLowerCase().includes(q)).forEach(p => {
                html += `
                    <div onclick="agregarAlCarrito('${p.id}')" class="bg-white p-5 rounded-[2rem] border border-gray-100 hover:border-blue-400 hover:shadow-lg transition-all cursor-pointer group">
                        <div class="flex flex-col h-full">
                            <span class="text-xs font-black text-slate-400 mb-1 uppercase tracking-tighter">Sede: ${currentUserData.sede}</span>
                            <h3 class="font-bold text-slate-800 leading-tight mb-2 group-hover:text-blue-600">${p.nombre}</h3>
                            <div class="mt-auto flex justify-between items-end">
                                <span class="text-blue-600 font-black">$${p.precio.toLocaleString()}</span>
                                <span class="text-[10px] bg-slate-100 px-2 py-1 rounded-md font-bold ${p.stock <= 5 ? 'text-red-500 bg-red-50' : ''}">STOCK: ${p.stock}</span>
                            </div>
                        </div>
                    </div>`;
            });
            grid.innerHTML = html || `<p class="col-span-full text-center p-10 text-slate-400">No hay productos que coincidan.</p>`;
        }

        function agregarAlCarrito(id) {
            const p = productosData.find(item => item.id === id);
            if(p.stock <= 0) { alert("¡Producto sin existencias!"); return; }
            const existe = carrito.find(item => item.id === id);
            if(existe) { 
                if(existe.cantidad < p.stock) existe.cantidad++; 
                else alert("Máximo disponible alcanzado");
            } else {
                carrito.push({...p, cantidad: 1});
            }
            renderCarrito();
        }

        function renderCarrito() {
            const lista = document.getElementById('cesta-items');
            const totalLabel = document.getElementById('pos-total');
            let html = "", total = 0;
            
            carrito.forEach((item, idx) => {
                total += item.precio * item.cantidad;
                html += `
                    <div class="flex items-center gap-3 bg-slate-50 p-4 rounded-2xl animate-in">
                        <div class="flex-1">
                            <h4 class="text-xs font-black text-slate-800">${item.nombre}</h4>
                            <span class="text-[10px] text-slate-400">$${item.precio.toLocaleString()} x ${item.cantidad}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="cambiarCant(${idx}, -1)" class="w-8 h-8 rounded-full bg-white border-0 shadow-sm flex items-center justify-center text-slate-400 hover:text-red-500 cursor-pointer"><i class="fas fa-minus text-xs"></i></button>
                            <span class="font-bold text-sm min-w-[20px] text-center">${item.cantidad}</span>
                            <button onclick="cambiarCant(${idx}, 1)" class="w-8 h-8 rounded-full bg-white border-0 shadow-sm flex items-center justify-center text-slate-400 hover:text-blue-500 cursor-pointer"><i class="fas fa-plus text-xs"></i></button>
                        </div>
                    </div>`;
            });
            lista.innerHTML = html || `<p class="text-slate-400 text-center py-10 italic">La cesta está vacía</p>`;
            totalLabel.innerText = `$${total.toLocaleString()}`;
        }

        function cambiarCant(idx, delta) {
            const item = carrito[idx];
            item.cantidad += delta;
            if(item.cantidad <= 0) carrito.splice(idx, 1);
            else if(item.cantidad > item.stock) item.cantidad = item.stock;
            renderCarrito();
        }

        // 4. FINALIZAR VENTA Y ACTUALIZAR STOCK
        async function finalizarVenta() {
            if(carrito.length === 0) return;
            const metodo = document.getElementById('metodo-pago').value;
            const total = carrito.reduce((sum, i) => sum + (i.precio * i.cantidad), 0);
            
            try {
                // Registrar en la colección 'ventas'
                await db.collection("ventas").add({
                    fecha: firebase.firestore.FieldValue.serverTimestamp(),
                    vendedor: auth.currentUser.email,
                    sede: currentUserData.sede,
                    metodo_pago: metodo,
                    total: total,
                    items: carrito.map(i => ({nombre: i.nombre, cant: i.cantidad, subtotal: i.precio * i.cantidad}))
                });

                // Restar Stock uno por uno (Quirúrgico)
                for(let item of carrito) {
                    const ref = db.collection("productos").doc(item.id);
                    await ref.update({ stock: firebase.firestore.FieldValue.increment(-item.cantidad) });
                }

                alert("✅ Venta exitosa. Stock actualizado.");
                carrito = [];
                renderCarrito();
            } catch (error) {
                console.error("Error en la venta:", error);
                alert("Hubo un error al procesar la venta.");
            }
        }
    </script>
</body>
</html>
