<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crafts POS | Enterprise Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .animate-in { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .bg-petrol { background-color: #0f1d24; }
        .text-pavo-real { color: #004B8D; }
        .bg-pavo-real { background-color: #004B8D; }
        .modal-overlay { background: rgba(15, 29, 36, 0.95); backdrop-filter: blur(10px); }
        .stat-row, .action-module { transition: all 0.3s ease; border: 1px solid #f1f5f9; }
        .stat-row:hover, .action-module:hover { transform: scale(1.005); background-color: #ffffff; box-shadow: 0 10px 40px -15px rgba(0,75,141,0.1); }
        .sidebar-link { transition: all 0.2s ease; }
        .sidebar-link:hover { background-color: rgba(255,255,255,0.05); transform: translateX(5px); }
    </style>
</head>
<body class="text-slate-700">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6 bg-petrol">
        <div class="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-md animate-in">
            <h1 class="text-3xl font-black text-center text-slate-500 mb-8 tracking-tighter uppercase">CRAFTS POS</h1>
            <div class="space-y-4">
                <input id="login-email" type="email" placeholder="Usuario" class="w-full p-5 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-slate-400">
                <input id="login-pass" type="password" placeholder="Contraseña" class="w-full p-5 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-slate-400">
                <button onclick="iniciarSesion()" class="w-full bg-slate-700 text-white p-5 rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-lg uppercase tracking-widest text-xs">Acceder al Sistema</button>
            </div>
            <p id="login-error" class="text-red-500 text-xs mt-6 hidden font-bold text-center"></p>
        </div>
    </div>

    <div id="main-app" class="hidden flex min-h-screen">
        <aside class="w-20 md:w-56 bg-petrol text-white flex flex-col z-20 shadow-2xl transition-all">
            <div class="p-6 flex items-center gap-3 border-b border-white/5">
                <div class="w-8 h-8 bg-orange-500 rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-gem text-white text-xs"></i></div>
                <div class="hidden md:block leading-tight">
                    <p class="font-black text-[9px] tracking-widest text-slate-500 uppercase leading-none mb-1">Central Hub</p>
                    <p id="sidebar-sede" class="font-bold text-white text-[10px] uppercase italic tracking-tighter">Administrador</p>
                </div>
            </div>

            <nav id="nav-menu" class="p-4 mt-4 space-y-2 flex-1 hide-scroll"></nav>

            <div class="p-4 border-t border-white/5">
                <button onclick="cerrarSesion()" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 text-slate-500 border-0 bg-transparent cursor-pointer font-bold transition-all text-[10px] uppercase tracking-widest sidebar-link">
                    <i class="fas fa-power-off"></i><span class="hidden md:block">Salir</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-28 bg-slate-900 px-10 flex items-center justify-between z-10 border-b border-white/5 shadow-md">
                <div class="flex items-center gap-6 text-white">
                    <div class="flex flex-col">
                        <span id="user-role-badge" class="text-[8px] bg-orange-500 text-white px-2 py-0.5 rounded font-black uppercase tracking-tighter w-fit mb-1">MANDO CENTRAL</span>
                        <span id="user-display" class="font-bold text-xs text-slate-400 uppercase tracking-widest">Usuario</span>
                    </div>
                </div>
                <div class="flex flex-col items-center">
                    <span id="header-date" class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 italic">Sábado, 21 Feb</span>
                    <span id="header-time" class="text-2xl font-black text-white tabular-nums tracking-widest uppercase leading-none">00:00:00</span>
                </div>
                <div class="flex items-center gap-3 bg-white/5 px-6 py-3 rounded-2xl border border-white/5">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-lg shadow-green-500/20"></div>
                    <span class="text-[10px] font-black text-slate-300 uppercase tracking-widest">SISTEMA ACTIVO</span>
                </div>
            </header>
            
            <section id="view-container" class="flex-1 overflow-y-auto p-12 relative bg-slate-50"></section>
        </main>
    </div>

    <div id="main-modal" class="hidden fixed inset-0 z-50 modal-overlay flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-4xl rounded-[3.5rem] shadow-2xl overflow-hidden animate-in">
            <div class="bg-slate-900 p-8 text-white flex justify-between items-center">
                <h2 id="modal-title" class="font-bold text-2xl italic tracking-tighter">Acción Administrativa</h2>
                <button onclick="cerrarModal()" class="text-slate-400 hover:text-white text-3xl bg-transparent border-0 cursor-pointer"><i class="fas fa-times-circle"></i></button>
            </div>
            <div id="modal-content" class="p-10 max-h-[75vh] overflow-y-auto hide-scroll"></div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN FIREBASE (Mismo bloque de siempre)
        const firebaseConfig = { apiKey: "AIzaSyAEzn4UvflaiWEaXCLkPxYKDcK5HCtaYZk", authDomain: "crafts-colombia-pos.firebaseapp.com", projectId: "crafts-colombia-pos", storageBucket: "crafts-colombia-pos.firebasestorage.app", messagingSenderId: "924957968575", appId: "1:924957968575:web:12be975b2346dcdf585e0a" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth(); const db = firebase.firestore();
        let currentUserData = null, productosData = [], listaCategorias = [];

        function updateClock() { const now = new Date(); const options = { weekday: 'long', day: 'numeric', month: 'short' }; if(document.getElementById('header-date')) { document.getElementById('header-date').innerText = now.toLocaleDateString('es-ES', options); document.getElementById('header-time').innerText = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' }); } }
        setInterval(updateClock, 1000);

        function iniciarSesion() { const email = document.getElementById('login-email').value, pass = document.getElementById('login-pass').value; auth.signInWithEmailAndPassword(email, pass).catch(() => alert("Credenciales incorrectas")); }
        function cerrarSesion() { auth.signOut(); location.reload(); }
        auth.onAuthStateChanged(async (user) => { if (user) { const doc = await db.collection('usuarios').doc(user.email).get(); currentUserData = doc.data() || { rol: 'vendedor', sede: '...' }; document.getElementById('login-screen').classList.add('hidden'); document.getElementById('main-app').classList.remove('hidden'); document.getElementById('user-display').innerText = user.email; escucharCategorias(); renderSidebar(currentUserData.rol); navegar('inicio'); } else { document.getElementById('login-screen').classList.remove('hidden'); document.getElementById('main-app').classList.add('hidden'); } });
        function escucharCategorias() { db.collection("configuracion").doc("categorias").onSnapshot(doc => { if(doc.exists) listaCategorias = doc.data().lista || []; }); }

        function renderSidebar(rol) {
            const nav = document.getElementById('nav-menu');
            let menu = `<button onclick="navegar('inicio')" class="w-full flex items-center gap-4 p-4 rounded-xl bg-white/5 text-white border-0 text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest sidebar-link"><i class="fas fa-th-large"></i><span class="hidden md:block">Dashboard</span></button>`;
            if (rol === 'admin' || rol === 'control') {
                menu += `
                <button onclick="navegar('productos')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 hover:text-white border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all sidebar-link"><i class="fas fa-boxes"></i><span class="hidden md:block">Inventario</span></button>
                <button onclick="navegar('traslados')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 hover:text-white border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all sidebar-link"><i class="fas fa-exchange-alt"></i><span class="hidden md:block">Traslados</span></button>
                <button onclick="navegar('reportes')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 hover:text-white border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all sidebar-link"><i class="fas fa-chart-pie"></i><span class="hidden md:block">Historial</span></button>`;
            }
            nav.innerHTML = menu;
        }

        function navegar(vista) {
            const container = document.getElementById('view-container');
            if (vista === 'inicio') {
                container.innerHTML = `
                    <div class="animate-in max-w-7xl mx-auto pt-4">
                        <div class="text-center mb-16">
                            <h1 class="text-7xl font-black tracking-tighter text-slate-500 mb-2 italic leading-none">Crafts Colombia</h1>
                            <p class="text-orange-500 font-bold uppercase tracking-[0.5em] text-xs italic">Centro de Inteligencia Administrativa</p>
                        </div>
                        <div class="max-w-2xl mx-auto relative mb-16">
                            <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-200 text-xl"></i>
                            <input type="text" placeholder="Buscador global..." class="w-full pl-16 pr-6 py-6 bg-white rounded-full border border-slate-100 shadow-2xl outline-none text-lg font-medium focus:ring-4 focus:ring-slate-100 transition-all">
                        </div>
                        <div class="space-y-8">
                            <div class="bg-white p-10 rounded-[3rem] stat-row flex items-center gap-10"><div class="min-w-[180px] border-r border-slate-100 pr-10"><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 italic">Ventas Ayer</p><h3 class="text-4xl font-black text-pavo-real tabular-nums">$0</h3></div><div class="flex-1 grid grid-cols-3 md:grid-cols-6 gap-8"><div class="flex flex-col"><span class="text-[10px] font-black text-pavo-real uppercase mb-1">Filandia 1</span><span class="font-black text-sm text-orange-500">$0</span></div></div></div>
                        </div>
                    </div>`;
            } else if (vista === 'productos') {
                container.innerHTML = `
                    <div class="animate-in max-w-7xl mx-auto pt-4">
                        <div class="text-center mb-16">
                            <h1 class="text-5xl font-black tracking-tighter text-slate-500 mb-2 italic leading-none">Logística Central</h1>
                            <p class="text-orange-500 font-bold uppercase tracking-[0.3em] text-xs italic">Administración de Existencias y Costos</p>
                        </div>

                        <div class="max-w-2xl mx-auto relative mb-12">
                            <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-200 text-xl"></i>
                            <input id="inv-search" onkeyup="filtrarInventario(this.value)" type="text" placeholder="Buscar por producto, categoría o sede..." class="w-full pl-16 pr-6 py-6 bg-white rounded-full border border-slate-100 shadow-2xl outline-none text-lg font-medium focus:ring-4 focus:ring-slate-100 transition-all">
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                            <button onclick="nuevaFicha()" class="bg-orange-500 p-8 rounded-[2.5rem] action-module flex items-center gap-6 text-white group">
                                <div class="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center text-2xl"><i class="fas fa-plus"></i></div>
                                <div class="text-left"><h3 class="font-black text-xl uppercase tracking-tighter leading-none mb-1">Nuevo Artículo</h3><p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Crear ficha técnica</p></div>
                            </button>
                            <button onclick="gestionCategorias()" class="bg-white p-8 rounded-[2.5rem] action-module flex items-center gap-6 group">
                                <div class="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center text-2xl text-pavo-real"><i class="fas fa-tags"></i></div>
                                <div class="text-left"><h3 class="font-black text-pavo-real text-xl uppercase tracking-tighter leading-none mb-1">Categorías</h3><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Administrar etiquetas</p></div>
                            </button>
                            <button onclick="modalCargaMasiva()" class="bg-white p-8 rounded-[2.5rem] action-module flex items-center gap-6 group">
                                <div class="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center text-2xl text-pavo-real"><i class="fas fa-file-excel"></i></div>
                                <div class="text-left"><h3 class="font-black text-pavo-real text-xl uppercase tracking-tighter leading-none mb-1">Carga Masiva</h3><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Importar desde Excel</p></div>
                            </button>
                        </div>

                        <div id="inventory-list" class="space-y-3"></div>
                    </div>`;
                escucharInventario();
            }
        }

        // --- FUNCIONES LOGÍSTICA ---
        function escucharInventario() {
            db.collection("productos").onSnapshot(snap => {
                productosData = [];
                snap.forEach(doc => productosData.push({ id: doc.id, ...doc.data() }));
                const list = document.getElementById('inventory-list');
                if(!list) return;
                let html = "";
                productosData.forEach(p => {
                    const alerta = p.stock <= (p.stock_ideal || 0);
                    html += `
                        <div class="bg-white p-6 rounded-[2.5rem] stat-row flex items-center gap-10">
                            <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-300 text-lg"><i class="fas fa-image"></i></div>
                            <div class="flex-1">
                                <p class="text-[8px] font-black text-orange-500 uppercase tracking-widest mb-1 italic">${p.categoria}</p>
                                <h3 class="font-black text-pavo-real text-lg uppercase tracking-tighter truncate leading-tight">${p.nombre}</h3>
                            </div>
                            <div class="text-center min-w-[100px] border-l border-slate-50 pl-4"><p class="text-[8px] font-black text-slate-400 uppercase mb-1 italic">Sede</p><span class="bg-pavo-real text-white text-[9px] px-3 py-1 rounded-full font-black uppercase italic">${p.sede_ubicacion}</span></div>
                            <div class="text-center min-w-[100px] border-l border-slate-50 pl-4"><p class="text-[8px] font-black text-slate-400 uppercase mb-1 italic">Stock</p><p class="font-black text-base ${alerta ? 'text-red-500' : 'text-pavo-real'} tabular-nums">${p.stock} / ${p.stock_ideal}</p></div>
                            <div class="text-right min-w-[120px] border-l border-slate-50 pl-4"><p class="text-[8px] font-black text-slate-400 uppercase mb-1 italic">Venta</p><p class="font-black text-pavo-real text-lg tabular-nums">$${p.precio.toLocaleString()}</p></div>
                            <div class="flex gap-2 border-l border-slate-50 pl-4"><button onclick="verFicha('${p.id}')" class="text-slate-300 hover:text-pavo-real transition-all text-xl"><i class="fas fa-edit"></i></button></div>
                        </div>`;
                });
                list.innerHTML = html;
            });
        }

        function filtrarInventario(q) { const query = q.toLowerCase(); renderInventario(productosData.filter(p => p.nombre.toLowerCase().includes(query) || p.categoria.toLowerCase().includes(query) || p.sede_ubicacion.toLowerCase().includes(query))); }
        // Se mantienen las funciones de Modales y Firebase del código anterior
        function modalCargaMasiva() { const modal = document.getElementById('main-modal'); const content = document.getElementById('modal-content'); document.getElementById('modal-title').innerText = "Carga Masiva Excel"; content.innerHTML = `<div class="space-y-8"><div class="bg-blue-50 p-6 rounded-[2rem] border border-blue-100 flex items-center gap-6"><i class="fas fa-info-circle text-blue-400 text-3xl"></i><p class="text-[10px] text-blue-800 font-bold uppercase tracking-wider italic leading-relaxed">Cabeceras requeridas en minúsculas: <span class="bg-white px-2 py-1 rounded">nombre</span>, <span class="bg-white px-2 py-1 rounded">categoria</span>, <span class="bg-white px-2 py-1 rounded">precio</span>, <span class="bg-white px-2 py-1 rounded">costo</span>, <span class="bg-white px-2 py-1 rounded">stock</span>, <span class="bg-white px-2 py-1 rounded">ideal</span>, <span class="bg-white px-2 py-1 rounded">sede</span></p></div><div class="border-4 border-dashed border-slate-100 p-16 rounded-[3rem] text-center group hover:border-slate-300 transition-all"><i class="fas fa-cloud-upload-alt text-5xl text-slate-200 mb-6 group-hover:text-slate-400"></i><p class="text-slate-400 font-black mb-8 uppercase text-xs">Arrastre el archivo .xlsx aquí</p><input type="file" id="excel-input" accept=".xlsx" class="hidden" onchange="procesarExcel(event)"><button onclick="document.getElementById('excel-input').click()" class="bg-slate-900 text-white px-10 py-5 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl">Cargar Archivo</button></div><div id="excel-preview" class="hidden"><button onclick="confirmarSubida()" class="w-full bg-blue-600 text-white py-6 rounded-3xl font-black uppercase text-xs shadow-xl">Confirmar Subida Masiva</button></div></div>`; modal.classList.remove('hidden'); }
        function nuevaFicha() { verFicha(null); }
        function verFicha(id) { const modal = document.getElementById('main-modal'), content = document.getElementById('modal-content'); document.getElementById('modal-title').innerText = "Ficha Técnica"; const p = id ? productosData.find(item => item.id === id) : { nombre: '', precio: '', stock: '', categoria: 'Mochilas', precio_compra: '', stock_ideal: '', sede_ubicacion: 'Bodega' }; content.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-10"><div class="space-y-6"><div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Nombre Oficial</label><input id="edit-nombre" type="text" value="${p.nombre}" class="w-full p-5 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-100 font-bold outline-none text-pavo-real uppercase"></div><div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Categoría Logística</label><select id="edit-categoria" class="w-full p-5 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-100 font-bold text-pavo-real">${listaCategorias.map(c => `<option value="${c}" ${p.categoria === c ? 'selected' : ''}>${c}</option>`).join('')}</select></div><div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Sede Destino</label><select id="edit-sede" class="w-full p-5 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-100 font-bold text-pavo-real">${["Bodega", "Crafts 1", "Crafts 2", "Crafts 3", "Crafts 4", "Crafts 5", "Bodega Online"].map(s => `<option value="${s}" ${p.sede_ubicacion === s ? 'selected' : ''}>${s}</option>`).join('')}</select></div></div><div class="bg-slate-50/50 p-8 rounded-[3rem] border border-slate-100 space-y-6"><div class="grid grid-cols-2 gap-5"><div><label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Venta</label><input id="edit-precio" type="number" value="${p.precio}" class="w-full p-4 bg-white rounded-xl border-0 ring-1 ring-slate-100 font-black text-pavo-real"></div><div><label class="text-[10px] font-black text-orange-500 uppercase mb-2 block italic">Costo Compra</label><input id="edit-compra" type="number" value="${p.precio_compra}" class="w-full p-4 bg-white rounded-xl border-0 ring-1 ring-orange-100 font-black text-orange-600"></div></div><div class="grid grid-cols-2 gap-5"><div><label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Stock Actual</label><input id="edit-stock" type="number" value="${p.stock}" class="w-full p-4 bg-white rounded-xl border-0 ring-1 ring-slate-100 font-black text-pavo-real"></div><div><label class="text-[10px] font-black text-blue-400 uppercase mb-2 block italic">Stock Ideal</label><input id="edit-ideal" type="number" value="${p.stock_ideal}" class="w-full p-4 bg-white rounded-xl border-0 ring-1 ring-blue-50 font-black text-blue-600"></div></div><div class="pt-6 flex gap-3"><button onclick="guardarCambios('${id}')" class="flex-1 bg-slate-900 text-white py-5 rounded-3xl font-black uppercase text-[10px] tracking-widest shadow-xl hover:bg-green-600 transition-all">Actualizar Registro</button>${id ? `<button onclick="eliminarProducto('${id}')" class="bg-red-50 text-red-500 px-6 rounded-3xl font-black hover:bg-red-500 hover:text-white transition-all"><i class="fas fa-trash-alt"></i></button>` : ''}</div></div></div>`; modal.classList.remove('hidden'); }
        function gestionCategorias() { const modal = document.getElementById('main-modal'), content = document.getElementById('modal-content'); document.getElementById('modal-title').innerText = "Gestión de Categorías"; content.innerHTML = `<div class="space-y-6"><div class="flex gap-4"><input id="nueva-cat" type="text" class="flex-1 p-5 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-100 font-bold outline-none text-pavo-real" placeholder="Nueva categoría..."><button onclick="addCategoria()" class="bg-slate-900 text-white px-8 rounded-2xl font-black">Añadir</button></div><div class="pt-6 border-t"><div class="flex flex-wrap gap-2">${listaCategorias.map(c => `<span class="bg-slate-50 px-4 py-2 rounded-xl text-[10px] font-bold border border-slate-100 text-pavo-real uppercase">${c}</span>`).join('')}</div></div></div>`; modal.classList.remove('hidden'); }
        // Se mantienen las funciones de guardarCambios, eliminarProducto, addCategoria, cerrarModal, procesarExcel y confirmarSubida del código anterior
        async function guardarCambios(id) { const data = { nombre: document.getElementById('edit-nombre').value, categoria: document.getElementById('edit-categoria').value, sede_ubicacion: document.getElementById('edit-sede').value, precio: parseInt(document.getElementById('edit-precio').value), precio_compra: parseInt(document.getElementById('edit-compra').value), stock: parseInt(document.getElementById('edit-stock').value), stock_ideal: parseInt(document.getElementById('edit-ideal').value) }; try { if(!id || id === "null") await db.collection("productos").add(data); else await db.collection("productos").doc(id).update(data); alert("Base de datos actualizada"); cerrarModal(); } catch (e) { alert("Error"); } }
        async function eliminarProducto(id) { if(confirm("¿Eliminar?")) { await db.collection("productos").doc(id).delete(); cerrarModal(); } }
        async function addCategoria() { const val = document.getElementById('nueva-cat').value; if(!val) return; listaCategorias.push(val); await db.collection("configuracion").doc("categorias").set({ lista: listaCategorias }); gestionCategorias(); }
        function cerrarModal() { document.getElementById('main-modal').classList.add('hidden'); }
        let datosExcel = []; function procesarExcel(e) { const file = e.target.files[0]; const reader = new FileReader(); reader.onload = (evt) => { const bstr = evt.target.result; const wb = XLSX.read(bstr, { type: 'binary' }); const wsname = wb.SheetNames[0]; const ws = wb.Sheets[wsname]; const data = XLSX.utils.sheet_to_json(ws); datosExcel = data.map(item => ({ nombre: item.nombre || "Sin Nombre", categoria: item.categoria || "Mochilas", precio: parseInt(item.precio) || 0, precio_compra: parseInt(item.costo) || 0, stock: parseInt(item.stock) || 0, stock_ideal: parseInt(item.ideal) || 0, sede_ubicacion: item.sede || "Bodega" })); document.getElementById('excel-preview').classList.remove('hidden'); }; reader.readAsBinaryString(file); }
        async function confirmarSubida() { if(datosExcel.length === 0) return; try { const batch = db.batch(); datosExcel.forEach(p => { const ref = db.collection("productos").doc(); batch.set(ref, p); }); await batch.commit(); alert("✅ Carga masiva completada con éxito"); cerrarModal(); } catch (err) { alert("Error al subir datos"); } }
    </script>
</body>
</html>
