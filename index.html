<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crafts POS | Retail Strategy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .animate-in { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .sidebar-scroll { max-height: calc(100vh - 300px); overflow-y: auto; }
    </style>
</head>
<body class="text-slate-900">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6 bg-slate-900">
        <div class="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-md animate-in border border-slate-700">
            <h1 class="text-3xl font-black tracking-tight text-center text-slate-900 mb-8 uppercase">Crafts POS</h1>
            <div class="space-y-4">
                <input id="login-email" type="email" placeholder="Usuario" class="w-full p-4 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-slate-900">
                <input id="login-pass" type="password" placeholder="Contraseña" class="w-full p-4 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-slate-900">
                <button onclick="iniciarSesion()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-bold hover:bg-slate-800 transition-all">Acceder</button>
            </div>
            <p id="login-error" class="text-red-500 text-xs mt-6 hidden font-bold text-center"></p>
        </div>
    </div>

    <div id="main-app" class="hidden flex min-h-screen">
        <aside class="w-20 md:w-80 bg-white border-r border-slate-200 flex flex-col z-20 shadow-sm">
            <div class="p-8 flex items-center gap-3 border-b border-slate-50">
                <div class="w-8 h-8 bg-slate-900 rounded-lg flex items-center justify-center shadow-lg"><i class="fas fa-gem text-white text-xs"></i></div>
                <div class="hidden md:block">
                    <p class="font-black text-[10px] tracking-widest text-slate-400 uppercase leading-none">Management</p>
                    <p class="font-bold text-slate-900 text-sm">Crafts Colombia</p>
                </div>
            </div>

            <nav id="nav-menu" class="p-4 space-y-1"></nav>

            <div class="hidden md:flex flex-1 flex-col p-4 border-t border-slate-50 overflow-hidden">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Cesta de Venta</h2>
                    <span id="items-count" class="text-[9px] font-bold text-orange-500">0</span>
                </div>
                <div id="cesta-items" class="sidebar-scroll space-y-2 pr-2 hide-scroll">
                    <p class="text-[10px] text-slate-300 italic text-center py-10">Esperando productos...</p>
                </div>
                <div id="cesta-footer" class="mt-auto pt-4 border-t border-slate-100 hidden">
                    <div class="flex justify-between items-baseline mb-4">
                        <span class="text-[10px] font-bold text-slate-400">TOTAL</span>
                        <span id="pos-total" class="font-black text-xl text-slate-900">$0</span>
                    </div>
                    <button onclick="finalizarVenta()" class="w-full bg-orange-500 text-white py-4 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-orange-600 transition-all shadow-lg shadow-orange-100">Cobrar ahora</button>
                </div>
            </div>

            <div class="p-6 border-t border-slate-50">
                <button onclick="cerrarSesion()" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-slate-50 text-slate-400 border-0 bg-transparent cursor-pointer font-bold transition-all text-xs">
                    <i class="fas fa-power-off"></i><span class="hidden md:block">Cerrar Sesión</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-slate-900 px-8 flex items-center justify-between z-10">
                <div class="flex items-center gap-4 text-white">
                    <span id="user-role-badge" class="text-[8px] bg-slate-800 text-slate-400 px-2 py-1 rounded font-black uppercase">Sede</span>
                    <span id="user-display" class="font-medium text-xs text-slate-400">Usuario</span>
                </div>
                <div id="header-time" class="text-xs font-bold text-white tabular-nums opacity-80">00:00:00</div>
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
            </header>
            
            <section id="view-container" class="flex-1 overflow-y-auto p-12 bg-slate-50/30"></section>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAEzn4UvflaiWEaXCLkPxYKDcK5HCtaYZk",
            authDomain: "crafts-colombia-pos.firebaseapp.com",
            projectId: "crafts-colombia-pos",
            storageBucket: "crafts-colombia-pos.firebasestorage.app",
            messagingSenderId: "924957968575",
            appId: "1:924957968575:web:12be975b2346dcdf585e0a"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUserData = null, carrito = [], productosData = [];

        function updateClock() {
            const now = new Date();
            if(document.getElementById('header-time'))
                document.getElementById('header-time').innerText = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        setInterval(updateClock, 1000);

        function iniciarSesion() {
            const email = document.getElementById('login-email').value, pass = document.getElementById('login-pass').value;
            auth.signInWithEmailAndPassword(email, pass).catch(() => alert("Error de acceso"));
        }

        function cerrarSesion() { auth.signOut(); location.reload(); }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const doc = await db.collection('usuarios').doc(user.email).get();
                currentUserData = doc.data() || { rol: 'vendedor', sede: '...' };
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email;
                document.getElementById('user-role-badge').innerText = currentUserData.sede;
                renderSidebar(currentUserData.rol);
                navegar('ventas');
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        function renderSidebar(rol) {
            const nav = document.getElementById('nav-menu');
            let menu = `<button onclick="navegar('ventas')" class="w-full flex items-center gap-4 p-4 rounded-xl bg-slate-900 text-white border-0 text-left cursor-pointer font-bold text-xs uppercase tracking-tighter shadow-xl"><i class="fas fa-search"></i><span>Panel de Venta</span></button>`;
            if (rol === 'admin') {
                menu += `<button onclick="navegar('productos')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-400 hover:text-slate-900 border-0 bg-transparent text-left cursor-pointer font-bold text-xs uppercase tracking-tighter"><i class="fas fa-boxes"></i><span>Stock</span></button>`;
            }
            nav.innerHTML = menu;
        }

        function navegar(vista) {
            const container = document.getElementById('view-container');
            if (vista === 'ventas') {
                container.innerHTML = `
                    <div class="animate-in max-w-5xl mx-auto pt-10">
                        <div class="text-center mb-12">
                            <h1 class="text-5xl font-black tracking-tighter text-slate-900 mb-2">Crafts Colombia</h1>
                            <p class="text-orange-500 font-bold uppercase tracking-[0.4em] text-[10px]">Sede ${currentUserData.sede}</p>
                        </div>

                        <div class="max-w-2xl mx-auto relative mb-20">
                            <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-300"></i>
                            <input id="pos-search" onkeyup="filtrarPos(this.value)" type="text" placeholder="¿Qué estás buscando?" 
                                class="w-full pl-16 pr-6 py-6 bg-white rounded-full border-0 shadow-sm outline-none text-lg ring-1 ring-slate-100 focus:ring-2 focus:ring-slate-900 transition-all">
                        </div>

                        <div id="pos-grid" class="space-y-4"></div>
                    </div>`;
                escucharProductos();
            }
        }

        function escucharProductos() {
            db.collection("productos").onSnapshot(snap => {
                productosData = [];
                snap.forEach(doc => productosData.push({ id: doc.id, ...doc.data() }));
            });
        }

        function filtrarPos(query) {
            const grid = document.getElementById('pos-grid');
            const q = query.toLowerCase();
            if(!q) { grid.innerHTML = ""; return; }
            
            let html = "";
            productosData.filter(p => p.nombre.toLowerCase().includes(q)).forEach(p => {
                html += `
                    <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex items-center gap-8 animate-in hover:shadow-md transition-all">
                        <div class="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-300 text-2xl">
                            <i class="fas fa-image"></i>
                        </div>
                        <div class="flex-1">
                            <h3 class="font-bold text-slate-800 text-lg leading-none mb-2">${p.nombre}</h3>
                            <p class="text-[10px] text-slate-400 italic">Unidades en vitrina: ${p.stock}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Precio</p>
                            <p class="font-black text-2xl text-slate-900">$${p.precio.toLocaleString()}</p>
                        </div>
                        <button onclick="agregarAlCarrito('${p.id}')" class="bg-slate-900 text-white px-6 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-orange-500 transition-all active:scale-95 shadow-lg shadow-slate-100">
                            Agregar
                        </button>
                    </div>`;
            });
            grid.innerHTML = html || `<p class="text-center text-slate-300 py-10 font-bold italic">No hay resultados</p>`;
        }

        function agregarAlCarrito(id) {
            const p = productosData.find(item => item.id === id);
            if(p.stock <= 0) return alert("Agotado");
            const existe = carrito.find(item => item.id === id);
            if(existe) { if(existe.cantidad < p.stock) existe.cantidad++; }
            else { carrito.push({...p, cantidad: 1}); }
            renderCarrito();
        }

        function renderCarrito() {
            const lista = document.getElementById('cesta-items'), footer = document.getElementById('cesta-footer');
            if(carrito.length > 0) { footer.classList.remove('hidden'); }
            else { footer.classList.add('hidden'); }
            
            let html = "", total = 0;
            carrito.forEach((item, idx) => {
                total += item.precio * item.cantidad;
                html += `
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 flex items-center gap-2 animate-in">
                        <div class="flex-1">
                            <p class="text-[9px] font-black text-slate-700 truncate uppercase">${item.nombre}</p>
                            <p class="text-[8px] text-slate-400">$${item.precio.toLocaleString()} x ${item.cantidad}</p>
                        </div>
                        <div class="flex items-center gap-1">
                            <button onclick="cambiarCant(${idx},-1)" class="w-6 h-6 rounded-lg bg-white border-0 text-slate-400 cursor-pointer text-[10px]">-</button>
                            <span class="text-[10px] font-bold text-slate-900 w-3 text-center">${item.cantidad}</span>
                            <button onclick="cambiarCant(${idx},1)" class="w-6 h-6 rounded-lg bg-white border-0 text-slate-400 cursor-pointer text-[10px]">+</button>
                        </div>
                    </div>`;
            });
            lista.innerHTML = html || `<p class="text-[10px] text-slate-300 italic text-center py-10">Esperando productos...</p>`;
            document.getElementById('items-count').innerText = carrito.length;
            document.getElementById('pos-total').innerText = `$${total.toLocaleString()}`;
        }

        function cambiarCant(idx, delta) {
            const item = carrito[idx];
            item.cantidad += delta;
            if(item.cantidad <= 0) carrito.splice(idx, 1);
            else if(item.cantidad > item.stock) item.cantidad = item.stock;
            renderCarrito();
        }

        async function finalizarVenta() {
            if(carrito.length === 0) return;
            try {
                for(let item of carrito) {
                    await db.collection("productos").doc(item.id).update({ stock: firebase.firestore.FieldValue.increment(-item.cantidad) });
                }
                alert("Venta procesada");
                carrito = []; renderCarrito(); document.getElementById('pos-search').value = ""; filtrarPos("");
            } catch (e) { alert("Error"); }
        }
    </script>
</body>
</html>
