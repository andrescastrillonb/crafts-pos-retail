<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crafts POS | Retail Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .animate-in { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hide-scroll::-webkit-scrollbar { display: none; }
        /* Color Petróleo Personalizado */
        .bg-petrol { background-color: #0f1d24; }
        .sidebar-scroll { max-height: calc(100vh - 350px); overflow-y: auto; }
    </style>
</head>
<body class="text-slate-900">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6 bg-[#0f1d24]">
        <div class="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-md animate-in">
            <h1 class="text-3xl font-black tracking-tight text-center text-slate-900 mb-8">CRAFTS POS</h1>
            <div class="space-y-4">
                <input id="login-email" type="email" placeholder="Usuario" class="w-full p-4 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-[#0f1d24]">
                <input id="login-pass" type="password" placeholder="Contraseña" class="w-full p-4 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-[#0f1d24]">
                <button onclick="iniciarSesion()" class="w-full bg-[#0f1d24] text-white p-5 rounded-2xl font-bold hover:opacity-90 transition-all">Ingresar</button>
            </div>
            <p id="login-error" class="text-red-500 text-xs mt-6 hidden font-bold text-center"></p>
        </div>
    </div>

    <div id="main-app" class="hidden flex min-h-screen">
        <aside class="w-20 md:w-80 bg-petrol text-white flex flex-col z-20 shadow-2xl">
            <div class="p-8 flex items-center gap-3 border-b border-white/5">
                <div class="w-10 h-10 bg-orange-500 rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-gem text-white text-sm"></i></div>
                <div class="hidden md:block">
                    <p class="font-black text-[10px] tracking-widest text-slate-500 uppercase leading-none">Crafts Colombia</p>
                    <p class="font-bold text-white text-sm uppercase">Sede Central</p>
                </div>
            </div>

            <nav id="nav-menu" class="p-4 space-y-1"></nav>

            <div class="hidden md:flex flex-1 flex-col p-6 overflow-hidden">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Cesta de Venta</h2>
                    <span id="items-count" class="bg-orange-500 text-white text-[9px] px-2 py-0.5 rounded-full font-black">0</span>
                </div>
                <div id="cesta-items" class="sidebar-scroll space-y-3 pr-2 hide-scroll">
                    <p class="text-[10px] text-slate-500 italic text-center py-10">Agrega artesanías...</p>
                </div>
                <div id="cesta-footer" class="mt-auto pt-6 border-t border-white/5 hidden">
                    <div class="flex justify-between items-baseline mb-4">
                        <span class="text-[10px] font-bold text-slate-500 uppercase">Total</span>
                        <span id="pos-total" class="font-black text-2xl text-orange-500">$0</span>
                    </div>
                    <button onclick="finalizarVenta()" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-orange-600 transition-all shadow-lg shadow-orange-900/40">
                        Confirmar Cobro
                    </button>
                </div>
            </div>

            <div class="p-6 border-t border-white/5">
                <button onclick="cerrarSesion()" class="w-full flex items-center gap-4 p-4 rounded-xl hover:bg-white/5 text-slate-500 border-0 bg-transparent cursor-pointer font-bold transition-all text-xs">
                    <i class="fas fa-sign-out-alt"></i><span class="hidden md:block">Salir</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden bg-slate-100">
            <header class="h-16 bg-slate-900 px-8 flex items-center justify-between z-10 border-b border-white/5">
                <div class="flex items-center gap-4 text-white">
                    <span id="user-role-badge" class="text-[8px] bg-white/10 text-slate-400 px-2 py-1 rounded font-black uppercase tracking-widest">PERFIL</span>
                    <span id="user-display" class="font-bold text-xs text-slate-400">Usuario</span>
                </div>
                <div id="header-time" class="text-xs font-black text-white tabular-nums tracking-widest uppercase">00:00:00</div>
                <div class="flex items-center gap-2">
                    <div class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-[9px] font-black text-slate-500 uppercase">Online</span>
                </div>
            </header>
            
            <section id="view-container" class="flex-1 overflow-y-auto p-12 relative"></section>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAEzn4UvflaiWEaXCLkPxYKDcK5HCtaYZk",
            authDomain: "crafts-colombia-pos.firebaseapp.com",
            projectId: "crafts-colombia-pos",
            storageBucket: "crafts-colombia-pos.firebasestorage.app",
            messagingSenderId: "924957968575",
            appId: "1:924957968575:web:12be975b2346dcdf585e0a"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUserData = null, carrito = [], productosData = [];

        function updateClock() {
            const now = new Date();
            if(document.getElementById('header-time'))
                document.getElementById('header-time').innerText = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        setInterval(updateClock, 1000);

        function iniciarSesion() {
            const email = document.getElementById('login-email').value, pass = document.getElementById('login-pass').value;
            auth.signInWithEmailAndPassword(email, pass).catch(() => alert("Error de acceso"));
        }

        function cerrarSesion() { auth.signOut(); location.reload(); }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const doc = await db.collection('usuarios').doc(user.email).get();
                currentUserData = doc.data() || { rol: 'vendedor', sede: '...' };
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email;
                document.getElementById('user-role-badge').innerText = currentUserData.rol;
                renderSidebar(currentUserData.rol);
                navegar('ventas');
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        function renderSidebar(rol) {
            const nav = document.getElementById('nav-menu');
            let menu = `<button onclick="navegar('ventas')" class="w-full flex items-center gap-4 p-4 rounded-xl bg-white/5 text-white border-0 text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest"><i class="fas fa-shopping-cart"></i><span>Nueva Venta</span></button>`;
            if (rol === 'admin') {
                menu += `<button onclick="navegar('productos')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 hover:text-white border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all"><i class="fas fa-boxes"></i><span>Inventario</span></button>`;
            }
            nav.innerHTML = menu;
        }

        function navegar(vista) {
            const container = document.getElementById('view-container');
            if (vista === 'ventas') {
                container.innerHTML = `
                    <div class="animate-in max-w-5xl mx-auto pt-10">
                        <div class="text-center mb-10">
                            <h1 class="text-5xl font-black tracking-tighter text-slate-900 mb-2">CRAFTS COLOMBIA</h1>
                            <p class="text-orange-500 font-bold uppercase tracking-[0.5em] text-[12px]">SEDE ${currentUserData.sede}</p>
                        </div>

                        <div class="max-w-2xl mx-auto relative mb-16">
                            <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-300 text-xl"></i>
                            <input id="pos-search" onkeyup="filtrarPos(this.value)" type="text" placeholder="Buscar artesanía..." 
                                class="w-full pl-16 pr-6 py-6 bg-white rounded-full border border-slate-200 shadow-xl outline-none text-lg font-medium focus:ring-4 focus:ring-orange-100 transition-all">
                        </div>

                        <div id="pos-grid" class="space-y-4"></div>
                    </div>`;
                escucharProductos();
            }
        }

        function escucharProductos() {
            db.collection("productos").onSnapshot(snap => {
                productosData = [];
                snap.forEach(doc => productosData.push({ id: doc.id, ...doc.data() }));
            });
        }

        function filtrarPos(query) {
            const grid = document.getElementById('pos-grid');
            const q = query.toLowerCase();
            if(!q) { grid.innerHTML = ""; return; }
            
            let html = "";
            productosData.filter(p => p.nombre.toLowerCase().includes(q)).forEach(p => {
                html += `
                    <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm flex items-center gap-8 animate-in hover:shadow-lg transition-all">
                        <div class="w-20 h-20 bg-slate-50 rounded-3xl flex items-center justify-center text-slate-200 text-3xl">
                            <i class="fas fa-gem"></i>
                        </div>
                        <div class="flex-1">
                            <h3 class="font-black text-slate-800 text-xl leading-none mb-3">${p.nombre}</h3>
                            <div class="flex items-center gap-4">
                                <span class="text-[9px] font-black bg-slate-100 text-slate-500 px-3 py-1 rounded-full uppercase tracking-widest">Disp: ${p.stock}</span>
                                <p class="text-[11px] text-slate-400 italic">Producto artesanal de alta calidad</p>
                            </div>
                        </div>
                        <div class="text-right px-8 border-l border-slate-50">
                            <p class="font-black text-3xl text-slate-900 tracking-tighter">$${p.precio.toLocaleString()}</p>
                        </div>
                        <button onclick="agregarAlCarrito('${p.id}')" class="bg-slate-900 text-white px-8 py-5 rounded-[2rem] font-black text-[10px] uppercase tracking-[0.2em] hover:bg-orange-500 transition-all active:scale-95 shadow-xl shadow-slate-200">
                            Agregar
                        </button>
                    </div>`;
            });
            grid.innerHTML = html || `<div class="py-20 text-center text-slate-300 font-bold uppercase tracking-widest text-xs">Sin coincidencias</div>`;
        }

        function agregarAlCarrito(id) {
            const p = productosData.find(item => item.id === id);
            if(p.stock <= 0) return alert("Sin existencias");
            const existe = carrito.find(item => item.id === id);
            if(existe) { if(existe.cantidad < p.stock) existe.cantidad++; }
            else { carrito.push({...p, cantidad: 1}); }
            renderCarrito();
        }

        function renderCarrito() {
            const lista = document.getElementById('cesta-items'), footer = document.getElementById('cesta-footer');
            if(carrito.length > 0) { footer.classList.remove('hidden'); }
            else { footer.classList.add('hidden'); }
            
            let html = "", total = 0;
            carrito.forEach((item, idx) => {
                total += item.precio * item.cantidad;
                html += `
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5 flex items-center gap-3 animate-in">
                        <div class="flex-1 overflow-hidden">
                            <p class="text-[10px] font-black text-white truncate uppercase tracking-wider">${item.nombre}</p>
                            <p class="text-[9px] text-slate-500">$${item.precio.toLocaleString()}</p>
                        </div>
                        <div class="flex items-center gap-2 bg-slate-900 p-1 rounded-xl">
                            <button onclick="cambiarCant(${idx},-1)" class="w-7 h-7 rounded-lg bg-white/5 text-white border-0 cursor-pointer text-[10px]">-</button>
                            <span class="text-[10px] font-bold text-orange-500 min-w-[15px] text-center">${item.cantidad}</span>
                            <button onclick="cambiarCant(${idx},1)" class="w-7 h-7 rounded-lg bg-white/5 text-white border-0 cursor-pointer text-[10px]">+</button>
                        </div>
                    </div>`;
            });
            lista.innerHTML = html || `<p class="text-[10px] text-slate-500 italic text-center py-10">Agrega artesanías...</p>`;
            document.getElementById('items-count').innerText = carrito.length;
            document.getElementById('pos-total').innerText = `$${total.toLocaleString()}`;
        }

        function cambiarCant(idx, delta) {
            const item = carrito[idx];
            item.cantidad += delta;
            if(item.cantidad <= 0) carrito.splice(idx, 1);
            else if(item.cantidad > item.stock) item.cantidad = item.stock;
            renderCarrito();
        }

        async function finalizarVenta() {
            if(carrito.length === 0) return;
            try {
                for(let item of carrito) {
                    await db.collection("productos").doc(item.id).update({ stock: firebase.firestore.FieldValue.increment(-item.cantidad) });
                }
                alert("Venta procesada con éxito");
                carrito = []; renderCarrito(); document.getElementById('pos-search').value = ""; filtrarPos("");
            } catch (e) { alert("Error crítico de red"); }
        }
    </script>
</body>
</html>
