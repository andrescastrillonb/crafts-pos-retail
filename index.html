<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crafts POS | Enterprise Management</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1041/1041916.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .animate-in { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .bg-petrol { background-color: #0f1d24; }
        .text-pavo-real { color: #004B8D; }
        .bg-pavo-real { background-color: #004B8D; }
        .modal-overlay { background: rgba(15, 29, 36, 0.98); backdrop-filter: blur(15px); }
        .stat-row, .action-module { transition: all 0.3s ease; border: 1px solid #f1f5f9; }
        .stat-row:hover, .action-module:hover { transform: scale(1.005); background-color: #ffffff; box-shadow: 0 15px 45px -15px rgba(0,75,141,0.12); }
        .nav-active { background-color: rgba(255, 255, 255, 0.1) !important; color: white !important; }
        .sidebar-scroll { max-height: calc(100vh - 550px); overflow-y: auto; }
        input, select { transition: all 0.2s ease; outline: none; }
    </style>
</head>
<body class="text-slate-700">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6 bg-petrol">
        <div class="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-md animate-in border border-white/10 text-center">
            <h1 class="text-3xl font-black text-slate-500 mb-8 uppercase tracking-tighter italic">CRAFTS POS</h1>
            <div class="space-y-4 text-left">
                <input id="login-email" type="email" placeholder="Usuario / Correo" class="w-full p-4 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-slate-400 font-medium uppercase text-left" />
                <input id="login-pass" type="password" placeholder="Contraseña" class="w-full p-4 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-slate-400 font-medium" />
                <input id="login-vendedor" type="text" placeholder="Nombre del Operario" class="w-full p-4 bg-orange-50 rounded-2xl border-0 ring-1 ring-orange-200 focus:ring-2 focus:ring-orange-400 font-bold uppercase text-pavo-real" />

                <select id="login-sede" class="w-full p-4 bg-slate-900 text-white rounded-2xl border-0 font-bold uppercase shadow-lg">
                    <option value="" disabled selected>Punto de Venta</option>
                    <option value="bodega">BODEGA CENTRAL</option>
                    <option value="filandia1">FILANDIA 1</option>
                    <option value="filandia2">FILANDIA 2</option>
                    <option value="cableplaza">CABLE PLAZA</option>
                    <option value="fundadores">FUNDADORES</option>
                    <option value="jardin">JARDÍN</option>
                    <option value="online">ONLINE</option>
                </select>

                <button onclick="iniciarSesion()" class="w-full bg-slate-700 text-white p-5 rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-lg uppercase tracking-widest text-xs mt-4">Entrar</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden flex min-h-screen">
        <aside class="w-20 md:w-56 bg-petrol text-white flex flex-col z-20 shadow-2xl transition-all">
            <div class="p-6 flex items-center gap-3 border-b border-white/5">
                <div class="w-8 h-8 bg-orange-500 rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-gem text-white text-xs"></i></div>
                <div class="hidden md:block leading-tight text-left italic">
                    <p class="font-black text-[9px] tracking-widest text-slate-500 uppercase leading-none mb-1">Central Console</p>
                    <p id="sidebar-sede-name" class="font-bold text-white text-[10px] uppercase italic">...</p>
                </div>
            </div>
            <nav id="nav-menu" class="p-4 mt-10 space-y-2 flex-1 hide-scroll"></nav>

            <div id="sidebar-cesta" class="hidden p-4 border-t border-white/5 animate-in">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-4 italic text-left leading-none">Cesta de Venta</p>
                <div id="cesta-items" class="sidebar-scroll space-y-3 hide-scroll"></div>
                <div class="mt-6 pt-4 border-t border-white/10 text-right">
                    <span id="cesta-total" class="block font-black text-xl text-orange-500 tabular-nums mb-4">$0</span>
                    <button onclick="finalizarVenta()" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-orange-600 transition-all shadow-lg">Finalizar</button>
                </div>
            </div>

            <div class="p-4 border-t border-white/5 text-center">
                <button onclick="cerrarSesion()" class="w-full flex items-center justify-center gap-3 p-3 rounded-xl hover:bg-white/5 text-slate-500 border-0 bg-transparent cursor-pointer font-bold transition-all text-[10px] uppercase tracking-widest">
                    <i class="fas fa-power-off"></i><span class="hidden md:block ml-2 text-left">Salir</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-28 bg-slate-900 px-10 flex items-center justify-between z-10 border-b border-white/5">
                <div class="flex items-center gap-6 text-white text-left italic leading-none">
                    <div class="flex flex-col">
                        <span id="label-sede-top" class="text-[9px] bg-orange-500 text-white px-2 py-0.5 rounded font-black uppercase tracking-tighter w-fit mb-1">...</span>
                        <span id="current-vendedor-display" class="font-bold text-xs text-slate-400 uppercase tracking-widest">...</span>
                    </div>
                </div>
                <div class="flex flex-col items-center">
                    <span id="header-date" class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 italic">...</span>
                    <span id="header-time" class="text-3xl font-black text-white tabular-nums tracking-widest uppercase leading-none">00:00:00</span>
                </div>
                <div class="flex items-center gap-3 bg-white/5 px-6 py-3 rounded-2xl border border-white/5">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-lg shadow-green-500/20"></div>
                    <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest italic">Activo</span>
                </div>
            </header>
            <section id="view-container" class="flex-1 overflow-y-auto p-12 relative bg-slate-50"></section>
        </main>
    </div>

    <div id="main-modal" class="hidden fixed inset-0 z-[110] modal-overlay flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-5xl rounded-[3.5rem] shadow-2xl overflow-hidden animate-in">
            <div class="bg-slate-900 p-8 text-white flex justify-between items-center border-b border-white/10 italic text-left">
                <h2 id="modal-title" class="font-black text-2xl tracking-tighter uppercase leading-none italic">Operación</h2>
                <button onclick="cerrarModal()" id="btn-close-modal" class="text-slate-400 hover:text-white text-3xl bg-transparent border-0 cursor-pointer transition-all"><i class="fas fa-times-circle"></i></button>
            </div>
            <div id="modal-content" class="p-10 max-h-[85vh] overflow-y-auto hide-scroll bg-slate-50/30 relative text-left"></div>
        </div>
    </div>

    <script>
        // ==============================
        // Firebase
        // ==============================
        const firebaseConfig = {
            apiKey: "AIzaSyAEzn4UvflaiWEaXCLkPxYKDcK5HCtaYZk",
            authDomain: "crafts-colombia-pos.firebaseapp.com",
            projectId: "crafts-colombia-pos",
            storageBucket: "crafts-colombia-pos.firebasestorage.app",
            messagingSenderId: "924957968575",
            appId: "1:924957968575:web:12be975b2346dcdf585e0a"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ==============================
        // Estado global
        // ==============================
        let currentUserData = null;
        let activeSede = null;
        let productosData = [];
        let listaCategorias = [];
        let listaProveedores = [];
        let carrito = [];
        let vendedorActivo = (localStorage.getItem('vendedor_nombre') || "").toUpperCase();

        let unsubProductos = null;
        let unsubCategorias = null;
        let unsubProveedores = null;
        let unsubVentasStats = null;

        // ==============================
        // Helpers
        // ==============================
        const SEDES = ["bodega", "filandia1", "filandia2", "cableplaza", "fundadores", "jardin", "online"];

        function safeStr(v) { return (v ?? "").toString(); }
        function safeUpper(v) { return safeStr(v).toUpperCase(); }
        function normalizeSede(v) { return safeStr(v).toLowerCase().replace(/\s/g, ''); }
        function safeNum(v) { return Number(v || 0); }
        function money(v) { return `$${safeNum(v).toLocaleString('es-CO')}`; }

        function updateClock() {
            const now = new Date();
            const timeEl = document.getElementById('header-time');
            const dateEl = document.getElementById('header-date');
            if (timeEl) timeEl.innerText = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            if (dateEl) dateEl.innerText = now.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'short' });
        }
        setInterval(updateClock, 1000);

        function showError(msg) { alert(msg || "Ocurrió un error."); }

        function limpiarListenersFirestore() {
            try { if (typeof unsubVentasStats === 'function') { unsubVentasStats(); unsubVentasStats = null; } } catch {}
        }

        function limpiarListenersSesion() {
            try { if (typeof unsubProductos === 'function') { unsubProductos(); unsubProductos = null; } } catch {}
            try { if (typeof unsubCategorias === 'function') { unsubCategorias(); unsubCategorias = null; } } catch {}
            try { if (typeof unsubProveedores === 'function') { unsubProveedores(); unsubProveedores = null; } } catch {}
            try { if (typeof unsubVentasStats === 'function') { unsubVentasStats(); unsubVentasStats = null; } } catch {}
        }

        // ==============================
        // Auth
        // ==============================
        async function iniciarSesion() {
            const email = safeStr(document.getElementById('login-email')?.value).trim();
            const pass = safeStr(document.getElementById('login-pass')?.value);
            const vend = safeStr(document.getElementById('login-vendedor')?.value).trim();
            const sedeChoice = safeStr(document.getElementById('login-sede')?.value).trim();

            if (!vend) return alert("Indica el nombre del operario.");
            if (!sedeChoice) return alert("Selecciona la sede de trabajo.");
            if (!email || !pass) return alert("Ingresa correo y contraseña.");

            try {
                await auth.signInWithEmailAndPassword(email, pass);
                localStorage.setItem('vendedor_nombre', vend.toUpperCase());
                localStorage.setItem('active_sede_choice', sedeChoice);
                vendedorActivo = vend.toUpperCase();
            } catch (e) {
                console.error(e);
                alert("Error de acceso. Verifica correo y contraseña.");
            }
        }

        function cerrarSesion() {
            localStorage.removeItem('vendedor_nombre');
            localStorage.removeItem('active_sede_choice');
            carrito = [];
            limpiarListenersSesion();
            auth.signOut().finally(() => location.reload());
        }

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                document.getElementById('login-screen')?.classList.remove('hidden');
                document.getElementById('main-app')?.classList.add('hidden');
                return;
            }

            try {
                const chosenSede = localStorage.getItem('active_sede_choice');
                if (!chosenSede) {
                    alert("No se encontró la sede activa. Inicia sesión nuevamente.");
                    cerrarSesion();
                    return;
                }

                const userDoc = await db.collection('usuarios').doc(user.email).get();
                currentUserData = userDoc.data() || { rol: 'vendedor', sede: 'sin_sede' };

                const userSedes = Array.isArray(currentUserData.sede) ? currentUserData.sede : [currentUserData.sede];
                const hasAccess = (currentUserData.rol === 'admin') ||
                    userSedes.some(s => normalizeSede(s) === normalizeSede(chosenSede));

                if (!hasAccess) {
                    alert("❌ Sin permiso autorizado para esta sede.");
                    cerrarSesion();
                    return;
                }

                establecerSedeActiva(chosenSede);
                escucharCategorias();
                escucharProveedores();
                renderSidebar(currentUserData.rol);

                if (typeof unsubProductos === 'function') unsubProductos();
                unsubProductos = db.collection("productos").onSnapshot(
                    (snap) => {
                        productosData = [];
                        snap.forEach(d => productosData.push({ id: d.id, ...d.data() }));

                        // si la vista actual es inicio con buscador, refresca resultados
                        const searchInput = document.getElementById('global-search');
                        if (searchInput) filtrarVenta(searchInput.value);

                        // si existe listado inventario, refresca búsqueda avanzada
                        const invList = document.getElementById('inventory-list');
                        if (invList && (document.getElementById('adv-name') || document.getElementById('adv-sede'))) {
                            ejecutarBusquedaAvanzada();
                        }
                    },
                    (err) => {
                        console.error("Error productos onSnapshot:", err);
                        showError("Error cargando productos (revisa permisos de Firestore).");
                    }
                );
            } catch (e) {
                console.error(e);
                showError("Error inicializando sesión.");
            }
        });

        function establecerSedeActiva(sede) {
            activeSede = sede;
            document.getElementById('login-screen')?.classList.add('hidden');
            document.getElementById('main-app')?.classList.remove('hidden');
            document.getElementById('sidebar-sede-name').innerText = safeUpper(activeSede);
            document.getElementById('label-sede-top').innerText = "SEDE " + safeUpper(activeSede);
            document.getElementById('current-vendedor-display').innerText = vendedorActivo || "OPERARIO";
            updateClock();
            navegar('inicio');
        }

        // ==============================
        // Listeners de configuración
        // ==============================
        function escucharCategorias() {
            if (typeof unsubCategorias === 'function') unsubCategorias();
            unsubCategorias = db.collection("configuracion").doc("categorias").onSnapshot(
                (doc) => {
                    listaCategorias = (doc.exists && Array.isArray(doc.data()?.lista)) ? doc.data().lista : [];
                },
                (err) => {
                    console.error("Error categorías:", err);
                    listaCategorias = [];
                }
            );
        }

        function escucharProveedores() {
            if (typeof unsubProveedores === 'function') unsubProveedores();
            unsubProveedores = db.collection("proveedores").onSnapshot(
                (snap) => {
                    listaProveedores = [];
                    snap.forEach(d => listaProveedores.push({ id: d.id, ...d.data() }));
                    if (document.getElementById('prov-table-body')) renderProveedoresTable();
                },
                (err) => {
                    console.error("Error proveedores:", err);
                    listaProveedores = [];
                }
            );
        }

        // ==============================
        // Sidebar + Navegación
        // ==============================
        function renderSidebar(rol) {
            const nav = document.getElementById('nav-menu');
            if (!nav) return;

            let menu = `
                <button onclick="navegar('inicio')" data-vista="inicio" class="nav-btn w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all">
                    <i class="fas fa-th-large"></i><span class="hidden md:block">Inicio</span>
                </button>
            `;

            if (rol === 'admin' || rol === 'control') {
                menu += `
                    <button onclick="navegar('productos')" data-vista="productos" class="nav-btn w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all">
                        <i class="fas fa-boxes"></i><span class="hidden md:block">Logística</span>
                    </button>
                    <button onclick="navegar('historial')" data-vista="historial" class="nav-btn w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all">
                        <i class="fas fa-history"></i><span class="hidden md:block">Historial</span>
                    </button>
                `;
            }

            nav.innerHTML = menu;
            highlightNav('inicio');

            // Mostrar cesta para usuarios no admin/control (vendedores)
            const cesta = document.getElementById('sidebar-cesta');
            if (cesta) {
                if (rol === 'admin' || rol === 'control') cesta.classList.add('hidden');
                else cesta.classList.remove('hidden');
            }
        }

        function highlightNav(vista) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('nav-active'));
            const target = document.querySelector(`.nav-btn[data-vista="${vista}"]`);
            if (target) target.classList.add('nav-active');
        }

        function navegar(vista) {
            highlightNav(vista);
            limpiarListenersFirestore();

            const container = document.getElementById('view-container');
            if (!container || !currentUserData) return;

            const isAdmin = currentUserData.rol === 'admin' || currentUserData.rol === 'control';

            if (vista === 'inicio') {
                container.innerHTML = `
                    <div class="animate-in max-w-7xl mx-auto pt-4 text-center leading-none">
                        <h1 class="text-7xl font-black tracking-tighter text-slate-500 mb-2 italic leading-none uppercase">Crafts Colombia</h1>
                        <p class="text-orange-500 font-bold uppercase tracking-[0.5em] text-xs italic mb-16">SEDE ${safeUpper(activeSede)}</p>

                        <div class="max-w-2xl mx-auto relative mb-20 flex items-center">
                            <button onclick="ejecutarBusquedaLupa()" class="absolute left-6 z-10 bg-transparent border-0 cursor-pointer text-slate-200 text-xl hover:text-orange-500 transition-colors">
                                <i class="fas fa-search"></i>
                            </button>
                            <input id="global-search" onkeyup="filtrarVenta(this.value)" type="text" placeholder="Consultar stock..." class="w-full pl-16 pr-6 py-6 bg-white rounded-full border border-slate-100 shadow-2xl outline-none text-lg font-medium focus:ring-4 focus:ring-slate-100 transition-all" />
                        </div>

                        <div id="search-results-list" class="space-y-4 mb-12 text-left min-h-[100px]"></div>
                        <div id="stats-container" class="space-y-4"></div>
                    </div>
                `;

                if (isAdmin) {
                    const rowGen = (t, l, id, acc = false) => `
                        <div class="${acc ? 'bg-blue-50' : 'bg-white'} p-8 rounded-[3rem] stat-row flex items-center gap-8 mb-8 animate-in">
                            <div class="min-w-[220px] border-r border-slate-100 pr-8 text-left">
                                <p class="text-xs font-black uppercase tracking-widest mb-2 italic opacity-40">${l}</p>
                                <h3 class="text-sm font-black text-pavo-real uppercase tracking-widest mb-3">${t}</h3>
                                <h3 id="dash-total-${id}" class="text-5xl font-black ${id === 'hoy' ? 'text-orange-500' : 'text-pavo-real'} tabular-nums leading-none tracking-tighter">$0</h3>
                            </div>
                            <div class="flex-1 grid grid-cols-6 gap-2 text-center">
                                ${[1,2,3,4,5,6].map(i => `
                                    <div class="flex flex-col items-center justify-center">
                                        <p class="text-4xl font-black ${acc ? 'text-blue-200' : 'text-pavo-real'} mb-1 opacity-80 leading-none">${i}</p>
                                        <span id="val-${id}-${i}" class="font-black text-lg text-slate-800 tabular-nums tracking-tighter leading-none">$0</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;

                    document.getElementById('stats-container').innerHTML = `
                        <div class="bg-white p-12 rounded-[4rem] stat-row flex items-center gap-12 border-orange-200 border-2 mb-12 animate-in text-left leading-none">
                            <div class="min-w-[300px] border-r border-slate-100 pr-12">
                                <p class="text-xs font-black text-orange-500 uppercase tracking-widest mb-2 italic">Turno</p>
                                <h3 class="text-xl font-black text-pavo-real uppercase tracking-tighter mb-2 italic">Ventas de Hoy</h3>
                                <h3 id="dash-total-hoy" class="text-6xl font-black text-orange-500 tabular-nums leading-none tracking-tighter">$0</h3>
                            </div>
                            <div class="flex-1 text-right font-bold text-slate-300 uppercase tracking-widest text-xs italic">Cifras Globales</div>
                        </div>
                        ${rowGen("Cierre Ayer", "Corte", "ayer")}
                        ${rowGen("Global Mes", "Acumulado", "mes")}
                        ${rowGen("Histórico Año", "Fiscal 2026", "año", true)}
                    `;
                    cargarEstadisticasDashboard();
                } else {
                    document.getElementById('stats-container').innerHTML = `
                        <div class="bg-white p-12 rounded-[4rem] stat-row flex items-center gap-12 border-orange-200 border-2 mb-12 animate-in text-left leading-none">
                            <div class="min-w-[300px] border-r border-slate-100 pr-12">
                                <p class="text-xs font-black text-orange-500 uppercase tracking-widest mb-2 italic">Turno</p>
                                <h3 class="text-xl font-black text-pavo-real uppercase tracking-tighter mb-2 italic">Mis Ventas Hoy</h3>
                                <h3 id="dash-total-hoy" class="text-6xl font-black text-orange-500 tabular-nums leading-none tracking-tighter">$0</h3>
                            </div>
                        </div>
                    `;
                    cargarEstadisticasDashboard();
                }

                filtrarVenta("");
                return;
            }

            if (vista === 'productos') {
                container.innerHTML = `
                    <div class="animate-in max-w-7xl mx-auto pt-4 text-center leading-none">
                        <h1 class="text-5xl font-black tracking-tighter text-slate-500 mb-2 italic uppercase leading-none">Logística Central</h1>
                        <p class="text-orange-500 font-bold uppercase text-xs mb-12 tracking-widest italic leading-none">Existencias Globales</p>

                        <div class="bg-white p-12 rounded-[4rem] shadow-2xl border border-slate-100 mb-16 text-left relative">
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
                                <div>
                                    <label class="text-[10px] font-black text-slate-400 uppercase mb-3 block italic ml-4">Nombre o Referencia</label>
                                    <input id="adv-name" type="text" placeholder="Escribe..." class="w-full p-5 bg-slate-50 rounded-[2rem] border-0 ring-1 ring-slate-100 font-bold text-pavo-real text-lg shadow-sm" />
                                </div>
                                <div>
                                    <label class="text-[10px] font-black text-slate-400 uppercase mb-3 block italic ml-4">Sede Destino</label>
                                    <select id="adv-sede" class="w-full p-5 bg-slate-50 rounded-[2rem] border-0 ring-1 ring-slate-100 font-bold text-pavo-real appearance-none shadow-sm">
                                        <option value="TODAS">TODAS LAS SEDES</option>
                                        <option value="bodega">BODEGA</option>
                                        <option value="filandia1">FILANDIA 1</option>

            renderResultados(filtered, list);

        async function ejecutarTraslado(sourceId) {
            try {
                const qty = parseInt(document.getElementById('trans-qty')?.value, 10);
                const destSede = safeStr(document.getElementById('trans-dest')?.value);
                const sourceDoc = productosData.find(p => p.id === sourceId);

                if (!sourceDoc) return alert("Producto origen no encontrado.");
                if (!Number.isInteger(qty) || qty < 1) return alert("❌ Cantidad no válida.");
                if (qty > safeNum(sourceDoc.stock)) return alert("❌ La cantidad supera el stock disponible.");
                if (!destSede) return alert("❌ Selecciona una sede destino.");

                const batch = db.batch();

                // Descuenta en origen
                batch.update(db.collection("productos").doc(sourceId), {
                    stock: firebase.firestore.FieldValue.increment(-qty)
                });

                // Busca producto equivalente en destino
                const destQuery = await db.collection("productos")
                    .where("nombre", "==", safeStr(sourceDoc.nombre))
                    .where("categoria", "==", safeStr(sourceDoc.categoria))
                    .where("sede_ubicacion", "==", destSede)
                    .get();

                if (!destQuery.empty) {
                    batch.update(db.collection("productos").doc(destQuery.docs[0].id), {
                        stock: firebase.firestore.FieldValue.increment(qty)
                    });
                } else {
                    const newRef = db.collection("productos").doc();
                    const clone = { ...sourceDoc };
                    delete clone.id;
                    clone.stock = qty;
                    clone.sede_ubicacion = destSede;
                    clone.fecha_ingreso = firebase.firestore.FieldValue.serverTimestamp();
                    batch.set(newRef, clone);
                }

                // Log de traslado
                batch.set(db.collection("traslados").doc(), {
                    producto: safeUpper(sourceDoc.nombre),
                    fecha: firebase.firestore.FieldValue.serverTimestamp(),
                    origen: safeStr(sourceDoc.sede_ubicacion || "bodega"),
                    destino: destSede,
                    usuario: vendedorActivo || "SISTEMA",
                    cantidad: qty
                });

                await batch.commit();
                cerrarModal();
                alert("✅ Traslado completado.");
            } catch (e) {
                console.error(e);
                alert("Error al ejecutar traslado.");
            }
        }

        // ==============================
        // Dashboard / estadísticas
        // ==============================
        function cargarEstadisticasDashboard() {
            if (typeof unsubVentasStats === 'function') unsubVentasStats();

            const h = new Date();
            h.setHours(0, 0, 0, 0);

            const aI = new Date(h); aI.setDate(h.getDate() - 1);
            const aF = new Date(h); aF.setMilliseconds(-1);
            const mI = new Date(h.getFullYear(), h.getMonth(), 1);
            const yI = new Date(h.getFullYear(), 0, 1);

            unsubVentasStats = db.collection("ventas").onSnapshot(
                (snap) => {
                    let totals = { hoy: 0, ayer: 0, mes: 0, año: 0 };
                    const mapSedes = { "filandia1": "1", "filandia2": "2", "cableplaza": "3", "fundadores": "4", "jardin": "5", "online": "6" };
                    let bVals = { hoy: {}, ayer: {}, mes: {}, año: {} };
                    [1,2,3,4,5,6].forEach(i => { bVals.hoy[i]=0; bVals.ayer[i]=0; bVals.mes[i]=0; bVals.año[i]=0; });

                    snap.forEach(doc => {
                        const v = doc.data() || {};
                        const f = v.fecha && typeof v.fecha.toDate === 'function' ? v.fecha.toDate() : new Date();
                        const t = safeNum(v.total);
                        const sedeVenta = normalizeSede(v.sede);

                        // vendedores ven solo su sede
                        const canCountThis = (currentUserData?.rol === 'admin' || currentUserData?.rol === 'control')
                            ? true
                            : sedeVenta === normalizeSede(activeSede);

                        if (!canCountThis) return;

                        const n = mapSedes[sedeVenta] || null;
                        if (f >= h) { totals.hoy += t; if (n) bVals.hoy[n] += t; }
                        if (f >= aI && f <= aF) { totals.ayer += t; if (n) bVals.ayer[n] += t; }
                        if (f >= mI) { totals.mes += t; if (n) bVals.mes[n] += t; }
                        if (f >= yI) { totals.año += t; if (n) bVals.año[n] += t; }
                    });

                    ['hoy','ayer','mes','año'].forEach(k => {
                        const el = document.getElementById(`dash-total-${k}`);
                        if (el) el.innerText = money(totals[k]);
                    });

                    if (currentUserData?.rol === 'admin' || currentUserData?.rol === 'control') {
                        [1,2,3,4,5,6].forEach(i => {
                            ['hoy','ayer','mes','año'].forEach(p => {
                                const bEl = document.getElementById(`val-${p}-${i}`);
                                if (bEl) bEl.innerText = money(bVals[p][i]);
                            });
                        });
                    }
                },
                (err) => {
                    console.error("Error estadísticas:", err);
                    // no alert aquí para evitar spam
                }
            );
        }

        async function guardarCambios(id) {
            try {
                const nombre = safeStr(document.getElementById('edit-nombre')?.value).trim().toUpperCase();
                const categoria = safeStr(document.getElementById('edit-categoria')?.value);
                const nS = safeStr(document.getElementById('edit-sede')?.value);

                if (!nombre) return alert("El nombre es obligatorio.");
                if (!categoria) return alert("La categoría es obligatoria.");
                if (!nS) return alert("La sede es obligatoria.");

                const data = {
                    nombre,
                    categoria,
                    sede_ubicacion: nS,
                    precio: parseInt(document.getElementById('edit-precio')?.value, 10) || 0,
                    precio_compra: parseInt(document.getElementById('edit-compra')?.value, 10) || 0,
                    stock: parseInt(document.getElementById('edit-stock')?.value, 10) || 0,
                    stock_ideal: parseInt(document.getElementById('edit-ideal')?.value, 10) || 0
                };

                const isNew = (!id || id === "null" || id === "undefined");

                if (isNew) {
                    data.fecha_ingreso = firebase.firestore.FieldValue.serverTimestamp();
                    await db.collection("productos").add(data);

                    await db.collection("traslados").add({
                        producto: nombre,
                        fecha: firebase.firestore.FieldValue.serverTimestamp(),
                        origen: "INGRESO INICIAL",
                        destino: nS,
                        usuario: vendedorActivo || "SISTEMA",
                        cantidad: data.stock
                    });
                } else {
                    const original = productosData.find(p => p.id === id);
                    if (!original) return alert("No se encontró el producto a editar.");

                    if (safeStr(original.sede_ubicacion) !== nS) {
                        await db.collection("traslados").add({
                            producto: nombre,
                            fecha: firebase.firestore.FieldValue.serverTimestamp(),
                            origen: safeStr(original.sede_ubicacion || "bodega"),
                            destino: nS,
                            usuario: vendedorActivo || "SISTEMA",
                            cantidad: data.stock
                        });
                    }

                    // NO sobreescribir fecha_ingreso
                    await db.collection("productos").doc(id).update(data);
                }

                cerrarModal();
                alert("✅ Operación exitosa.");
            } catch (e) {
                console.error(e);
                alert("Error guardando cambios.");
            }
        }

            const m = document.getElementById('main-modal');

        function verHojaVida(prodName) {
            const c = document.getElementById('modal-content');
            document.getElementById('modal-title').innerText = "Historial: " + prodName;

            c.innerHTML = `
                <div id="loading-hv" class="p-10 text-center animate-in">
                    <i class="fas fa-circle-notch animate-spin text-pavo-real text-3xl mb-4"></i>
                    <p class="text-xs font-black text-slate-400 uppercase tracking-widest">Cargando...</p>
                </div>
            `;

            const timeout = setTimeout(() => {
                if (document.getElementById('loading-hv')) {
                    c.innerHTML = `<div class="p-20 text-center text-slate-300 italic uppercase text-[10px] font-black">Sin registros.</div>`;
                }
            }, 4000);

            db.collection("traslados").where("producto", "==", safeUpper(prodName)).get().then(snap => {
                clearTimeout(timeout);

                if (snap.empty) {
                    c.innerHTML = `<div class="p-20 text-center text-slate-300 italic uppercase text-[10px] font-black">No registra traslados previos.</div>`;
                    return;
                }

                const docs = [];
                snap.forEach(doc => docs.push(doc.data()));
                docs.sort((a, b) => (b.fecha?.seconds || 0) - (a.fecha?.seconds || 0));

                let html = `<div class="space-y-6 animate-in p-4 text-left leading-none">`;

                docs.forEach(t => {
                    const dt = t.fecha && typeof t.fecha.toDate === 'function' ? t.fecha.toDate() : new Date();
                    const fStr = dt.toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                    const hStr = dt.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });

                    html += `
                        <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-xl relative overflow-hidden group leading-none">
                            <div class="absolute top-0 left-0 w-2 h-full bg-orange-500 opacity-20"></div>

                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 leading-none">${fStr}</p>
                                    <p class="text-xs font-bold text-pavo-real uppercase tracking-widest leading-none">${hStr}</p>
                                </div>

                                <div class="bg-slate-50 px-4 py-2 rounded-2xl border border-slate-100 text-right">
                                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1 leading-none italic">Autor:</p>
                                    <p class="text-[10px] font-black text-pavo-real uppercase leading-none">${safeUpper(t.usuario || 'SISTEMA')}</p>
                                </div>
                            </div>

                            <div class="flex items-center gap-6 leading-none">
                                <div class="w-12 h-12 rounded-2xl bg-orange-50 flex items-center justify-center text-orange-500 text-xl shadow-inner">
                                    <i class="fas fa-exchange-alt"></i>
                                </div>

                                <h4 class="font-black text-2xl text-slate-800 uppercase italic tracking-tighter leading-none">
                                    ${safeUpper(t.origen || 'ORIGEN')} <i class="fas fa-arrow-right mx-3 text-pavo-real text-sm"></i> ${safeUpper(t.destino || 'DESTINO')}
                                </h4>

                                <div class="ml-auto bg-slate-900 text-white px-4 py-2 rounded-xl font-black text-xs leading-none">
                                    ${safeNum(t.cantidad || 1)} U.
                                </div>
                            </div>
                        </div>
                    `;
                });

                c.innerHTML = html + `</div>`;
            }).catch(err => {
                clearTimeout(timeout);
                console.error(err);
                c.innerHTML = `<div class="p-20 text-center text-red-400 italic uppercase text-[10px] font-black">Error cargando historial.</div>`;
            });
        }

        // ==============================
        // Historial vista (nuevo)
        // ==============================
        async function cargarHistorialTraslados() {
            const list = document.getElementById('historial-list');
            if (!list) return;

            const filtro = safeStr(document.getElementById('historial-filtro')?.value).toLowerCase().trim();

            list.innerHTML = `
                <div class="p-10 text-center animate-in">
                    <i class="fas fa-circle-notch animate-spin text-pavo-real text-2xl mb-3"></i>
                    <p class="text-xs font-black text-slate-400 uppercase tracking-widest">Consultando traslados...</p>
                </div>
            `;

            try {
                const snap = await db.collection("traslados").orderBy("fecha", "desc").limit(100).get();

                let rows = [];
                snap.forEach(doc => rows.push({ id: doc.id, ...doc.data() }));

                if (filtro) {
                    rows = rows.filter(r => safeStr(r.producto).toLowerCase().includes(filtro));
                }

                list.innerHTML = rows.map(t => {
                    const dt = t.fecha && typeof t.fecha.toDate === 'function' ? t.fecha.toDate() : new Date();
                    return `
                        <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm animate-in">
                            <div class="flex flex-col md:flex-row md:items-center gap-4">
                                <div class="flex-1">
                                    <p class="text-[10px] font-black text-orange-500 uppercase tracking-widest mb-1">${safeUpper(t.producto || 'SIN PRODUCTO')}</p>
                                    <p class="text-sm font-bold text-slate-700 uppercase">
                                        ${safeUpper(t.origen || 'ORIGEN')} → ${safeUpper(t.destino || 'DESTINO')}
                                    </p>
                                    <p class="text-xs text-slate-400 mt-1">
                                        ${dt.toLocaleDateString('es-CO')} · ${dt.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' })}
                                    </p>
                                </div>

                                <div class="text-right">
                                    <p class="text-xs font-black text-slate-400 uppercase">Cantidad</p>
                                    <p class="text-lg font-black text-pavo-real">${safeNum(t.cantidad)}</p>
                                </div>

                                <div class="text-right min-w-[140px]">
                                    <p class="text-xs font-black text-slate-400 uppercase">Usuario</p>
                                    <p class="text-sm font-bold text-slate-700 uppercase">${safeUpper(t.usuario || 'SISTEMA')}</p>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('') || `<div class="text-center p-10 text-slate-300 italic uppercase font-black text-[10px]">No hay registros.</div>`;
            } catch (e) {
                console.error(e);
                list.innerHTML = `<div class="text-center p-10 text-red-400 italic uppercase font-black text-[10px]">Error consultando historial.</div>`;
            }
        }

        // ==============================
        // Cesta / ventas básicas (stubs funcionales)
        // ==============================
        function renderCarrito() {
            const itemsEl = document.getElementById('cesta-items');
            const totalEl = document.getElementById('cesta-total');
            if (!itemsEl || !totalEl) return;

            if (!carrito.length) {
                itemsEl.innerHTML = `<div class="text-[10px] text-slate-500 font-bold italic uppercase">Sin productos</div>`;
                totalEl.innerText = "$0";
                return;
            }

            itemsEl.innerHTML = carrito.map((item, idx) => `
                <div class="bg-white/5 p-3 rounded-xl border border-white/5">
                    <p class="text-[10px] font-black text-white uppercase truncate">${safeUpper(item.nombre)}</p>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-[10px] text-slate-400">x${safeNum(item.cantidad)}</span>
                        <span class="text-[10px] text-orange-400 font-black">${money(item.subtotal)}</span>
                    </div>
                    <button onclick="quitarDelCarrito(${idx})" class="mt-2 text-[9px] uppercase font-black text-slate-400 hover:text-red-400 bg-transparent border-0 cursor-pointer">Quitar</button>
                </div>
            `).join('');

            const total = carrito.reduce((acc, i) => acc + safeNum(i.subtotal), 0);
            totalEl.innerText = money(total);
        }

        function agregarCarrito(id) {
            const p = productosData.find(x => x.id === id);
            if (!p) return alert("Producto no encontrado.");

            if (normalizeSede(p.sede_ubicacion) !== normalizeSede(activeSede)) {
                return alert("Este producto no pertenece a la sede activa.");
            }

            if (safeNum(p.stock) <= 0) return alert("Sin stock disponible.");

            const existing = carrito.find(i => i.id === id);
            if (existing) {
                if (existing.cantidad + 1 > safeNum(p.stock)) return alert("No hay más stock disponible.");
                existing.cantidad += 1;
                existing.subtotal = safeNum(existing.cantidad) * safeNum(existing.precio);
            } else {
                carrito.push({
                    id: p.id,
                    nombre: safeStr(p.nombre),
                    precio: safeNum(p.precio),
                    cantidad: 1,
                    subtotal: safeNum(p.precio)
                });
            }

            renderCarrito();
        }

        function quitarDelCarrito(index) {
            carrito.splice(index, 1);
            renderCarrito();
        }

        async function finalizarVenta() {
            if (!carrito.length) return alert("La cesta está vacía.");

            const total = carrito.reduce((acc, i) => acc + safeNum(i.subtotal), 0);
            const ok = confirm(`¿Finalizar venta por ${money(total)}?`);
            if (!ok) return;

            try {
                const batch = db.batch();

                // registrar venta
                const ventaRef = db.collection("ventas").doc();
                batch.set(ventaRef, {
                    fecha: firebase.firestore.FieldValue.serverTimestamp(),
                    total,
                    sede: activeSede,
                    vendedor: vendedorActivo || "OPERARIO",
                    items: carrito.map(i => ({
                        id: i.id,
                        nombre: safeUpper(i.nombre),
                        precio: safeNum(i.precio),
                        cantidad: safeNum(i.cantidad),
                        subtotal: safeNum(i.subtotal)
                    }))
                });

                // descontar stock
                carrito.forEach(item => {
                    batch.update(db.collection("productos").doc(item.id), {
                        stock: firebase.firestore.FieldValue.increment(-safeNum(item.cantidad))
                    });
                });

                await batch.commit();
                carrito = [];
                renderCarrito();
                alert("✅ Venta registrada.");
            } catch (e) {
                console.error(e);
                alert("Error al finalizar la venta.");
            }
        }
