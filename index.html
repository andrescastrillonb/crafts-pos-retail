<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crafts POS | Sistema Central</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-100 text-slate-900">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-white animate-in">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                    <i class="fas fa-gem text-white text-2xl"></i>
                </div>
                <h1 class="text-3xl font-black tracking-tight">Crafts POS</h1>
                <p class="text-slate-400 mt-2 font-medium">Identificación de Personal</p>
            </div>
            <div class="space-y-4">
                <input id="login-email" type="email" placeholder="Usuario / Correo" class="w-full p-4 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-600 outline-none">
                <input id="login-pass" type="password" placeholder="Contraseña" class="w-full p-4 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-600 outline-none">
                <button onclick="iniciarSesion()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-bold hover:bg-blue-600 transition-all flex items-center justify-center gap-2">
                    <span>Entrar al Sistema</span>
                </button>
            </div>
            <p id="login-error" class="text-red-500 text-sm mt-4 text-center hidden font-bold"></p>
        </div>
    </div>

    <div id="main-app" class="hidden flex min-h-screen">
        <aside class="w-20 md:w-64 bg-slate-900 text-white transition-all">
            <div class="p-6 flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center"><i class="fas fa-gem text-white text-sm"></i></div>
                <span class="font-bold text-lg hidden md:block tracking-tight uppercase">Crafts</span>
            </div>
            <nav id="nav-menu" class="mt-6 px-4 space-y-2">
                </nav>
            <div class="absolute bottom-8 px-4 w-full md:w-64">
                <button onclick="cerrarSesion()" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-red-500/10 text-red-400 border-0 bg-transparent cursor-pointer">
                    <i class="fas fa-power-off"></i><span class="hidden md:block font-bold">Salir</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col">
            <header class="h-16 bg-white border-b border-gray-200 px-8 flex items-center justify-between">
                <div>
                    <span id="user-role-badge" class="text-[10px] bg-blue-100 text-blue-600 px-2 py-1 rounded-md font-black mr-2 uppercase">ROL</span>
                    <span id="user-display" class="font-bold text-slate-800">Usuario</span>
                </div>
                <div class="text-[10px] bg-green-100 px-3 py-1 rounded-full font-bold text-green-600 tracking-widest">ONLINE</div>
            </header>
            
            <section id="view-container" class="p-8">
                </section>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAEzn4UvflaiWEaXCLkPxYKDcK5HCtaYZk",
            authDomain: "crafts-colombia-pos.firebaseapp.com",
            projectId: "crafts-colombia-pos",
            storageBucket: "crafts-colombia-pos.firebasestorage.app",
            messagingSenderId: "924957968575",
            appId: "1:924957968575:web:12be975b2346dcdf585e0a"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 1. GESTIÓN DE LOGIN
        function iniciarSesion() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            auth.signInWithEmailAndPassword(email, pass).catch(e => {
                document.getElementById('login-error').innerText = "Acceso Denegado";
                document.getElementById('login-error').classList.remove('hidden');
            });
        }

        function cerrarSesion() { auth.signOut(); location.reload(); }

        // 2. OBSERVADOR DE ADN (SESIÓN + ROLES)
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const doc = await db.collection('usuarios').doc(user.email).get();
                const perfil = doc.data() || { rol: 'vendedor' }; // Por defecto vendedor si no existe

                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email;
                document.getElementById('user-role-badge').innerText = perfil.rol;

                construirMenu(perfil.rol);
                navegar('inventario'); // Al entrar, vamos directo al inventario que ya conocemos
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        // 3. CONSTRUIR BARRA LATERAL SEGÚN ROL
        function construirMenu(rol) {
            const nav = document.getElementById('nav-menu');
            let html = `
                <button onclick="navegar('inventario')" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-slate-800 text-gray-400 hover:text-white border-0 bg-transparent text-left cursor-pointer">
                    <i class="fas fa-boxes w-5"></i><span class="hidden md:block font-bold">Inventario</span>
                </button>`;
            
            if (rol === 'admin' || rol === 'control') {
                html += `
                <button onclick="navegar('reportes')" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-slate-800 text-gray-400 hover:text-white border-0 bg-transparent text-left cursor-pointer border-t border-slate-700 mt-4 pt-4">
                    <i class="fas fa-chart-line w-5"></i><span class="hidden md:block font-bold">Reportes</span>
                </button>`;
            }
            nav.innerHTML = html;
        }

        // 4. NAVEGACIÓN (AQUÍ REINTEGRAMOS TU TRABAJO ANTERIOR)
        function navegar(vista) {
            const container = document.getElementById('view-container');
            if (vista === 'inventario') {
                container.innerHTML = `
                    <div class="animate-in max-w-5xl mx-auto">
                        <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 mb-8">
                            <h2 class="text-xl font-black mb-6">Registrar Producto</h2>
                            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                                <input id="n" type="text" placeholder="Nombre" class="p-4 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-600 outline-none">
                                <input id="p" type="number" placeholder="Precio ($)" class="p-4 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-600 outline-none">
                                <input id="s" type="number" placeholder="Stock" class="p-4 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-600 outline-none">
                                <button onclick="guardar()" class="bg-blue-600 text-white p-4 rounded-2xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-100">Guardar</button>
                            </div>
                        </div>
                        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                            <table class="w-full text-left">
                                <thead class="bg-slate-50 text-slate-400 text-xs font-bold uppercase tracking-widest"><th class="p-6">Producto</th><th class="p-6 text-center">Precio</th><th class="p-6 text-center">Stock</th></thead>
                                <tbody id="tabla-productos" class="divide-y divide-gray-50"></tbody>
                            </table>
                        </div>
                    </div>`;
                cargarTabla();
            } else {
                container.innerHTML = `<div class="p-20 text-center"><i class="fas fa-lock text-4xl text-slate-200 mb-4"></i><h2 class="text-xl font-bold">Módulo de Auditoría</h2><p class="text-slate-400">Próximamente disponible.</p></div>`;
            }
        }

        // 5. LÓGICA DE DATOS (Lo que ya funcionaba)
        function cargarTabla() {
            db.collection("productos").orderBy("creado", "desc").onSnapshot(snap => {
                const tbody = document.getElementById('tabla-productos');
                if(!tbody) return;
                let h = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    h += `<tr class="hover:bg-slate-50"><td class="p-6 font-bold text-slate-700">${d.nombre}</td><td class="p-6 text-center text-blue-600 font-bold">$${Number(d.precio).toLocaleString()}</td><td class="p-6 text-center"><span class="bg-slate-100 px-3 py-1 rounded-full font-bold">${d.stock}</span></td></tr>`;
                });
                tbody.innerHTML = h || '<tr><td colspan="3" class="p-10 text-center">Sin productos</td></tr>';
            });
        }

        async function guardar() {
            const n = document.getElementById('n').value, p = document.getElementById('p').value, s = document.getElementById('s').value;
            if(!n || !p) return;
            await db.collection("productos").add({ nombre: n, precio: Number(p), stock: Number(s), creado: firebase.firestore.FieldValue.serverTimestamp() });
            document.getElementById('n').value = ""; document.getElementById('p').value = ""; document.getElementById('s').value = "";
        }
    </script>
</body>
</html>
