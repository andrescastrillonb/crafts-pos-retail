</head>
<body class="text-slate-700">

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAEzn4UvflaiWEaXCLkPxYKDcK5HCtaYZk", authDomain: "crafts-colombia-pos.firebaseapp.com", projectId: "crafts-colombia-pos", storageBucket: "crafts-colombia-pos.firebasestorage.app", messagingSenderId: "924957968575", appId: "1:924957968575:web:12be975b2346dcdf585e0a" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth(); const db = firebase.firestore();
        let currentUserData = null, productosData = [], listaCategorias = [];

        function updateClock() { const now = new Date(); const options = { weekday: 'long', day: 'numeric', month: 'short' }; if(document.getElementById('header-date')) { document.getElementById('header-date').innerText = now.toLocaleDateString('es-ES', options); document.getElementById('header-time').innerText = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' }); } }
        setInterval(updateClock, 1000);

        function iniciarSesion() { const email = document.getElementById('login-email').value, pass = document.getElementById('login-pass').value; auth.signInWithEmailAndPassword(email, pass).catch(() => alert("Error de acceso")); }
        function cerrarSesion() { auth.signOut(); location.reload(); }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const doc = await db.collection('usuarios').doc(user.email).get();
                currentUserData = doc.data() || { rol: 'vendedor', sede: '...' };
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email;
                escucharCategorias(); renderSidebar(currentUserData.rol); navegar('inicio');
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        function escucharCategorias() { db.collection("configuracion").doc("categorias").onSnapshot(doc => { if(doc.exists) listaCategorias = doc.data().lista || []; }); }

        function renderSidebar(rol) {
            const nav = document.getElementById('nav-menu');
            let menu = `<button onclick="navegar('inicio')" class="w-full flex items-center gap-4 p-4 rounded-xl bg-white/5 text-white border-0 text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all"><i class="fas fa-th-large"></i><span class="hidden md:block">Dashboard</span></button>`;
            if (rol === 'admin' || rol === 'control') {
                menu += `
                <button onclick="navegar('productos')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 hover:text-white border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all"><i class="fas fa-boxes"></i><span class="hidden md:block">Inventario</span></button>
                <button onclick="navegar('reportes')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 hover:text-white border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all"><i class="fas fa-chart-pie"></i><span class="hidden md:block">Reportes</span></button>`;
            }
            nav.innerHTML = menu;
        }

        function navegar(vista) {
            const container = document.getElementById('view-container');
            if (vista === 'inicio') {
                container.innerHTML = `
                    <div class="animate-in max-w-7xl mx-auto pt-4">
                        <div class="text-center mb-16">
                            <h1 class="text-7xl font-black tracking-tighter text-slate-500 mb-2 italic leading-none">Crafts Colombia</h1>
                            <p class="text-orange-500 font-bold uppercase tracking-[0.5em] text-xs italic">Panel de Control Administrativo</p>
                        </div>

                        <div class="max-w-2xl mx-auto relative mb-16">
                            <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-200 text-xl"></i>
                            <input type="text" placeholder="Buscador global de operaciones..." class="w-full pl-16 pr-6 py-6 bg-white rounded-full border border-slate-100 shadow-2xl outline-none text-lg font-medium focus:ring-4 focus:ring-slate-100 transition-all">
                        </div>

                        <div class="space-y-8">
                            <div class="bg-white p-10 rounded-[3rem] stat-row flex items-center gap-10 border-orange-100 border-2">
                                <div class="min-w-[200px] border-r border-slate-100 pr-10">
                                    <p class="text-[10px] font-black text-orange-500 uppercase tracking-widest mb-1 italic">Operación Real-Time</p>
                                    <h3 class="text-[11px] font-black text-pavo-real uppercase tracking-widest mb-1">Ventas de Hoy</h3>
                                    <h3 id="dash-total-hoy" class="text-4xl font-black text-orange-500 tabular-nums">$0</h3>
                                </div>
                                <div class="flex-1 grid grid-cols-3 md:grid-cols-6 gap-8">
                                    <div class="flex flex-col"><span class="text-[9px] font-black text-pavo-real uppercase mb-1">Filandia 1</span><span id="val-hoy-Filandia1" class="font-black text-sm text-slate-700">$0</span></div>
                                    <div class="flex flex-col"><span class="text-[9px] font-black text-pavo-real uppercase mb-1">Filandia 2</span><span id="val-hoy-Filandia2" class="font-black text-sm text-slate-700">$0</span></div>
                                    <div class="flex flex-col"><span class="text-[9px] font-black text-pavo-real uppercase mb-1">Cable Plaza</span><span id="val-hoy-CablePlaza" class="font-black text-sm text-slate-700">$0</span></div>
                                    <div class="flex flex-col"><span class="text-[9px] font-black text-pavo-real uppercase mb-1">Fundadores</span><span id="val-hoy-Fundadores" class="font-black text-sm text-slate-700">$0</span></div>
                                    <div class="flex flex-col"><span class="text-[9px] font-black text-pavo-real uppercase mb-1">Jardín</span><span id="val-hoy-Jardin" class="font-black text-sm text-slate-700">$0</span></div>
                                    <div class="flex flex-col"><span class="text-[9px] font-black text-pavo-real uppercase mb-1">Online</span><span id="val-hoy-Online" class="font-black text-sm text-slate-700">$0</span></div>
                                </div>
                            </div>

                            <div class="bg-white p-10 rounded-[3rem] stat-row flex items-center gap-10">
                                <div class="min-w-[200px] border-r border-slate-100 pr-10">
                                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 italic">Cierre Anterior</p>
                                    <h3 class="text-[11px] font-black text-pavo-real uppercase tracking-widest mb-1">Ventas Ayer</h3>
                                    <h3 id="dash-total-ayer" class="text-4xl font-black text-pavo-real tabular-nums">$0</h3>
                                </div>
                                <div class="flex-1 grid grid-cols-3 md:grid-cols-6 gap-8 opacity-70">
                                    <div class="flex flex-col"><span class="text-[9px] font-black text-slate-400 uppercase mb-1">Filandia 1</span><span id="val-ayer-Filandia1" class="font-black text-sm text-slate-700">$0</span></div>
                                    <div class="flex flex-col"><span class="text-[9px] font-black text-slate-400 uppercase mb-1">Filandia 2</span><span id="val-ayer-Filandia2" class="font-black text-sm text-slate-700">$0</span></div>
                                    <div class="flex flex-col"><span class="text-[9px] font-black text-slate-400 uppercase mb-1">Cable Plaza</span><span id="val-ayer-CablePlaza" class="font-black text-sm text-slate-700">$0</span></div>
                                    <div class="flex flex-col"><span class="text-[9px] font-black text-slate-400 uppercase mb-1">Fundadores</span><span id="val-ayer-Fundadores" class="font-black text-sm text-slate-700">$0</span></div>
                                    <div class="flex flex-col"><span class="text-[9px] font-black text-slate-400 uppercase mb-1">Jardín</span><span id="val-ayer-Jardin" class="font-black text-sm text-slate-700">$0</span></div>
                                    <div class="flex flex-col"><span class="text-[9px] font-black text-slate-400 uppercase mb-1">Online</span><span id="val-ayer-Online" class="font-black text-sm text-slate-700">$0</span></div>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div class="bg-white p-10 rounded-[3rem] stat-row flex items-center gap-10">
                                    <div class="min-w-[150px] border-r border-slate-100 pr-10">
                                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1 italic">Total Mes</p>
                                        <h3 id="dash-total-mes" class="text-4xl font-black text-pavo-real tabular-nums">$0</h3>
                                    </div>
                                    <div class="flex-1"><span class="text-xs font-black text-pavo-real uppercase tracking-widest italic">Rendimiento Operativo</span><p class="text-xs font-medium text-slate-400 mt-1">Consolidado mensual de todas las sedes.</p></div>
                                </div>
                                <div class="bg-blue-50 p-10 rounded-[3rem] stat-row flex items-center gap-10 border border-blue-100">
                                    <div class="min-w-[150px] border-r border-blue-200 pr-10">
                                        <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-1 italic">Proyección Año</p>
                                        <h3 id="dash-total-año" class="text-4xl font-black text-pavo-real tabular-nums">$0</h3>
                                    </div>
                                    <div class="flex-1"><span class="text-xs font-black text-green-600 uppercase tracking-widest italic">+0.0% Crecimiento</span><p class="text-xs font-medium text-slate-400 mt-1">Métrica acumulada año fiscal 2026.</p></div>
                                </div>
                            </div>
                        </div>
                    </div>`;
                cargarEstadisticasDashboard();
            } else if (vista === 'productos') {
                container.innerHTML = `
                    <div class="animate-in max-w-7xl mx-auto pt-4">
                        <div class="text-center mb-16"><h1 class="text-5xl font-black tracking-tighter text-slate-500 mb-2 italic leading-none">Logística Central</h1><p class="text-orange-500 font-bold uppercase tracking-[0.3em] text-xs italic">Administración de Existencias</p></div>
                        <div class="max-w-2xl mx-auto relative mb-12"><i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-200 text-xl"></i><input id="inv-search" onkeyup="filtrarInventario(this.value)" type="text" placeholder="Buscar producto o sede..." class="w-full pl-16 pr-6 py-6 bg-white rounded-full border border-slate-100 shadow-2xl outline-none text-lg font-medium focus:ring-4 focus:ring-slate-100 transition-all"></div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                            <button onclick="nuevaFicha()" class="bg-orange-500 p-8 rounded-[2.5rem] action-module flex items-center gap-6 text-white group shadow-xl"><div class="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center text-2xl"><i class="fas fa-plus"></i></div><div class="text-left"><h3 class="font-black text-xl uppercase tracking-tighter mb-1 italic">Nuevo Artículo</h3><p class="text-[10px] font-bold opacity-80 uppercase">Ficha Individual</p></div></button>
                            <button onclick="gestionCategorias()" class="bg-white p-8 rounded-[2.5rem] action-module flex items-center gap-6"><div class="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center text-2xl text-pavo-real"><i class="fas fa-tags"></i></div><div class="text-left"><h3 class="font-black text-pavo-real text-xl uppercase tracking-tighter mb-1 italic">Categorías</h3><p class="text-[10px] font-bold text-slate-400 uppercase">Administrar</p></div></button>
                            <button onclick="modalCargaMasiva()" class="bg-white p-8 rounded-[2.5rem] action-module flex items-center gap-6"><div class="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center text-2xl text-pavo-real"><i class="fas fa-file-excel"></i></div><div class="text-left"><h3 class="font-black text-pavo-real text-xl uppercase tracking-tighter mb-1 italic">Carga Masiva</h3><p class="text-[10px] font-bold text-slate-400 uppercase">Excel Import</p></div></button>
                        </div>
                        <div id="inventory-list" class="space-y-3"></div>
                    </div>`;
                escucharInventario();
            }
        }

        async function cargarEstadisticasDashboard() {
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            const ayerInicio = new Date(hoy); ayerInicio.setDate(hoy.getDate() - 1);
            const ayerFin = new Date(hoy); ayerFin.setMilliseconds(-1);
            const mesInicio = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
            const añoInicio = new Date(hoy.getFullYear(), 0, 1);

            db.collection("ventas").onSnapshot(snap => {
                let totalHoy = 0, totalAyer = 0, totalMes = 0, totalAño = 0;
                let sedesHoy = { "Filandia 1": 0, "Filandia 2": 0, "Cable Plaza": 0, "Fundadores": 0, "Jardín": 0, "Online": 0 };
                let sedesAyer = { "Filandia 1": 0, "Filandia 2": 0, "Cable Plaza": 0, "Fundadores": 0, "Jardín": 0, "Online": 0 };

                snap.forEach(doc => {
                    const v = doc.data();
                    const fecha = v.fecha ? v.fecha.toDate() : new Date();
                    const total = v.total || 0;

                    if(fecha >= hoy) {
                        totalHoy += total;
                        if(sedesHoy[v.sede] !== undefined) sedesHoy[v.sede] += total;
                    } else if(fecha >= ayerInicio && fecha <= ayerFin) {
                        totalAyer += total;
                        if(sedesAyer[v.sede] !== undefined) sedesAyer[v.sede] += total;
                    }
                    if(fecha >= mesInicio) totalMes += total;
                    if(fecha >= añoInicio) totalAño += total;
                });

                if(document.getElementById('dash-total-hoy')) {
                    document.getElementById('dash-total-hoy').innerText = `$${totalHoy.toLocaleString()}`;
                    document.getElementById('dash-total-ayer').innerText = `$${totalAyer.toLocaleString()}`;
                    document.getElementById('dash-total-mes').innerText = `$${totalMes.toLocaleString()}`;
                    document.getElementById('dash-total-año').innerText = `$${totalAño.toLocaleString()}`;
                    
                    for(let s in sedesHoy) {
                        const idHoy = 'val-hoy-' + s.replace(/\s/g, '');
                        const idAyer = 'val-ayer-' + s.replace(/\s/g, '');
                        if(document.getElementById(idHoy)) document.getElementById(idHoy).innerText = `$${sedesHoy[s].toLocaleString()}`;
                        if(document.getElementById(idAyer)) document.getElementById(idAyer).innerText = `$${sedesAyer[s].toLocaleString()}`;
                    }
                }
            });
        }

        // --- FUNCIONES LOGÍSTICA (INVENTARIO) ---
        function escucharInventario() {
            db.collection("productos").onSnapshot(snap => {
                productosData = []; snap.forEach(doc => productosData.push({ id: doc.id, ...doc.data() }));
                const list = document.getElementById('inventory-list'); if(!list) return;
                let html = "";
                productosData.forEach(p => {
                    const alerta = p.stock <= (p.stock_ideal || 0);
                    html += `
                        <div class="bg-white p-6 rounded-[2.5rem] stat-row flex items-center gap-10 animate-in">
                            <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-300 text-lg"><i class="fas fa-image"></i></div>
                            <div class="flex-1">
                                <p class="text-[8px] font-black text-orange-500 uppercase tracking-widest mb-1 italic">${p.categoria}</p>
                                <h3 class="font-black text-pavo-real text-lg uppercase tracking-tighter truncate leading-tight">${p.nombre}</h3>
                            </div>
                            <div class="text-center min-w-[120px] border-l border-slate-50 pl-4"><span class="bg-pavo-real text-white text-[9px] px-3 py-1 rounded-full font-black uppercase italic">${p.sede_ubicacion || 'Bodega'}</span></div>
                            <div class="text-center min-w-[100px] border-l border-slate-50 pl-4"><p class="font-black text-base ${alerta ? 'text-red-500' : 'text-pavo-real'} tabular-nums">${p.stock} / ${p.stock_ideal || 0}</p></div>
                            <div class="text-right min-w-[120px] border-l border-slate-50 pl-4"><p class="font-black text-pavo-real text-lg tabular-nums">$${p.precio.toLocaleString()}</p></div>
                            <div class="flex gap-2 border-l border-slate-50 pl-4"><button onclick="verFicha('${p.id}')" class="text-slate-300 hover:text-pavo-real transition-all text-xl bg-transparent border-0 cursor-pointer"><i class="fas fa-edit"></i></button></div>
                        </div>`;
                });
                list.innerHTML = html;
            });
        }

        // Resto de funciones (verFicha, guardarCambios, etc.) mantenidas íntegras para estabilidad.
        function filtrarInventario(q) { const query = q.toLowerCase(); renderInventario_Manual(productosData.filter(p => p.nombre.toLowerCase().includes(query) || (p.sede_ubicacion && p.sede_ubicacion.toLowerCase().includes(query)))); }
        function renderInventario_Manual(data) { const list = document.getElementById('inventory-list'); if(!list) return; let html = ""; data.forEach(p => { const alerta = p.stock <= (p.stock_ideal || 0); html += `<div class="bg-white p-6 rounded-[2.5rem] stat-row flex items-center gap-10 animate-in"><div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-300 text-lg"><i class="fas fa-image"></i></div><div class="flex-1"><p class="text-[8px] font-black text-orange-500 uppercase tracking-widest mb-1 italic">${p.categoria}</p><h3 class="font-black text-pavo-real text-lg uppercase tracking-tighter truncate leading-tight">${p.nombre}</h3></div><div class="text-center min-w-[120px] border-l border-slate-50 pl-4"><span class="bg-pavo-real text-white text-[9px] px-3 py-1 rounded-full font-black uppercase italic">${p.sede_ubicacion || 'Bodega'}</span></div><div class="text-center min-w-[100px] border-l border-slate-50 pl-4"><p class="font-black text-base ${alerta ? 'text-red-500' : 'text-pavo-real'} tabular-nums">${p.stock} / ${p.stock_ideal || 0}</p></div><div class="text-right min-w-[120px] border-l border-slate-50 pl-4"><p class="font-black text-pavo-real text-lg tabular-nums">$${p.precio.toLocaleString()}</p></div><div class="flex gap-2 border-l border-slate-50 pl-4"><button onclick="verFicha('${p.id}')" class="text-slate-300 hover:text-pavo-real transition-all text-xl bg-transparent border-0 cursor-pointer"><i class="fas fa-edit"></i></button></div></div>`; }); list.innerHTML = html; }
        function cerrarModal() { document.getElementById('main-modal').classList.add('hidden'); }
    </script>
</body>
</html>
