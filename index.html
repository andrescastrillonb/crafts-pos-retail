<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crafts POS | Enterprise Management</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1041/1041916.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .animate-in { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .bg-petrol { background-color: #0f1d24; }
        .text-pavo-real { color: #004B8D; }
        .bg-pavo-real { background-color: #004B8D; }
        .modal-overlay { background: rgba(15, 29, 36, 0.95); backdrop-filter: blur(15px); }
        .stat-row, .action-module { transition: all 0.3s ease; border: 1px solid #f1f5f9; }
        .stat-row:hover { transform: scale(1.005); background-color: #ffffff; box-shadow: 0 15px 45px -15px rgba(0,75,141,0.12); }
        .nav-active { background-color: rgba(255, 255, 255, 0.1) !important; color: white !important; }
    </style>
</head>
<body class="text-slate-700">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6 bg-petrol">
        <div class="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-md animate-in border border-white/10 text-center">
            <h1 class="text-3xl font-black text-slate-500 mb-8 uppercase tracking-tighter">CRAFTS POS</h1>
            <div class="space-y-4">
                <input id="login-email" type="email" placeholder="Usuario de Sede" class="w-full p-5 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-slate-400 font-medium">
                <input id="login-pass" type="password" placeholder="Contraseña" class="w-full p-5 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-slate-400 font-medium">
                <button onclick="iniciarSesion()" class="w-full bg-slate-700 text-white p-5 rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-lg uppercase tracking-widest text-xs">Entrar a la Sede</button>
            </div>
        </div>
    </div>

    <div id="vendedor-modal" class="hidden fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-6">
        <div class="bg-white p-12 rounded-[4rem] shadow-2xl w-full max-w-lg animate-in text-center">
            <div class="w-20 h-20 bg-orange-100 text-orange-500 rounded-3xl flex items-center justify-center text-3xl mx-auto mb-6">
                <i class="fas fa-user-tag"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-700 mb-2 uppercase tracking-tighter italic">Inicio de Turno</h2>
            <p class="text-slate-400 text-sm mb-8 font-medium">Por seguridad, identifica quién opera el sistema ahora.</p>
            <input id="vendedor-nombre" type="text" placeholder="Escribe tu nombre..." class="w-full p-6 bg-slate-50 rounded-3xl border-0 ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-orange-400 text-xl font-bold text-center text-pavo-real mb-6 uppercase">
            <button onclick="asignarVendedor()" class="w-full bg-pavo-real text-white p-6 rounded-[2rem] font-black uppercase tracking-widest text-sm shadow-xl hover:bg-slate-900 transition-all">Empezar a Vender</button>
        </div>
    </div>

    <div id="main-app" class="hidden flex min-h-screen">
        <aside class="w-20 md:w-56 bg-petrol text-white flex flex-col z-20 shadow-2xl transition-all">
            <div class="p-6 flex items-center gap-3 border-b border-white/5">
                <div class="w-8 h-8 bg-orange-500 rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-gem text-white text-xs"></i></div>
                <div class="hidden md:block leading-tight text-left">
                    <p class="font-black text-[9px] tracking-widest text-slate-500 uppercase leading-none mb-1">Central Console</p>
                    <p id="sidebar-sede-name" class="font-bold text-white text-[10px] uppercase italic">Sede...</p>
                </div>
            </div>
            <nav id="nav-menu" class="p-4 mt-10 space-y-2 flex-1 hide-scroll"></nav>
            <div class="p-4 border-t border-white/5 text-center">
                <button onclick="cerrarSesion()" class="w-full flex items-center justify-center gap-3 p-3 rounded-xl hover:bg-white/5 text-slate-500 border-0 bg-transparent cursor-pointer font-bold transition-all text-[10px] uppercase">
                    <i class="fas fa-power-off"></i><span class="hidden md:block">Salir</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-28 bg-slate-900 px-10 flex items-center justify-between z-10 border-b border-white/5">
                <div class="flex items-center gap-6 text-white text-left">
                    <div class="flex flex-col">
                        <span id="label-sede" class="text-[9px] bg-orange-500 text-white px-2 py-0.5 rounded font-black uppercase tracking-tighter w-fit mb-1">BODEGA</span>
                        <span id="current-vendedor-display" class="font-bold text-xs text-slate-400 uppercase tracking-widest italic">Vendedor</span>
                    </div>
                </div>
                <div class="flex flex-col items-center">
                    <span id="header-date" class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 italic">...</span>
                    <span id="header-time" class="text-3xl font-black text-white tabular-nums tracking-widest uppercase leading-none">00:00:00</span>
                </div>
                <div class="flex items-center gap-3 bg-white/5 px-6 py-3 rounded-2xl border border-white/5">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-lg shadow-green-500/20"></div>
                    <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest">SISTEMA ACTIVO</span>
                </div>
            </header>
            
            <section id="view-container" class="flex-1 overflow-y-auto p-12 relative bg-slate-50"></section>
        </main>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAEzn4UvflaiWEaXCLkPxYKDcK5HCtaYZk", authDomain: "crafts-colombia-pos.firebaseapp.com", projectId: "crafts-colombia-pos", storageBucket: "crafts-colombia-pos.firebasestorage.app", messagingSenderId: "924957968575", appId: "1:924957968575:web:12be975b2346dcdf585e0a" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth(); const db = firebase.firestore();
        
        let currentUserData = null, productosData = [], listaCategorias = [];
        let vendedorActivo = ""; // Variable de seguimiento de turno

        function updateClock() { const now = new Date(); if(document.getElementById('header-date')) { document.getElementById('header-date').innerText = now.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'short' }); document.getElementById('header-time').innerText = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' }); } }
        setInterval(updateClock, 1000);

        function iniciarSesion() { const email = document.getElementById('login-email').value, pass = document.getElementById('login-pass').value; auth.signInWithEmailAndPassword(email, pass).catch(() => alert("Error de acceso")); }
        function cerrarSesion() { auth.signOut(); location.reload(); }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const doc = await db.collection('usuarios').doc(user.email).get();
                currentUserData = doc.data() || { rol: 'vendedor', sede: '...' };
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('sidebar-sede-name').innerText = currentUserData.sede;
                document.getElementById('label-sede').innerText = currentUserData.sede;
                
                // Si es un perfil de sede (vendedor), pedimos el nombre del operario
                if(currentUserData.rol === 'vendedor' && !vendedorActivo) {
                    document.getElementById('vendedor-modal').classList.remove('hidden');
                } else {
                    vendedorActivo = "ADMINISTRADOR";
                    document.getElementById('current-vendedor-display').innerText = vendedorActivo;
                }

                escucharCategorias(); renderSidebar(currentUserData.rol); navegar('inicio');
                db.collection("productos").onSnapshot(snap => { productosData = []; snap.forEach(d => productosData.push({id: d.id, ...d.data()})); });
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        function asignarVendedor() {
            const nombre = document.getElementById('vendedor-nombre').value.trim();
            if(nombre.length < 3) return alert("Ingresa un nombre válido");
            vendedorActivo = nombre.toUpperCase();
            document.getElementById('current-vendedor-display').innerText = vendedorActivo;
            document.getElementById('vendedor-modal').classList.add('hidden');
        }

        function escucharCategorias() { db.collection("configuracion").doc("categorias").onSnapshot(doc => { if(doc.exists) listaCategorias = doc.data().lista || []; }); }

        function renderSidebar(rol) {
            const nav = document.getElementById('nav-menu');
            let menu = `<button onclick="navegar('inicio')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all"><i class="fas fa-chart-line"></i><span class="hidden md:block">Inicio</span></button>`;
            if (rol === 'admin' || rol === 'control') {
                menu += `<button onclick="navegar('productos')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all"><i class="fas fa-boxes"></i><span class="hidden md:block">Inventario</span></button>`;
            }
            nav.innerHTML = menu;
        }

        function createDashboardRow(title, label, idPrefix, isAccent = false) {
            const rowClass = isAccent ? "bg-blue-50 border-blue-100" : "bg-white border-slate-100";
            const totalClass = isAccent ? "text-pavo-real" : (idPrefix === 'hoy' ? "text-orange-500" : "text-pavo-real");
            return `<div class="${rowClass} p-8 rounded-[3rem] stat-row flex items-center gap-8 mb-8"><div class="min-w-[220px] border-r border-slate-100 pr-8 text-left"><p class="text-xs font-black uppercase tracking-widest mb-2 italic opacity-40">${label}</p><h3 class="text-sm font-black text-pavo-real uppercase tracking-widest mb-3">${title}</h3><h3 id="dash-total-${idPrefix}" class="text-5xl font-black ${totalClass} tabular-nums leading-none tracking-tighter">$0</h3></div><div class="flex-1 grid grid-cols-6 gap-2 text-center">${[1, 2, 3, 4, 5, 6].map(i => `<div class="flex flex-col items-center justify-center"><p class="text-4xl font-black ${isAccent ? 'text-blue-200' : 'text-pavo-real'} mb-1 opacity-80 leading-none">${i}</p><span id="val-${idPrefix}-${i}" class="font-black text-lg text-slate-800 tabular-nums tracking-tighter leading-none">$0</span></div>`).join('')}</div></div>`;
        }

        function navegar(vista) {
            const container = document.getElementById('view-container');
            const navButtons = document.querySelectorAll('#nav-menu button');
            navButtons.forEach(btn => btn.getAttribute('onclick').includes(`'${vista}'`) ? btn.classList.add('nav-active') : btn.classList.remove('nav-active'));

            if (vista === 'inicio') {
                container.innerHTML = `<div class="animate-in max-w-7xl mx-auto pt-4"><div class="text-center mb-16"><h1 class="text-7xl font-black tracking-tighter text-slate-500 mb-2 italic leading-none">Crafts Colombia</h1><p class="text-orange-500 font-bold uppercase tracking-[0.5em] text-xs italic">Panel Administrativo Central</p></div><div class="max-w-2xl mx-auto relative mb-20"><i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-200 text-xl"></i><input type="text" placeholder="Buscador global..." class="w-full pl-16 pr-6 py-6 bg-white rounded-full border border-slate-100 shadow-2xl outline-none text-lg font-medium focus:ring-4 focus:ring-slate-100 transition-all"></div><div class="space-y-4">${createDashboardRow("Ventas de Hoy", "Real-Time", "hoy")}${createDashboardRow("Ventas Ayer", "Cierre Anterior", "ayer")}${createDashboardRow("Global Mes", "Acumulado", "mes")}${createDashboardRow("Histórico Año", "Proyección 2026", "año", true)}</div></div>`;
                cargarEstadisticasDashboard();
            } else if (vista === 'productos') {
                container.innerHTML = `<div class="animate-in max-w-7xl mx-auto pt-4 text-center"><h1 class="text-5xl font-black tracking-tighter text-slate-500 mb-2 italic">Inventario Central</h1><p class="text-orange-500 font-bold uppercase text-xs italic mb-20">Administración de Stock</p><div class="max-w-2xl mx-auto relative mb-16"><i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-200 text-xl"></i><input id="inv-search" onkeyup="filtrarInventario(this.value)" type="text" placeholder="Buscar producto..." class="w-full pl-16 pr-6 py-6 bg-white rounded-full border border-slate-100 shadow-2xl outline-none text-lg font-medium focus:ring-4 focus:ring-slate-100 transition-all"></div><div id="inventory-list" class="space-y-3"></div></div>`;
            }
        }

        async function cargarEstadisticasDashboard() {
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            const ayerInicio = new Date(hoy); ayerInicio.setDate(hoy.getDate() - 1);
            const ayerFin = new Date(hoy); ayerFin.setMilliseconds(-1);
            const mesInicio = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
            const añoInicio = new Date(hoy.getFullYear(), 0, 1);
            db.collection("ventas").onSnapshot(snap => {
                let totals = { hoy: 0, ayer: 0, mes: 0, año: 0 };
                let mapSedes = { "Filandia 1": "1", "Cable Plaza": "2", "Jardín": "3", "Filandia 2": "4", "Fundadores": "5", "Online": "6" };
                let branchVals = { hoy: {}, ayer: {}, mes: {}, año: {} };
                [1,2,3,4,5,6].forEach(i => { branchVals.hoy[i]=0; branchVals.ayer[i]=0; branchVals.mes[i]=0; branchVals.año[i]=0; });
                snap.forEach(doc => {
                    const v = doc.data(), fecha = v.fecha ? v.fecha.toDate() : new Date(), total = v.total || 0, numSede = mapSedes[v.sede] || null;
                    if(fecha >= hoy) { totals.hoy += total; if(numSede) branchVals.hoy[numSede] += total; }
                    else if(fecha >= ayerInicio && fecha <= ayerFin) { totals.ayer += total; if(numSede) branchVals.ayer[numSede] += total; }
                    if(fecha >= mesInicio) { totals.mes += total; if(numSede) branchVals.mes[numSede] += total; }
                    if(fecha >= añoInicio) { totals.año += total; if(numSede) branchVals.año[numSede] += total; }
                });
                ["hoy", "ayer", "mes", "año"].forEach(period => {
                    const el = document.getElementById('dash-total-'+period);
                    if(el) el.innerText = `$${totals[period].toLocaleString()}`;
                    for(let i=1; i<=6; i++) {
                        const bEl = document.getElementById(`val-${period}-${i}`);
                        if(bEl) bEl.innerText = `$${branchVals[period][i].toLocaleString()}`;
                    }
                });
            });
        }
        
        function cerrarModal() { document.getElementById('main-modal').classList.add('hidden'); }
    </script>
</body>
</html>
