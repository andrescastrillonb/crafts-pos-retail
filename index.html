<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crafts POS | Retail Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f9; }
        .animate-in { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hide-scroll::-webkit-scrollbar { display: none; }
        /* Paleta Institucional */
        .bg-petrol { background-color: #0f1d24; }
        .text-gris-sobrio { color: #334155; } /* Slate-700: Gris medio-oscuro */
        .sidebar-scroll { max-height: calc(100vh - 380px); overflow-y: auto; }
        .inventory-row { transition: all 0.2s ease; border-bottom: 1px solid #edf2f7; }
        .inventory-row:hover { background-color: #ffffff; transform: scale(1.005); box-shadow: 0 4px 20px -10px rgba(51,65,85,0.1); }
        .modal-overlay { background: rgba(15, 29, 36, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="text-slate-700">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6 bg-petrol">
        <div class="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-md animate-in border border-white/10">
            <h1 class="text-3xl font-black text-center text-gris-sobrio mb-8 tracking-tighter uppercase">CRAFTS POS</h1>
            <div class="space-y-4">
                <input id="login-email" type="email" placeholder="Usuario" class="w-full p-5 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-slate-400">
                <input id="login-pass" type="password" placeholder="Contraseña" class="w-full p-5 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-slate-400">
                <button onclick="iniciarSesion()" class="w-full bg-slate-700 text-white p-5 rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-lg uppercase tracking-widest text-xs">Entrar al Sistema</button>
            </div>
            <p id="login-error" class="text-red-500 text-xs mt-6 hidden font-bold text-center"></p>
        </div>
    </div>

    <div id="main-app" class="hidden flex min-h-screen">
        <aside class="w-20 md:w-64 bg-petrol text-white flex flex-col z-20 shadow-2xl transition-all">
            <div class="p-6 flex items-center gap-3 border-b border-white/5">
                <div class="w-8 h-8 bg-orange-500 rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-gem text-white text-xs"></i></div>
                <div class="hidden md:block leading-tight">
                    <p class="font-black text-[9px] tracking-widest text-slate-500 uppercase">Crafts Co.</p>
                    <p id="sidebar-sede" class="font-bold text-white text-[11px] uppercase italic tracking-tighter">Sede</p>
                </div>
            </div>

            <nav id="nav-menu" class="p-4 space-y-1"></nav>

            <div id="sidebar-cart" class="hidden md:flex flex-1 flex-col p-4 overflow-hidden">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-[9px] font-black text-slate-500 uppercase tracking-widest italic opacity-60">Mi Cesta</h2>
                    <span id="items-count" class="bg-orange-500 text-white text-[9px] px-2 py-0.5 rounded-full font-black">0</span>
                </div>
                <div id="cesta-items" class="sidebar-scroll space-y-3 pr-2 hide-scroll"></div>
                <div id="cesta-footer" class="mt-auto pt-6 border-t border-white/5 hidden">
                    <div class="flex justify-between items-baseline mb-4 text-white">
                        <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest opacity-50">Total</span>
                        <span id="pos-total" class="font-black text-2xl tabular-nums text-orange-500">$0</span>
                    </div>
                    <button onclick="finalizarVenta()" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-orange-600 transition-all shadow-xl shadow-orange-900/40">Confirmar Cobro</button>
                </div>
            </div>

            <div class="p-4 border-t border-white/5">
                <button onclick="cerrarSesion()" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 text-slate-500 border-0 bg-transparent cursor-pointer font-bold transition-all text-[10px]">
                    <i class="fas fa-sign-out-alt"></i><span class="hidden md:block uppercase tracking-widest">Salir</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-slate-900 px-8 flex items-center justify-between z-10 border-b border-white/5">
                <div class="flex items-center gap-4 text-white">
                    <span id="user-role-badge" class="text-[8px] bg-white/10 text-slate-400 px-2 py-1 rounded font-black uppercase tracking-widest">SISTEMA</span>
                    <span id="user-display" class="font-bold text-xs text-slate-400 uppercase tracking-widest">Usuario</span>
                </div>
                <div id="header-time" class="text-xs font-black text-white tabular-nums tracking-widest uppercase">00:00:00</div>
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-lg shadow-green-500/20"></div>
            </header>
            
            <section id="view-container" class="flex-1 overflow-y-auto p-8 relative"></section>
        </main>
    </div>

    <div id="product-modal" class="hidden fixed inset-0 z-50 modal-overlay flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-2xl rounded-[3.5rem] shadow-2xl overflow-hidden animate-in">
            <div class="bg-slate-900 p-8 text-white flex justify-between items-center border-b border-white/10">
                <div>
                    <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Identificación Técnica</h2>
                    <p class="font-bold text-2xl italic tracking-tighter">Ficha de Producto</p>
                </div>
                <button onclick="cerrarFicha()" class="text-slate-400 hover:text-white text-3xl bg-transparent border-0 cursor-pointer"><i class="fas fa-times-circle"></i></button>
            </div>
            <div id="modal-content" class="p-10 max-h-[70vh] overflow-y-auto hide-scroll"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAEzn4UvflaiWEaXCLkPxYKDcK5HCtaYZk",
            authDomain: "crafts-colombia-pos.firebaseapp.com",
            projectId: "crafts-colombia-pos",
            storageBucket: "crafts-colombia-pos.firebasestorage.app",
            messagingSenderId: "924957968575",
            appId: "1:924957968575:web:12be975b2346dcdf585e0a"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUserData = null, carrito = [], productosData = [], listaCategorias = [];

        function updateClock() {
            const now = new Date();
            if(document.getElementById('header-time'))
                document.getElementById('header-time').innerText = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        setInterval(updateClock, 1000);

        function iniciarSesion() {
            const email = document.getElementById('login-email').value, pass = document.getElementById('login-pass').value;
            auth.signInWithEmailAndPassword(email, pass).catch(() => alert("Error de acceso"));
        }

        function cerrarSesion() { auth.signOut(); location.reload(); }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const doc = await db.collection('usuarios').doc(user.email).get();
                currentUserData = doc.data() || { rol: 'vendedor', sede: '...' };
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email;
                document.getElementById('sidebar-sede').innerText = "Sede " + currentUserData.sede;
                document.getElementById('user-role-badge').innerText = currentUserData.rol;
                escucharCategorias(); renderSidebar(currentUserData.rol); navegar('ventas');
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        function escucharCategorias() {
            db.collection("configuracion").doc("categorias").onSnapshot(doc => {
                if(doc.exists) listaCategorias = doc.data().lista || [];
            });
        }

        function renderSidebar(rol) {
            const nav = document.getElementById('nav-menu');
            let menu = `<button onclick="navegar('ventas')" class="w-full flex items-center gap-4 p-4 rounded-xl bg-white/5 text-white border-0 text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest"><i class="fas fa-cash-register"></i><span>Ventas</span></button>`;
            menu += `<button onclick="navegar('reportes')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 hover:text-white border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all"><i class="fas fa-history"></i><span>Historial</span></button>`;
            if (rol === 'admin' || rol === 'control') {
                menu += `<button onclick="navegar('productos')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 hover:text-white border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all"><i class="fas fa-boxes"></i><span>Inventario</span></button>`;
            }
            nav.innerHTML = menu;
        }

        function navegar(vista) {
            const container = document.getElementById('view-container');
            const cart = document.getElementById('sidebar-cart');
            if (vista === 'ventas') {
                cart.classList.remove('hidden');
                container.innerHTML = `
                    <div class="animate-in max-w-5xl mx-auto pt-10">
                        <div class="text-center mb-12">
                            <h1 class="text-6xl font-black tracking-tighter text-gris-sobrio mb-2 italic">Crafts Colombia</h1>
                            <p class="text-orange-500 font-bold uppercase tracking-[0.5em] text-[12px]">SEDE ${currentUserData.sede}</p>
                        </div>
                        <div class="max-w-2xl mx-auto relative mb-16">
                            <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-300 text-xl"></i>
                            <input id="pos-search" onkeyup="filtrarPos(this.value)" type="text" placeholder="¿Qué pieza artesanal buscas?" class="w-full pl-16 pr-6 py-7 bg-white rounded-full border border-slate-100 shadow-2xl outline-none text-lg font-medium focus:ring-4 focus:ring-slate-100 transition-all">
                        </div>
                        <div id="pos-grid" class="space-y-4"></div>
                    </div>`;
                escucharInventario('pos');
            } else if (vista === 'productos') {
                cart.classList.add('hidden');
                container.innerHTML = `
                    <div class="animate-in max-w-7xl mx-auto pt-4">
                        <div class="flex justify-between items-center mb-10">
                            <div><h1 class="text-4xl font-black tracking-tighter italic text-gris-sobrio uppercase">Logística Central</h1><p class="text-slate-400 font-bold uppercase tracking-widest text-[10px]">Administración de stock y sedes</p></div>
                            <div class="flex gap-2">
                                ${currentUserData.rol === 'admin' ? `<button onclick="gestionCategorias()" class="bg-white text-slate-700 border border-slate-200 px-5 py-3 rounded-xl font-black text-[10px] uppercase hover:bg-slate-50 transition-all">Categorías</button>` : ''}
                                <button onclick="nuevaFicha()" class="bg-slate-700 text-white px-7 py-3 rounded-xl font-black text-[10px] uppercase hover:bg-orange-600 transition-all shadow-xl shadow-blue-900/10">Nuevo Artículo</button>
                            </div>
                        </div>
                        <div class="relative mb-6">
                            <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-300"></i>
                            <input id="inv-search" onkeyup="filtrarInventario(this.value)" type="text" placeholder="Buscar por nombre o ubicación..." class="w-full pl-14 pr-6 py-5 bg-white rounded-[2rem] border border-slate-100 shadow-sm outline-none text-sm font-medium focus:ring-2 focus:ring-slate-400 transition-all">
                        </div>
                        <div class="bg-white rounded-[3rem] shadow-sm border border-slate-100 overflow-hidden">
                            <div class="grid grid-cols-12 gap-4 px-10 py-5 bg-slate-50 border-b border-slate-100 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                <div class="col-span-5">Descripción</div><div class="col-span-2 text-center">Sede</div><div class="col-span-2 text-center">Dispo.</div><div class="col-span-2 text-right">Precio</div><div class="col-span-1 text-right">Edit</div>
                            </div>
                            <div id="inventory-list" class="divide-y divide-slate-50"></div>
                        </div>
                    </div>`;
                escucharInventario('list');
            }
        }

        function escucharInventario(modo) {
            db.collection("productos").onSnapshot(snap => {
                productosData = [];
                snap.forEach(doc => productosData.push({ id: doc.id, ...doc.data() }));
                if(modo === 'list') renderInventario(productosData);
                else renderPos(productosData);
            });
        }

        function renderInventario(data) {
            const list = document.getElementById('inventory-list');
            if(!list) return;
            let html = "";
            data.forEach(p => {
                const stockAlerta = p.stock <= (p.stock_ideal || 0);
                html += `
                    <div class="grid grid-cols-12 gap-4 px-10 py-7 inventory-row items-center">
                        <div class="col-span-5 flex items-center gap-5">
                            <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-200 text-lg"><i class="fas fa-gem"></i></div>
                            <div>
                                <p class="font-black text-gris-sobrio text-sm leading-none mb-1 uppercase tracking-tighter">${p.nombre}</p>
                                <p class="text-[9px] font-bold text-orange-500 uppercase tracking-widest">${p.categoria || 'Artesanía'}</p>
                            </div>
                        </div>
                        <div class="col-span-2 text-center"><span class="bg-slate-900 text-white text-[9px] px-3 py-1 rounded-full font-black uppercase italic">${p.sede_ubicacion || 'Bodega'}</span></div>
                        <div class="col-span-2 text-center">
                            <p class="font-black text-base ${stockAlerta ? 'text-red-500' : 'text-gris-sobrio'} tabular-nums leading-none">${p.stock} / ${p.stock_ideal || 0}</p>
                            <p class="text-[8px] font-bold text-slate-300 uppercase tracking-widest mt-1">Unidades</p>
                        </div>
                        <div class="col-span-2 text-right">
                            <p class="font-black text-gris-sobrio text-lg tracking-tighter">$${p.precio.toLocaleString()}</p>
                            ${currentUserData.rol === 'admin' ? `<p class="text-[9px] font-bold text-slate-400 italic">Costo: $${(p.precio_compra || 0).toLocaleString()}</p>` : ''}
                        </div>
                        <div class="col-span-1 text-right">
                            <button onclick="verFicha('${p.id}')" class="text-slate-300 hover:text-slate-600 transition-all"><i class="fas fa-edit"></i></button>
                        </div>
                    </div>`;
            });
            list.innerHTML = html;
        }

        function renderPos(data) {
            const grid = document.getElementById('pos-grid');
            if(!grid) return;
            let html = "";
            data.forEach(p => {
                html += `
                    <div class="bg-white p-7 rounded-[3rem] border border-slate-100 shadow-sm flex items-center gap-8 animate-in hover:shadow-2xl transition-all group">
                        <div class="w-20 h-20 bg-slate-50 rounded-3xl flex items-center justify-center text-slate-200 text-3xl transition-all group-hover:bg-slate-700 group-hover:text-white"><i class="fas fa-gem"></i></div>
                        <div class="flex-1">
                            <p class="text-[9px] font-black text-orange-500 uppercase tracking-widest mb-1 italic leading-none">${p.sede_ubicacion || 'Sede Central'}</p>
                            <h3 class="font-black text-gris-sobrio text-xl leading-none mb-3 uppercase tracking-tighter">${p.nombre}</h3>
                            <span class="text-[9px] font-black bg-slate-50 text-slate-400 px-3 py-1 rounded-full uppercase tracking-widest italic border border-slate-100">Disponibilidad: ${p.stock}</span>
                        </div>
                        <div class="text-right px-8 border-l border-slate-100">
                            <p class="text-[9px] font-black text-slate-300 uppercase mb-1">Precio Final</p>
                            <p class="font-black text-3xl text-gris-sobrio tracking-tighter tabular-nums">$${p.precio.toLocaleString()}</p>
                        </div>
                        <button onclick="agregarAlCarrito('${p.id}')" class="bg-orange-500 text-white px-8 py-4 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-orange-600 transition-all active:scale-95 shadow-lg shadow-orange-900/20">
                            Agregar
                        </button>
                    </div>`;
            });
            grid.innerHTML = html;
        }

        function filtrarPos(q) { renderPos(productosData.filter(p => p.nombre.toLowerCase().includes(q.toLowerCase()))); }
        function filtrarInventario(q) { renderInventario(productosData.filter(p => p.nombre.toLowerCase().includes(q.toLowerCase()) || (p.sede_ubicacion && p.sede_ubicacion.toLowerCase().includes(q.toLowerCase())))); }

        function nuevaFicha() { if(currentUserData.rol === 'vendedor') return alert("Permiso Admin"); verFicha(null); }
        function verFicha(id) {
            const modal = document.getElementById('product-modal'), content = document.getElementById('modal-content'), isAdmin = currentUserData.rol === 'admin';
            const p = id ? productosData.find(item => item.id === id) : { nombre: '', precio: '', stock: '', categoria: '', precio_compra: '', stock_ideal: '', sede_ubicacion: 'Bodega' };
            content.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    <div class="space-y-6">
                        <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Nombre del Artículo</label><input id="edit-nombre" type="text" value="${p.nombre}" ${!isAdmin ? 'disabled' : ''} class="w-full p-5 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-100 font-bold outline-none text-gris-sobrio uppercase"></div>
                        <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Categoría</label><select id="edit-categoria" ${!isAdmin ? 'disabled' : ''} class="w-full p-5 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-100 font-bold text-gris-sobrio">
                            ${listaCategorias.map(c => `<option value="${c}" ${p.categoria === c ? 'selected' : ''}>${c}</option>`).join('')}
                        </select></div>
                        <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Sede / Ubicación</label><select id="edit-sede" ${!isAdmin ? 'disabled' : ''} class="w-full p-5 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-100 font-bold text-gris-sobrio">
                            ${["Bodega", "Crafts 1", "Crafts 2", "Crafts 3", "Crafts 4", "Crafts 5", "Bodega Online"].map(s => `<option value="${s}" ${p.sede_ubicacion === s ? 'selected' : ''}>${s}</option>`).join('')}
                        </select></div>
                    </div>
                    <div class="space-y-6 bg-slate-50/50 p-8 rounded-[3rem] border border-slate-100">
                        <div class="grid grid-cols-2 gap-5">
                            <div><label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Venta</label><input id="edit-precio" type="number" value="${p.precio}" ${!isAdmin ? 'disabled' : ''} class="w-full p-4 bg-white rounded-xl border-0 ring-1 ring-slate-100 font-black text-gris-sobrio"></div>
                            ${isAdmin ? `<div><label class="text-[10px] font-black text-orange-500 uppercase mb-2 block italic">Costo</label><input id="edit-compra" type="number" value="${p.precio_compra || 0}" class="w-full p-4 bg-white rounded-xl border-0 ring-1 ring-orange-100 font-black text-orange-600"></div>` : ''}
                        </div>
                        <div class="grid grid-cols-2 gap-5">
                            <div><label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Actual</label><input id="edit-stock" type="number" value="${p.stock}" ${!isAdmin ? 'disabled' : ''} class="w-full p-4 bg-white rounded-xl border-0 ring-1 ring-slate-100 font-black text-gris-sobrio"></div>
                            <div><label class="text-[10px] font-black text-blue-400 uppercase mb-2 block italic">Ideal</label><input id="edit-ideal" type="number" value="${p.stock_ideal || 0}" ${!isAdmin ? 'disabled' : ''} class="w-full p-4 bg-white rounded-xl border-0 ring-1 ring-blue-50 font-black text-blue-500"></div>
                        </div>
                        <div class="pt-6 flex gap-3">
                            ${isAdmin ? `<button onclick="guardarCambios('${id}')" class="flex-1 bg-slate-700 text-white py-5 rounded-3xl font-black uppercase text-[10px] tracking-widest shadow-xl transition-all hover:bg-orange-500">Actualizar</button>
                            ${id ? `<button onclick="eliminarProducto('${id}')" class="bg-red-50 text-red-500 px-6 rounded-3xl font-black transition-all hover:bg-red-500 hover:text-white"><i class="fas fa-trash-alt"></i></button>` : ''}` : '<p class="text-center w-full text-[10px] text-slate-300 font-black italic">Solo Lectura</p>'}
                        </div>
                    </div>
                </div>`;
            modal.classList.remove('hidden');
        }

        async function guardarCambios(id) {
            const data = { nombre: document.getElementById('edit-nombre').value, categoria: document.getElementById('edit-categoria').value, sede_ubicacion: document.getElementById('edit-sede').value, precio: parseInt(document.getElementById('edit-precio').value), precio_compra: parseInt(document.getElementById('edit-compra')?.value || 0), stock: parseInt(document.getElementById('edit-stock').value), stock_ideal: parseInt(document.getElementById('edit-ideal').value) };
            try { if(!id || id === "null") await db.collection("productos").add(data); else await db.collection("productos").doc(id).update(data); alert("Guardado"); cerrarFicha(); } catch (e) { alert("Error"); }
        }

        function cerrarFicha() { document.getElementById('product-modal').classList.add('hidden'); }
        async function eliminarProducto(id) { if(confirm("¿Eliminar?")) { await db.collection("productos").doc(id).delete(); cerrarFicha(); } }

        function gestionCategorias() {
            const modal = document.getElementById('product-modal'), content = document.getElementById('modal-content');
            content.innerHTML = `<div class="space-y-6"><h3 class="font-black text-xs uppercase tracking-widest text-slate-400">Categorías</h3><div class="flex gap-4"><input id="nueva-cat" type="text" class="flex-1 p-5 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-100 font-bold outline-none focus:ring-2 focus:ring-slate-400" placeholder="Nombre..."><button onclick="addCategoria()" class="bg-slate-700 text-white px-8 rounded-2xl font-black">Añadir</button></div><div class="pt-6 border-t"><div class="flex flex-wrap gap-2">${listaCategorias.map(c => `<span class="bg-slate-50 px-4 py-2 rounded-xl text-[10px] font-bold border border-slate-100 text-gris-sobrio uppercase">${c}</span>`).join('')}</div></div></div>`;
            modal.classList.remove('hidden');
        }

        async function addCategoria() {
            const val = document.getElementById('nueva-cat').value;
            if(!val) return;
            listaCategorias.push(val);
            await db.collection("configuracion").doc("categorias").set({ lista: listaCategorias });
            alert("Añadida"); gestionCategorias();
        }

        function agregarAlCarrito(id) {
            const p = productosData.find(item => item.id === id);
            if(p.stock <= 0) return alert("Sin existencia");
            const existe = carrito.find(item => item.id === id);
            if(existe) { if(existe.cantidad < p.stock) existe.cantidad++; } else { carrito.push({...p, cantidad: 1}); }
            renderCarrito();
        }

        function renderCarrito() {
            const lista = document.getElementById('cesta-items'), footer = document.getElementById('cesta-footer');
            if(carrito.length > 0) footer.classList.remove('hidden'); else footer.classList.add('hidden');
            let html = "";
            carrito.forEach((item, idx) => {
                html += `<div class="bg-white/5 p-4 rounded-2xl border border-white/5 flex items-center gap-3 animate-in"><div class="flex-1 overflow-hidden"><p class="text-[9px] font-black text-white truncate uppercase tracking-widest leading-none mb-1">${item.nombre}</p><p class="text-[10px] text-orange-500 tabular-nums font-bold">$${item.precio.toLocaleString()}</p></div><div class="flex items-center gap-2 bg-slate-900 p-1 rounded-xl"><button onclick="cambiarCant(${idx},-1)" class="w-7 h-7 rounded-lg bg-white/5 text-white border-0 cursor-pointer text-[10px]">-</button><span class="text-[10px] font-bold text-white min-w-[15px] text-center">${item.cantidad}</span><button onclick="cambiarCant(${idx},1)" class="w-7 h-7 rounded-lg bg-white/5 text-white border-0 cursor-pointer text-[10px]">+</button></div></div>`;
            });
            lista.innerHTML = html;
            document.getElementById('items-count').innerText = carrito.length;
            document.getElementById('pos-total').innerText = `$${carrito.reduce((s,i)=>s+(i.precio*i.cantidad),0).toLocaleString()}`;
        }

        function cambiarCant(idx, delta) {
            const item = carrito[idx];
            item.cantidad += delta;
            if(item.cantidad <= 0) carrito.splice(idx, 1);
            else if(item.cantidad > item.stock) item.cantidad = item.stock;
            renderCarrito();
        }

        async function finalizarVenta() {
            if(carrito.length === 0) return;
            try {
                for(let item of carrito) { await db.collection("productos").doc(item.id).update({ stock: firebase.firestore.FieldValue.increment(-item.cantidad) }); }
                await db.collection("ventas").add({ fecha: firebase.firestore.FieldValue.serverTimestamp(), vendedor: auth.currentUser.email, sede: currentUserData.sede, total: carrito.reduce((s,i)=>s+(i.precio*i.cantidad),0) });
                alert("✅ Éxito"); carrito = []; renderCarrito();
            } catch (e) { alert("Error"); }
        }
    </script>
</body>
</html>
