<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crafts POS | Enterprise Management</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1041/1041916.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .animate-in { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .bg-petrol { background-color: #0f1d24; }
        .text-pavo-real { color: #004B8D; }
        .bg-pavo-real { background-color: #004B8D; }
        .modal-overlay { background: rgba(15, 29, 36, 0.98); backdrop-filter: blur(15px); }
        .stat-row, .action-module { transition: all 0.3s ease; border: 1px solid #f1f5f9; }
        .stat-row:hover, .action-module:hover { transform: scale(1.005); background-color: #ffffff; box-shadow: 0 15px 45px -15px rgba(0,75,141,0.12); }
        .nav-active { background-color: rgba(255, 255, 255, 0.1) !important; color: white !important; }
    </style>
</head>
<body class="text-slate-700">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6 bg-petrol">
        <div class="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-md animate-in border border-white/10">
            <h1 class="text-3xl font-black text-center text-slate-500 mb-8 uppercase tracking-tighter">CRAFTS POS</h1>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">Sede / Usuario</label>
                    <input id="login-email" type="email" placeholder="email@sede.com" class="w-full p-4 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-slate-400 font-medium mt-1 uppercase">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">Contraseña</label>
                    <input id="login-pass" type="password" placeholder="••••••••" class="w-full p-4 bg-slate-50 rounded-2xl border-0 ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-slate-400 font-medium mt-1">
                </div>
                <div>
                    <label class="text-[10px] font-black text-orange-500 uppercase ml-2 tracking-widest">Operario de Turno</label>
                    <input id="login-vendedor" type="text" placeholder="Escribe tu nombre..." class="w-full p-4 bg-orange-50 rounded-2xl border-0 ring-1 ring-orange-200 outline-none focus:ring-2 focus:ring-orange-400 font-bold mt-1 uppercase text-pavo-real">
                </div>
                <button onclick="iniciarSesion()" class="w-full bg-slate-700 text-white p-5 rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-lg uppercase tracking-widest text-xs mt-4">Acceder</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden flex min-h-screen">
        <aside class="w-20 md:w-56 bg-petrol text-white flex flex-col z-20 shadow-2xl transition-all">
            <div class="p-6 flex items-center gap-3 border-b border-white/5">
                <div class="w-8 h-8 bg-orange-500 rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-gem text-white text-xs"></i></div>
                <div class="hidden md:block leading-tight text-left">
                    <p class="font-black text-[9px] tracking-widest text-slate-500 uppercase leading-none mb-1">Central Hub</p>
                    <p id="sidebar-sede-name" class="font-bold text-white text-[10px] uppercase italic">Sede...</p>
                </div>
            </div>
            <nav id="nav-menu" class="p-4 mt-10 space-y-2 flex-1 hide-scroll"></nav>
            <div class="p-4 border-t border-white/5 text-center">
                <button onclick="cerrarSesion()" class="w-full flex items-center justify-center gap-3 p-3 rounded-xl hover:bg-white/5 text-slate-500 border-0 bg-transparent cursor-pointer font-bold transition-all text-[10px] uppercase">
                    <i class="fas fa-power-off"></i><span class="hidden md:block">Salir</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-28 bg-slate-900 px-10 flex items-center justify-between z-10 border-b border-white/5">
                <div class="flex items-center gap-6 text-white text-left">
                    <div class="flex flex-col">
                        <span id="label-sede-top" class="text-[9px] bg-orange-500 text-white px-2 py-0.5 rounded font-black uppercase tracking-tighter w-fit mb-1 italic">...</span>
                        <span id="current-vendedor-display" class="font-bold text-xs text-slate-400 uppercase tracking-widest italic tracking-tighter italic">Vendedor</span>
                    </div>
                </div>
                <div class="flex flex-col items-center">
                    <span id="header-date" class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 italic">...</span>
                    <span id="header-time" class="text-3xl font-black text-white tabular-nums tracking-widest uppercase leading-none">00:00:00</span>
                </div>
                <div class="flex items-center gap-3 bg-white/5 px-6 py-3 rounded-2xl border border-white/5">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-lg shadow-green-500/20"></div>
                    <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest">SISTEMA ACTIVO</span>
                </div>
            </header>
            
            <section id="view-container" class="flex-1 overflow-y-auto p-12 relative bg-slate-50"></section>
        </main>
    </div>

    <div id="main-modal" class="hidden fixed inset-0 z-50 modal-overlay flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-4xl rounded-[3.5rem] shadow-2xl overflow-hidden animate-in">
            <div class="bg-slate-900 p-8 text-white flex justify-between items-center border-b border-white/10">
                <h2 id="modal-title" class="font-bold text-2xl italic tracking-tighter uppercase italic">Operación</h2>
                <button onclick="cerrarModal()" class="text-slate-400 hover:text-white text-3xl bg-transparent border-0 cursor-pointer transition-all"><i class="fas fa-times-circle"></i></button>
            </div>
            <div id="modal-content" class="p-10 max-h-[75vh] overflow-y-auto hide-scroll"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAEzn4UvflaiWEaXCLkPxYKDcK5HCtaYZk", authDomain: "crafts-colombia-pos.firebaseapp.com", projectId: "crafts-colombia-pos", storageBucket: "crafts-colombia-pos.firebasestorage.app", messagingSenderId: "924957968575", appId: "1:924957968575:web:12be975b2346dcdf585e0a" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth(); const db = firebase.firestore();
        
        let currentUserData = null, productosData = [], listaCategorias = [];
        let vendedorActivo = localStorage.getItem('vendedor_nombre') || "";

        function updateClock() { const now = new Date(); if(document.getElementById('header-date')) { document.getElementById('header-date').innerText = now.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'short' }); document.getElementById('header-time').innerText = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' }); } }
        setInterval(updateClock, 1000);

        async function iniciarSesion() { 
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            const vend = document.getElementById('login-vendedor').value.trim();
            if(!vend) return alert("Ingresa el nombre del operario para iniciar jornada.");
            auth.signInWithEmailAndPassword(email, pass).then(() => {
                    localStorage.setItem('vendedor_nombre', vend.toUpperCase());
                    vendedorActivo = vend.toUpperCase();
            }).catch(() => alert("Credenciales incorrectas.")); 
        }

        function cerrarSesion() { localStorage.removeItem('vendedor_nombre'); auth.signOut(); location.reload(); }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const doc = await db.collection('usuarios').doc(user.email).get();
                currentUserData = doc.data() || { rol: 'vendedor', sede: 'Sin Sede' };
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('sidebar-sede-name').innerText = currentUserData.sede;
                document.getElementById('label-sede-top').innerText = "SEDE " + currentUserData.sede;
                document.getElementById('current-vendedor-display').innerText = vendedorActivo || "SOPORTE";
                escucharCategorias(); renderSidebar(currentUserData.rol); navegar('inicio');
                db.collection("productos").onSnapshot(snap => { productosData = []; snap.forEach(d => productosData.push({id: d.id, ...d.data()})); });
            } else { document.getElementById('login-screen').classList.remove('hidden'); document.getElementById('main-app').classList.add('hidden'); }
        });

        function escucharCategorias() { db.collection("configuracion").doc("categorias").onSnapshot(doc => { if(doc.exists) listaCategorias = doc.data().lista || []; }); }

        function renderSidebar(rol) {
            const nav = document.getElementById('nav-menu');
            let menu = `<button onclick="navegar('inicio')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all"><i class="fas fa-th-large"></i><span class="hidden md:block">Inicio</span></button>`;
            menu += `<button onclick="navegar('estadisticas')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all"><i class="fas fa-chart-line"></i><span class="hidden md:block">Estadísticas</span></button>`;
            if (rol === 'admin' || rol === 'control') {
                menu += `<button onclick="navegar('productos')" class="w-full flex items-center gap-4 p-4 rounded-xl text-slate-500 border-0 bg-transparent text-left cursor-pointer font-bold text-[11px] uppercase tracking-widest transition-all"><i class="fas fa-boxes"></i><span class="hidden md:block">Inventario</span></button>`;
            }
            nav.innerHTML = menu;
        }

        function createDashboardRow(title, label, idPrefix, isAccent = false) {
            const rowClass = isAccent ? "bg-blue-50 border-blue-100" : "bg-white border-slate-100";
            const totalClass = isAccent ? "text-pavo-real" : (idPrefix === 'hoy' ? "text-orange-500" : "text-pavo-real");
            const numberClass = isAccent ? 'text-blue-200' : 'text-pavo-real';
            return `<div class="${rowClass} p-8 rounded-[3rem] stat-row flex items-center gap-8 mb-8 animate-in"><div class="min-w-[220px] border-r border-slate-100 pr-8 text-left"><p class="text-xs font-black uppercase tracking-widest mb-2 italic opacity-40">${label}</p><h3 class="text-sm font-black text-pavo-real uppercase tracking-widest mb-3">${title}</h3><h3 id="dash-total-${idPrefix}" class="text-5xl font-black ${totalClass} tabular-nums leading-none tracking-tighter">$0</h3></div><div class="flex-1 grid grid-cols-6 gap-2 text-center">${[1, 2, 3, 4, 5, 6].map(i => `<div class="flex flex-col items-center justify-center"><p class="text-4xl font-black ${numberClass} mb-1 opacity-80 leading-none">${i}</p><span id="val-${idPrefix}-${i}" class="font-black text-lg text-slate-800 tabular-nums tracking-tighter leading-none">$0</span></div>`).join('')}</div></div>`;
        }

        function createStatCapsule(title, id, isOrange = false) {
            const color = isOrange ? "text-orange-500" : "text-pavo-real";
            return `<div class="bg-white p-12 rounded-[4rem] stat-row flex items-center gap-12 border-slate-100 animate-in">
                        <div class="min-w-[300px] border-r border-slate-100 pr-12 text-left">
                            <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-2 italic">Análisis de Sede</p>
                            <h3 class="text-xl font-black text-slate-700 uppercase tracking-tighter mb-2">${title}</h3>
                            <h3 id="${id}" class="text-6xl font-black ${color} tabular-nums leading-none tracking-tighter">$0</h3>
                        </div>
                        <div class="flex-1 text-right">
                            <span class="text-[10px] font-black text-slate-300 uppercase tracking-[0.3em] italic">Datos Procesados en Tiempo Real</span>
                        </div>
                    </div>`;
        }

        function navegar(vista) {
            const container = document.getElementById('view-container');
            const navButtons = document.querySelectorAll('#nav-menu button');
            navButtons.forEach(btn => btn.getAttribute('onclick').includes(`'${vista}'`) ? btn.classList.add('nav-active') : btn.classList.remove('nav-active'));

            if (vista === 'inicio') {
                container.innerHTML = `
                    <div class="animate-in max-w-7xl mx-auto pt-4 text-center">
                        <h1 class="text-7xl font-black tracking-tighter text-slate-500 mb-2 italic leading-none uppercase">Crafts Colombia</h1>
                        <p class="text-orange-500 font-bold uppercase tracking-[0.5em] text-xs italic mb-16">SEDE ${currentUserData.sede}</p>
                        <div class="max-w-2xl mx-auto relative mb-20"><i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-200 text-xl"></i><input id="global-search" onkeyup="filtrarInventario(this.value)" type="text" placeholder="Buscador global..." class="w-full pl-16 pr-6 py-6 bg-white rounded-full border border-slate-100 shadow-2xl outline-none text-lg font-medium focus:ring-4 focus:ring-slate-100 transition-all"></div>
                        
                        <div class="bg-white p-12 rounded-[4rem] stat-row flex items-center gap-12 border-orange-200 border-2 mb-12">
                            <div class="min-w-[300px] border-r border-slate-100 pr-12 text-left">
                                <p class="text-xs font-black text-orange-500 uppercase tracking-widest mb-2 italic">Monitor de Turno</p>
                                <h3 class="text-xl font-black text-pavo-real uppercase tracking-tighter mb-2">Ventas del Día</h3>
                                <h3 id="dash-total-hoy" class="text-6xl font-black text-orange-500 tabular-nums leading-none tracking-tighter">$0</h3>
                            </div>
                            <div class="flex-1 text-right italic font-bold text-slate-300 uppercase tracking-widest text-xs">Total acumulado hoy en esta sede</div>
                        </div>

                        <div id="stats-container" class="space-y-4"></div>
                        <div id="search-results-list" class="space-y-3 mt-10"></div>
                    </div>`;
                
                if(currentUserData.rol === 'admin' || currentUserData.rol === 'control') {
                    document.getElementById('stats-container').innerHTML = `
                        ${createDashboardRow("Cierre Anterior", "Histórico", "ayer")}
                        ${createDashboardRow("Global Mes", "Acumulado", "mes")}
                        ${createDashboardRow("Histórico Año", "Proyección 2026", "año", true)}`;
                }
                cargarEstadisticasDashboard();
            } else if (vista === 'estadisticas') {
                container.innerHTML = `
                    <div class="animate-in max-w-7xl mx-auto pt-4 text-center">
                        <h1 class="text-5xl font-black tracking-tighter text-slate-500 mb-2 italic uppercase">Estadísticas</h1>
                        <p class="text-orange-500 font-bold uppercase text-xs italic mb-20 tracking-widest">SEDE ${currentUserData.sede}</p>
                        <div class="space-y-10">
                            ${createStatCapsule("Ventas de Hoy", "stats-hoy", true)}
                            ${createStatCapsule("Ventas de Ayer", "stats-ayer")}
                            ${createStatCapsule("Ventas Últimos 8 Días", "stats-semana")}
                        </div>
                    </div>`;
                cargarEstadisticasDashboard();
            } else if (vista === 'productos') {
                container.innerHTML = `<div class="animate-in max-w-7xl mx-auto pt-4 text-center"><h1 class="text-5xl font-black tracking-tighter text-slate-500 mb-2 italic uppercase">Logística Central</h1><p class="text-orange-500 font-bold uppercase text-xs italic mb-20">Inventario Sede ${currentUserData.sede}</p><div class="max-w-2xl mx-auto relative mb-16"><i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-200 text-xl"></i><input id="inv-search" onkeyup="filtrarInventario(this.value)" type="text" placeholder="Buscar producto..." class="w-full pl-16 pr-6 py-6 bg-white rounded-full border border-slate-100 shadow-2xl outline-none text-lg font-medium focus:ring-4 focus:ring-slate-100 transition-all"></div><div id="inventory-list" class="space-y-3"></div></div>`;
            }
        }

        async function cargarEstadisticasDashboard() {
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            const ayerInicio = new Date(hoy); ayerInicio.setDate(hoy.getDate() - 1);
            const ayerFin = new Date(hoy); ayerFin.setMilliseconds(-1);
            const semanaInicio = new Date(hoy); semanaInicio.setDate(hoy.getDate() - 8);
            const mesInicio = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
            const añoInicio = new Date(hoy.getFullYear(), 0, 1);
            
            db.collection("ventas").onSnapshot(snap => {
                let totals = { hoy: 0, ayer: 0, semana: 0, mes: 0, año: 0 };
                let mapSedes = { "Filandia 1": "1", "Cable Plaza": "2", "Jardín": "3", "Filandia 2": "4", "Fundadores": "5", "Online": "6" };
                let branchVals = { hoy: {}, ayer: {}, mes: {}, año: {} };
                [1,2,3,4,5,6].forEach(i => { branchVals.hoy[i]=0; branchVals.ayer[i]=0; branchVals.mes[i]=0; branchVals.año[i]=0; });

                snap.forEach(doc => {
                    const v = doc.data(), fecha = v.fecha ? v.fecha.toDate() : new Date(), total = v.total || 0, numSede = mapSedes[v.sede] || null;
                    
                    // Lógica multisede (solo admin o si coincide con sede usuario)
                    const isOwnSede = v.sede === currentUserData.sede;
                    
                    if(fecha >= hoy) { 
                        if(currentUserData.rol === 'admin' || isOwnSede) totals.hoy += total; 
                        if(numSede) branchVals.hoy[numSede] += total; 
                    }
                    if(fecha >= ayerInicio && fecha <= ayerFin) { 
                        if(currentUserData.rol === 'admin' || isOwnSede) totals.ayer += total; 
                        if(numSede) branchVals.ayer[numSede] += total; 
                    }
                    if(fecha >= semanaInicio) { if(currentUserData.rol === 'admin' || isOwnSede) totals.semana += total; }
                    if(fecha >= mesInicio) { if(currentUserData.rol === 'admin' || isOwnSede) totals.mes += total; if(numSede) branchVals.mes[numSede] += total; }
                    if(fecha >= añoInicio) { if(currentUserData.rol === 'admin' || isOwnSede) totals.año += total; if(numSede) branchVals.año[numSede] += total; }
                });

                const ids = ['dash-total-hoy', 'dash-total-ayer', 'dash-total-mes', 'dash-total-año', 'stats-hoy', 'stats-ayer', 'stats-semana'];
                ids.forEach(id => {
                    const el = document.getElementById(id);
                    if(el) {
                        const key = id.split('-').pop().replace('stats', '');
                        el.innerText = `$${(totals[key] || 0).toLocaleString()}`;
                    }

                });

                if(currentUserData.rol === 'admin') {
                    for(let i=1; i<=6; i++) {
                        ['hoy', 'ayer', 'mes', 'año'].forEach(p => {
                            const bEl = document.getElementById(`val-${p}-${i}`);
                            if(bEl) bEl.innerText = `$${branchVals[p][i].toLocaleString()}`;
                        });
                    }
                }
            });
        }

        function filtrarInventario(q) {
            const query = q.toLowerCase().trim();
            const list = document.getElementById('inventory-list') || document.getElementById('search-results-list');
            if(!list) return;
            if(!query) { list.innerHTML = ''; return; }
            const filtered = productosData.filter(p => p.nombre.toLowerCase().includes(query) || (p.sede_ubicacion && p.sede_ubicacion.toLowerCase().includes(query)));
            let html = "";
            filtered.forEach(p => {
                html += `<div class="bg-white p-6 rounded-[2.5rem] stat-row flex items-center gap-10 animate-in text-left">
                            <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-300 text-lg"><i class="fas fa-gem"></i></div>
                            <div class="flex-1"><p class="text-[8px] font-black text-orange-500 uppercase mb-1 italic">${p.categoria}</p><h3 class="font-black text-slate-600 text-lg uppercase truncate leading-tight">${p.nombre}</h3></div>
                            <div class="text-center min-w-[120px] border-l border-slate-50 pl-4"><span class="bg-pavo-real text-white text-[9px] px-3 py-1 rounded-full font-black uppercase italic">${p.sede_ubicacion}</span></div>
                            <div class="text-right min-w-[120px] border-l border-slate-50 pl-4"><p class="font-black text-pavo-real text-lg tabular-nums">$${p.precio.toLocaleString()}</p></div>
                        </div>`;
            });
            list.innerHTML = html;
        }

        function cerrarModal() { document.getElementById('main-modal').classList.add('hidden'); }
    </script>
</body>
</html>
